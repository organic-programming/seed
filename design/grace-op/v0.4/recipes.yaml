    - { name: charon-pipeline-dart-go,    lang: dart }
    - { name: charon-pipeline-csharp-go,  lang: csharp }
    - { name: charon-pipeline-node-go,    lang: node }
    - { name: charon-pipeline-python-go,  lang: python }
    - { name: charon-pipeline-ruby-go,    lang: ruby }
    - { name: charon-pipeline-java-go,    lang: java }
    - { name: charon-pipeline-cpp-go,     lang: cpp }
  fanout:
    - { name: charon-fanout-go-go,      lang: go }
    - { name: charon-fanout-rust-go,    lang: rust }
    - { name: charon-fanout-swift-go,   lang: swift }
    - { name: charon-fanout-kotlin-go,  lang: kotlin }
    - { name: charon-fanout-dart-go,    lang: dart }
    - { name: charon-fanout-csharp-go,  lang: csharp }
    - { name: charon-fanout-node-go,    lang: node }
    - { name: charon-fanout-python-go,  lang: python }
    - { name: charon-fanout-ruby-go,    lang: ruby }
    - { name: charon-fanout-java-go,    lang: java }
    - { name: charon-fanout-cpp-go,     lang: cpp }

# ── Test Matrix (1) ──────────────────────────────────────
testmatrix:

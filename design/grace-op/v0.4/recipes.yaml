    - { name: charon-direct-python-go,  lang: python }
    - { name: charon-direct-ruby-go,    lang: ruby }
    - { name: charon-direct-java-go,    lang: java }
    - { name: charon-direct-cpp-go,     lang: cpp }
  pipeline:

# Machine-readable manifest for all v0.4 recipe holons.
# Source of truth for Codex and CI — matches DESIGN_recipe_monorepo.md.
#
# Naming rules:
#   gudule  = Greeting scenario (daemons, HostUIs, assemblies, testmatrix)
#   charon  = Composition scenario (workers, orchestrators)
#
# Assembly order: <hostui>-<daemon> (HostUI connects to daemon)
# Exception: web assemblies are <daemon>-web (daemon serves web)

protos:
  greeting:
    path: recipes/protos/greeting/v1/greeting.proto
    package: greeting.v1
    rpcs: [ListLanguages, SayHello]

# ── Daemons (8) ───────────────────────────────────────────
daemons:
  - name: gudule-daemon-greeting-go
    family_name: Greeting-Daemon-Go
    source: recipes/go-dart-holons/examples/greeting/greeting-daemon
    sdk: go-holons
    lang: go
    runner: go-module
    os: [macos, linux, windows]
    task: v0.4.1/TASK02

  - name: gudule-daemon-greeting-rust
    family_name: Greeting-Daemon-Rust
    source: recipes/rust-dart-holons/examples/greeting/greeting-daemon
    sdk: rust-holons
    lang: rust
    runner: cargo
    os: [macos, linux, windows]
    task: v0.4.2/TASK01

  - name: gudule-daemon-greeting-swift
    family_name: Greeting-Daemon-Swift
    source: recipes/daemons/gudule-daemon-greeting-swift
    sdk: swift-holons
    lang: swift
    runner: swift-package
    os: [macos, linux]
    task: v0.4.2/TASK02

  - name: gudule-daemon-greeting-kotlin
    family_name: Greeting-Daemon-Kotlin
    source: recipes/daemons/gudule-daemon-greeting-kotlin
    sdk: kotlin-holons
    lang: kotlin
    runner: gradle
    os: [macos, linux, windows]
    task: v0.4.2/TASK02

  - name: gudule-daemon-greeting-dart
    family_name: Greeting-Daemon-Dart
    source: recipes/daemons/gudule-daemon-greeting-dart
    sdk: dart-holons
    lang: dart
    runner: dart
    os: [macos, linux, windows]
    task: v0.4.2/TASK02

  - name: gudule-daemon-greeting-python
    family_name: Greeting-Daemon-Python
    source: recipes/daemons/gudule-daemon-greeting-python
    sdk: python-holons
    lang: python
    runner: python
    os: [macos, linux, windows]
    task: v0.4.2/TASK03

  - name: gudule-daemon-greeting-csharp
    family_name: Greeting-Daemon-Csharp
    source: recipes/daemons/gudule-daemon-greeting-csharp
    sdk: csharp-holons
    lang: csharp
    runner: dotnet
    os: [macos, linux, windows]
    task: v0.4.2/TASK03

  - name: gudule-daemon-greeting-node
    family_name: Greeting-Daemon-Node
    source: recipes/daemons/gudule-daemon-greeting-node
    sdk: js-holons
    lang: node
    runner: npm
    os: [macos, linux, windows]
    task: v0.4.2/TASK03

# ── HostUIs (6) ───────────────────────────────────────────
hostuis:
  - name: gudule-greeting-hostui-flutter
    family_name: Greeting-Hostui-Flutter
    source: recipes/go-dart-holons/examples/greeting/greeting-godart
    sdk: dart-holons
    framework: flutter
    runner: flutter
    os: [macos, linux, windows]
    task: v0.4.1/TASK03

  - name: gudule-greeting-hostui-swiftui
    family_name: Greeting-Hostui-Swiftui
    source: recipes/hostui/gudule-greeting-hostui-swiftui
    sdk: swift-holons
    framework: swiftui
    runner: swift-package
    os: [macos, ios]
    task: v0.4.2/TASK04

  - name: gudule-greeting-hostui-compose
    family_name: Greeting-Hostui-Compose
    source: recipes/hostui/gudule-greeting-hostui-compose
    sdk: kotlin-holons
    framework: compose
    runner: gradle
    os: [macos, linux, windows, android]
    task: v0.4.2/TASK05

  - name: gudule-greeting-hostui-web
    family_name: Greeting-Hostui-Web
    source: recipes/hostui/gudule-greeting-hostui-web
    sdk: js-web-holons
    framework: web
    runner: npm
    os: [macos, linux, windows]
    task: v0.4.2/TASK05

  - name: gudule-greeting-hostui-dotnet
    family_name: Greeting-Hostui-Dotnet
    source: recipes/hostui/gudule-greeting-hostui-dotnet
    sdk: csharp-holons
    framework: dotnet
    runner: dotnet
    os: [macos, windows]
    task: v0.4.2/TASK05

  - name: gudule-greeting-hostui-qt
    family_name: Greeting-Hostui-Qt
    source: recipes/hostui/gudule-greeting-hostui-qt
    sdk: cpp-holons
    framework: qt
    runner: qt-cmake
    os: [macos, linux, windows]
    task: v0.4.2/TASK05

# ── Assemblies (48) ───────────────────────────────────────
# Generated from: hostuis × daemons (web reversed: daemon-web)
#
# Transport rules (must be explicit in each holon.yaml):
#   - SwiftUI assemblies: transport: stdio (Swift SDK default)
#   - Web assemblies: transport: tcp (Connect protocol over HTTP)
#   - All others: transport: tcp (Go/Kotlin/Dart/C#/Qt default)
assemblies:
  # Flutter row
  - { name: gudule-greeting-flutter-go,      daemon: gudule-daemon-greeting-go,      hostui: gudule-greeting-hostui-flutter }
  - { name: gudule-greeting-flutter-rust,    daemon: gudule-daemon-greeting-rust,    hostui: gudule-greeting-hostui-flutter }
  - { name: gudule-greeting-flutter-swift,   daemon: gudule-daemon-greeting-swift,   hostui: gudule-greeting-hostui-flutter }
  - { name: gudule-greeting-flutter-kotlin,  daemon: gudule-daemon-greeting-kotlin,  hostui: gudule-greeting-hostui-flutter }
  - { name: gudule-greeting-flutter-dart,    daemon: gudule-daemon-greeting-dart,    hostui: gudule-greeting-hostui-flutter }
  - { name: gudule-greeting-flutter-python,  daemon: gudule-daemon-greeting-python,  hostui: gudule-greeting-hostui-flutter }
  - { name: gudule-greeting-flutter-csharp,  daemon: gudule-daemon-greeting-csharp,  hostui: gudule-greeting-hostui-flutter }
  - { name: gudule-greeting-flutter-node,    daemon: gudule-daemon-greeting-node,    hostui: gudule-greeting-hostui-flutter }
  # SwiftUI row
  - { name: gudule-greeting-swiftui-go,      daemon: gudule-daemon-greeting-go,      hostui: gudule-greeting-hostui-swiftui }
  - { name: gudule-greeting-swiftui-rust,    daemon: gudule-daemon-greeting-rust,    hostui: gudule-greeting-hostui-swiftui }
  - { name: gudule-greeting-swiftui-swift,   daemon: gudule-daemon-greeting-swift,   hostui: gudule-greeting-hostui-swiftui }
  - { name: gudule-greeting-swiftui-kotlin,  daemon: gudule-daemon-greeting-kotlin,  hostui: gudule-greeting-hostui-swiftui }
  - { name: gudule-greeting-swiftui-dart,    daemon: gudule-daemon-greeting-dart,    hostui: gudule-greeting-hostui-swiftui }
  - { name: gudule-greeting-swiftui-python,  daemon: gudule-daemon-greeting-python,  hostui: gudule-greeting-hostui-swiftui }
  - { name: gudule-greeting-swiftui-csharp,  daemon: gudule-daemon-greeting-csharp,  hostui: gudule-greeting-hostui-swiftui }
  - { name: gudule-greeting-swiftui-node,    daemon: gudule-daemon-greeting-node,    hostui: gudule-greeting-hostui-swiftui }
  # Compose row
  - { name: gudule-greeting-compose-go,      daemon: gudule-daemon-greeting-go,      hostui: gudule-greeting-hostui-compose }
  - { name: gudule-greeting-compose-rust,    daemon: gudule-daemon-greeting-rust,    hostui: gudule-greeting-hostui-compose }
  - { name: gudule-greeting-compose-swift,   daemon: gudule-daemon-greeting-swift,   hostui: gudule-greeting-hostui-compose }
  - { name: gudule-greeting-compose-kotlin,  daemon: gudule-daemon-greeting-kotlin,  hostui: gudule-greeting-hostui-compose }
  - { name: gudule-greeting-compose-dart,    daemon: gudule-daemon-greeting-dart,    hostui: gudule-greeting-hostui-compose }
  - { name: gudule-greeting-compose-python,  daemon: gudule-daemon-greeting-python,  hostui: gudule-greeting-hostui-compose }
  - { name: gudule-greeting-compose-csharp,  daemon: gudule-daemon-greeting-csharp,  hostui: gudule-greeting-hostui-compose }
  - { name: gudule-greeting-compose-node,    daemon: gudule-daemon-greeting-node,    hostui: gudule-greeting-hostui-compose }
  # Web row (reversed: daemon-web)
  - { name: gudule-greeting-go-web,          daemon: gudule-daemon-greeting-go,      hostui: gudule-greeting-hostui-web, topology: embedded }
  - { name: gudule-greeting-rust-web,        daemon: gudule-daemon-greeting-rust,    hostui: gudule-greeting-hostui-web, topology: embedded }
  - { name: gudule-greeting-swift-web,       daemon: gudule-daemon-greeting-swift,   hostui: gudule-greeting-hostui-web, topology: embedded }
  - { name: gudule-greeting-kotlin-web,      daemon: gudule-daemon-greeting-kotlin,  hostui: gudule-greeting-hostui-web, topology: embedded }
  - { name: gudule-greeting-dart-web,        daemon: gudule-daemon-greeting-dart,    hostui: gudule-greeting-hostui-web, topology: embedded }
  - { name: gudule-greeting-python-web,      daemon: gudule-daemon-greeting-python,  hostui: gudule-greeting-hostui-web, topology: embedded }
  - { name: gudule-greeting-csharp-web,      daemon: gudule-daemon-greeting-csharp,  hostui: gudule-greeting-hostui-web, topology: embedded }
  - { name: gudule-greeting-node-web,        daemon: gudule-daemon-greeting-node,    hostui: gudule-greeting-hostui-web, topology: embedded }
  # Dotnet row
  - { name: gudule-greeting-dotnet-go,       daemon: gudule-daemon-greeting-go,      hostui: gudule-greeting-hostui-dotnet }
  - { name: gudule-greeting-dotnet-rust,     daemon: gudule-daemon-greeting-rust,    hostui: gudule-greeting-hostui-dotnet }
  - { name: gudule-greeting-dotnet-swift,    daemon: gudule-daemon-greeting-swift,   hostui: gudule-greeting-hostui-dotnet }
  - { name: gudule-greeting-dotnet-kotlin,   daemon: gudule-daemon-greeting-kotlin,  hostui: gudule-greeting-hostui-dotnet }
  - { name: gudule-greeting-dotnet-dart,     daemon: gudule-daemon-greeting-dart,    hostui: gudule-greeting-hostui-dotnet }
  - { name: gudule-greeting-dotnet-python,   daemon: gudule-daemon-greeting-python,  hostui: gudule-greeting-hostui-dotnet }
  - { name: gudule-greeting-dotnet-csharp,   daemon: gudule-daemon-greeting-csharp,  hostui: gudule-greeting-hostui-dotnet }
  - { name: gudule-greeting-dotnet-node,     daemon: gudule-daemon-greeting-node,    hostui: gudule-greeting-hostui-dotnet }
  # Qt row
  - { name: gudule-greeting-qt-go,           daemon: gudule-daemon-greeting-go,      hostui: gudule-greeting-hostui-qt }
  - { name: gudule-greeting-qt-rust,         daemon: gudule-daemon-greeting-rust,    hostui: gudule-greeting-hostui-qt }
  - { name: gudule-greeting-qt-swift,        daemon: gudule-daemon-greeting-swift,   hostui: gudule-greeting-hostui-qt }
  - { name: gudule-greeting-qt-kotlin,       daemon: gudule-daemon-greeting-kotlin,  hostui: gudule-greeting-hostui-qt }
  - { name: gudule-greeting-qt-dart,         daemon: gudule-daemon-greeting-dart,    hostui: gudule-greeting-hostui-qt }
  - { name: gudule-greeting-qt-python,       daemon: gudule-daemon-greeting-python,  hostui: gudule-greeting-hostui-qt }
  - { name: gudule-greeting-qt-csharp,       daemon: gudule-daemon-greeting-csharp,  hostui: gudule-greeting-hostui-qt }
  - { name: gudule-greeting-qt-node,         daemon: gudule-daemon-greeting-node,    hostui: gudule-greeting-hostui-qt }

# ── Composition Workers (2) ──────────────────────────────
workers:
  - name: charon-worker-compute
    family_name: Composition-Worker-Compute
    lang: go
    runner: go-module
    task: v0.4.3/TASK03

  - name: charon-worker-transform
    family_name: Composition-Worker-Transform
    lang: go
    runner: go-module
    task: v0.4.3/TASK03

# ── Composition Orchestrators (33) ────────────────────────
# Pattern × 11 languages, all calling Go workers.
compositions:
  direct:
    - { name: charon-direct-go-go,      lang: go }
    - { name: charon-direct-rust-go,    lang: rust }
    - { name: charon-direct-swift-go,   lang: swift }

description: Seed local verification suite
steps:
    example-c-unit:
        workdir: examples/hello-world/gabriel-greeting-c
        prereqs:
            - cmake
        command: rm -rf "$ADER_RUN_ARTIFACTS/cmake/example-c" && cmake -S . -B "$ADER_RUN_ARTIFACTS/cmake/example-c" && cmake --build "$ADER_RUN_ARTIFACTS/cmake/example-c" && ctest --test-dir "$ADER_RUN_ARTIFACTS/cmake/example-c" --output-on-failure
        script: ""
        args: []
        description: C example unit tests
        lane: regression
    example-cpp-unit:
        workdir: examples/hello-world/gabriel-greeting-cpp
        prereqs:
            - cmake
        command: rm -rf "$ADER_RUN_ARTIFACTS/cmake/example-cpp" && cmake -S . -B "$ADER_RUN_ARTIFACTS/cmake/example-cpp" && cmake --build "$ADER_RUN_ARTIFACTS/cmake/example-cpp" && ctest --test-dir "$ADER_RUN_ARTIFACTS/cmake/example-cpp" --output-on-failure
        script: ""
        args: []
        description: C++ example unit tests
        lane: regression
    example-csharp-unit:
        workdir: examples/hello-world/gabriel-greeting-csharp
        prereqs:
            - dotnet
        command: dotnet test tests/Gabriel.Greeting.Csharp.Tests.csproj
        script: ""
        args: []
        description: C# example unit tests
        lane: regression
    example-dart-unit:
        workdir: examples/hello-world/gabriel-greeting-dart
        prereqs:
            - dart
        command: dart test

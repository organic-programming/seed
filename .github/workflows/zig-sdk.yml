name: zig-sdk

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]
  workflow_dispatch:

concurrency:
  group: zig-sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: popok
    timeout-minutes: 240

    env:
      ADER_CI_CACHE_BASE: /Users/popok/.ader-ci-cache
      GRACE_OP_SHARED_CACHE_DIR: /Users/popok/.ader-ci-cache/grace-op-shared
      GOMODCACHE: /Users/popok/.ader-ci-cache/go-mod
      GOCACHE: /Users/popok/.ader-ci-cache/go-build
      BUNDLE_PATH: /Users/popok/.ader-ci-cache/bundle
      PUB_CACHE: /Users/popok/.ader-ci-cache/dart-pub
      npm_config_cache: /Users/popok/.ader-ci-cache/npm
      GRADLE_USER_HOME: /Users/popok/.ader-ci-cache/gradle
      NUGET_PACKAGES: /Users/popok/.ader-ci-cache/nuget
      DOTNET_CLI_HOME: /Users/popok/.ader-ci-cache/dotnet-home
      ZIG_VERSION: 0.16.0
      ZIG_TOOLCHAIN_CACHE: /Users/popok/.ader-ci-cache/zig
      NINJA_VERSION: 1.13.1
      NINJA_TOOLCHAIN_CACHE: /Users/popok/.ader-ci-cache/ninja
      ZIG_HOLONS_JOBS: 8

    steps:
      - name: Loosen permissions on previous workspace
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          mkdir -p "$ADER_CI_CACHE_BASE"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Zig vendored submodules
        run: |
          set -euo pipefail
          rm -rf sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule sync --recursive sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule update --init --force --recursive --depth 1 --jobs 8 \
            sdk/zig-holons/third_party/grpc \
            sdk/zig-holons/third_party/protobuf-c
          test -f sdk/zig-holons/third_party/grpc/CMakeLists.txt
          test -d sdk/zig-holons/third_party/protobuf-c/build-cmake

      - name: Install Zig toolchain
        run: |
          set -euo pipefail
          mkdir -p "$ZIG_TOOLCHAIN_CACHE"
          case "$(uname -m)" in
            arm64|aarch64) zig_arch="aarch64-macos" ;;
            x86_64|amd64) zig_arch="x86_64-macos" ;;
            *) echo "unsupported Zig CI architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          zig_dir="$ZIG_TOOLCHAIN_CACHE/zig-$zig_arch-$ZIG_VERSION"
          if [ ! -x "$zig_dir/zig" ]; then
            tmp="$(mktemp -d)"
            trap 'rm -rf "$tmp"' EXIT
            url="https://ziglang.org/download/$ZIG_VERSION/zig-$zig_arch-$ZIG_VERSION.tar.xz"
            curl -fsSL "$url" -o "$tmp/zig.tar.xz"
            tar -C "$tmp" -xf "$tmp/zig.tar.xz"
            rm -rf "$zig_dir"
            mv "$tmp/zig-$zig_arch-$ZIG_VERSION" "$zig_dir"
          fi
          "$zig_dir/zig" version
          echo "$zig_dir" >> "$GITHUB_PATH"

      - name: Install Ninja build tool
        run: |
          set -euo pipefail
          mkdir -p "$NINJA_TOOLCHAIN_CACHE"
          ninja_dir="$NINJA_TOOLCHAIN_CACHE/ninja-$NINJA_VERSION"
          if [ ! -x "$ninja_dir/ninja" ]; then
            tmp="$(mktemp -d)"
            trap 'rm -rf "$tmp"' EXIT
            curl -fsSL "https://github.com/ninja-build/ninja/releases/download/v$NINJA_VERSION/ninja-mac.zip" -o "$tmp/ninja.zip"
            unzip -q "$tmp/ninja.zip" -d "$tmp"
            chmod +x "$tmp/ninja"
            rm -rf "$ninja_dir"
            mkdir -p "$ninja_dir"
            mv "$tmp/ninja" "$ninja_dir/ninja"
          fi
          "$ninja_dir/ninja" --version
          echo "$ninja_dir" >> "$GITHUB_PATH"

      - name: Restore Zig vendored build cache
        id: zig-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            sdk/zig-holons/.zig-vendor
            sdk/zig-holons/.zig-cache/cmake
          key: zig-sdk-host-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('sdk/zig-holons/build.zig', 'sdk/zig-holons/build.zig.zon', 'sdk/zig-holons/tools/cross_smoke.sh', '.gitmodules') }}
          restore-keys: |
            zig-sdk-host-${{ runner.os }}-${{ runner.arch }}-

      - name: Verify toolchain presence
        run: |
          set -euo pipefail
          go version
          ruby --version
          bundle --version
          zig version
          ninja --version

      - name: Bootstrap op and ader
        run: |
          set -euo pipefail
          go run ./holons/grace-op/cmd/op env --init
          go run ./holons/grace-op/cmd/op build op --install --symlink
          eval "$(go run ./holons/grace-op/cmd/op env --shell)"
          op build clem-ader --install --symlink
          echo "$OPBIN" >> "$GITHUB_PATH"
          {
            echo "OPPATH=$OPPATH"
            echo "OPBIN=$OPBIN"
          } >> "$GITHUB_ENV"

      - name: Check Zig formatting
        run: |
          set -euo pipefail
          find sdk/zig-holons examples/hello-world/gabriel-greeting-zig \
            -name '*.zig' \
            -not -path '*/.zig-cache/*' \
            -not -path '*/zig-out/*' \
            -print0 | xargs -0 zig fmt --check

      - name: Build vendored gRPC and protobuf-c
        working-directory: sdk/zig-holons
        run: zig build vendor

      - name: Run Zig SDK tests
        working-directory: sdk/zig-holons
        run: zig build test

      - name: Run C ABI smoke
        working-directory: sdk/zig-holons
        run: zig build test-c-abi

      - name: Validate Zig holon runner
        run: |
          set -euo pipefail
          op build gabriel-greeting-zig
          op test gabriel-greeting-zig
          op clean gabriel-greeting-zig
          op build gabriel-greeting-zig

      - name: Run Zig ader smoke
        run: ader test ader/catalogues/grace-op --suite op_invoke --profile smoke --lane progression --source workspace

      - name: Save Zig vendored build cache
        if: always() && steps.zig-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            sdk/zig-holons/.zig-vendor
            sdk/zig-holons/.zig-cache/cmake
          key: zig-sdk-host-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('sdk/zig-holons/build.zig', 'sdk/zig-holons/build.zig.zon', 'sdk/zig-holons/tools/cross_smoke.sh', '.gitmodules') }}

  composites:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: popok
    timeout-minutes: 240
    needs: host

    env:
      ADER_CI_CACHE_BASE: /Users/popok/.ader-ci-cache
      GRACE_OP_SHARED_CACHE_DIR: /Users/popok/.ader-ci-cache/grace-op-shared
      GOMODCACHE: /Users/popok/.ader-ci-cache/go-mod
      GOCACHE: /Users/popok/.ader-ci-cache/go-build
      BUNDLE_PATH: /Users/popok/.ader-ci-cache/bundle
      PUB_CACHE: /Users/popok/.ader-ci-cache/dart-pub
      npm_config_cache: /Users/popok/.ader-ci-cache/npm
      GRADLE_USER_HOME: /Users/popok/.ader-ci-cache/gradle
      NUGET_PACKAGES: /Users/popok/.ader-ci-cache/nuget
      DOTNET_CLI_HOME: /Users/popok/.ader-ci-cache/dotnet-home
      ZIG_VERSION: 0.16.0
      ZIG_TOOLCHAIN_CACHE: /Users/popok/.ader-ci-cache/zig
      NINJA_VERSION: 1.13.1
      NINJA_TOOLCHAIN_CACHE: /Users/popok/.ader-ci-cache/ninja
      ZIG_HOLONS_JOBS: 8

    steps:
      - name: Loosen permissions on previous workspace
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          mkdir -p "$ADER_CI_CACHE_BASE"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Zig vendored submodules
        run: |
          set -euo pipefail
          rm -rf sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule sync --recursive sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule update --init --force --recursive --depth 1 --jobs 8 \
            sdk/zig-holons/third_party/grpc \
            sdk/zig-holons/third_party/protobuf-c

      - name: Install Zig and Ninja
        run: |
          set -euo pipefail
          mkdir -p "$ZIG_TOOLCHAIN_CACHE" "$NINJA_TOOLCHAIN_CACHE"
          case "$(uname -m)" in
            arm64|aarch64) zig_arch="aarch64-macos" ;;
            x86_64|amd64) zig_arch="x86_64-macos" ;;
            *) echo "unsupported Zig CI architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          zig_dir="$ZIG_TOOLCHAIN_CACHE/zig-$zig_arch-$ZIG_VERSION"
          if [ ! -x "$zig_dir/zig" ]; then
            tmp="$(mktemp -d)"
            trap 'rm -rf "$tmp"' EXIT
            curl -fsSL "https://ziglang.org/download/$ZIG_VERSION/zig-$zig_arch-$ZIG_VERSION.tar.xz" -o "$tmp/zig.tar.xz"
            tar -C "$tmp" -xf "$tmp/zig.tar.xz"
            rm -rf "$zig_dir"
            mv "$tmp/zig-$zig_arch-$ZIG_VERSION" "$zig_dir"
          fi
          ninja_dir="$NINJA_TOOLCHAIN_CACHE/ninja-$NINJA_VERSION"
          if [ ! -x "$ninja_dir/ninja" ]; then
            tmp="$(mktemp -d)"
            trap 'rm -rf "$tmp"' EXIT
            curl -fsSL "https://github.com/ninja-build/ninja/releases/download/v$NINJA_VERSION/ninja-mac.zip" -o "$tmp/ninja.zip"
            unzip -q "$tmp/ninja.zip" -d "$tmp"
            chmod +x "$tmp/ninja"
            rm -rf "$ninja_dir"
            mkdir -p "$ninja_dir"
            mv "$tmp/ninja" "$ninja_dir/ninja"
          fi
          echo "$zig_dir" >> "$GITHUB_PATH"
          echo "$ninja_dir" >> "$GITHUB_PATH"

      - name: Bootstrap op
        run: |
          set -euo pipefail
          go run ./holons/grace-op/cmd/op env --init
          go run ./holons/grace-op/cmd/op build op --install --symlink
          eval "$(go run ./holons/grace-op/cmd/op env --shell)"
          echo "$OPBIN" >> "$GITHUB_PATH"
          {
            echo "OPPATH=$OPPATH"
            echo "OPBIN=$OPBIN"
          } >> "$GITHUB_ENV"

      - name: Run Flutter widget tests
        working-directory: examples/hello-world/gabriel-greeting-app-flutter/app
        run: |
          set -euo pipefail
          flutter pub get
          flutter test

      - name: Run SwiftUI package tests
        working-directory: examples/hello-world/gabriel-greeting-app-swiftui/Modules
        run: swift test

      - name: Build hardened composite apps
        run: |
          set -euo pipefail
          op build gabriel-greeting-app-flutter --hardened
          op build gabriel-greeting-app-swiftui --hardened

  cross-smoke:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: popok
    timeout-minutes: 240

    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-musl
          - x86_64-linux-musl
          - x86_64-windows-gnu
          - aarch64-ios
          # aarch64-linux-android suspended: cross-smoke fails on popok runner
          # (NDK setup / linker issue), under investigation. Re-add once green.

    env:
      ADER_CI_CACHE_BASE: /Users/popok/.ader-ci-cache
      ZIG_VERSION: 0.16.0
      ZIG_TOOLCHAIN_CACHE: /Users/popok/.ader-ci-cache/zig
      NINJA_VERSION: 1.13.1
      NINJA_TOOLCHAIN_CACHE: /Users/popok/.ader-ci-cache/ninja
      ZIG_HOLONS_JOBS: 8

    steps:
      - name: Loosen permissions on previous workspace
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          mkdir -p "$ADER_CI_CACHE_BASE"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Zig vendored submodules
        run: |
          set -euo pipefail
          rm -rf sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule sync --recursive sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule update --init --force --recursive --depth 1 --jobs 8 \
            sdk/zig-holons/third_party/grpc \
            sdk/zig-holons/third_party/protobuf-c

      - name: Install Zig and Ninja
        run: |
          set -euo pipefail
          mkdir -p "$ZIG_TOOLCHAIN_CACHE" "$NINJA_TOOLCHAIN_CACHE"
          case "$(uname -m)" in
            arm64|aarch64) zig_arch="aarch64-macos" ;;
            x86_64|amd64) zig_arch="x86_64-macos" ;;
            *) echo "unsupported Zig CI architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          zig_dir="$ZIG_TOOLCHAIN_CACHE/zig-$zig_arch-$ZIG_VERSION"
          if [ ! -x "$zig_dir/zig" ]; then
            tmp="$(mktemp -d)"
            trap 'rm -rf "$tmp"' EXIT
            curl -fsSL "https://ziglang.org/download/$ZIG_VERSION/zig-$zig_arch-$ZIG_VERSION.tar.xz" -o "$tmp/zig.tar.xz"
            tar -C "$tmp" -xf "$tmp/zig.tar.xz"
            rm -rf "$zig_dir"
            mv "$tmp/zig-$zig_arch-$ZIG_VERSION" "$zig_dir"
          fi
          ninja_dir="$NINJA_TOOLCHAIN_CACHE/ninja-$NINJA_VERSION"
          if [ ! -x "$ninja_dir/ninja" ]; then
            tmp="$(mktemp -d)"
            trap 'rm -rf "$tmp"' EXIT
            curl -fsSL "https://github.com/ninja-build/ninja/releases/download/v$NINJA_VERSION/ninja-mac.zip" -o "$tmp/ninja.zip"
            unzip -q "$tmp/ninja.zip" -d "$tmp"
            chmod +x "$tmp/ninja"
            rm -rf "$ninja_dir"
            mkdir -p "$ninja_dir"
            mv "$tmp/ninja" "$ninja_dir/ninja"
          fi
          echo "$zig_dir" >> "$GITHUB_PATH"
          echo "$ninja_dir" >> "$GITHUB_PATH"
          zig version
          ninja --version

      - name: Restore cross-smoke cache
        id: cross-cache
        uses: actions/cache/restore@v4
        with:
          path: sdk/zig-holons/.zig-cross/${{ matrix.target }}
          key: zig-sdk-cross-${{ matrix.target }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('sdk/zig-holons/tools/cross_smoke.sh', '.gitmodules') }}
          restore-keys: |
            zig-sdk-cross-${{ matrix.target }}-${{ runner.os }}-${{ runner.arch }}-

      - name: Run native gRPC cross-smoke
        run: sdk/zig-holons/tools/cross_smoke.sh "${{ matrix.target }}"

      - name: Save cross-smoke cache
        if: always() && steps.cross-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: sdk/zig-holons/.zig-cross/${{ matrix.target }}
          key: zig-sdk-cross-${{ matrix.target }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('sdk/zig-holons/tools/cross_smoke.sh', '.gitmodules') }}

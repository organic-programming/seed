# Reusable workflow: builds one (sdk, target) prebuilt tarball.
name: sdk-prebuilt-target

on:
  workflow_call:
    inputs:
      sdk:
        required: true
        type: string
      sdk-version:
        required: false
        type: string
        default: ''
      sdk-target:
        required: true
        type: string
      runs-on:
        required: true
        type: string
      continue-on-error:
        required: false
        type: boolean
        default: false
      needs-cpp-prefix:
        description: |
          Set to true for SDKs whose build needs the cpp prefix and
          target toolchain. The caller must depend on sdk-build-cpp so
          cpp-prefix-<target> exists before this reusable workflow runs.
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: ${{ inputs.sdk }} / ${{ inputs.sdk-target }}
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 240
    continue-on-error: ${{ inputs.continue-on-error }}

    env:
      SDK: ${{ inputs.sdk }}
      SDK_VERSION: ${{ inputs.sdk-version }}
      SDK_TARGET: ${{ inputs.sdk-target }}
      ZIG_VERSION: 0.16.0
      NINJA_VERSION: 1.13.1
      ZIG_HOLONS_JOBS: 8
      CPP_HOLONS_JOBS: 8
      C_HOLONS_JOBS: 8
      RUBY_HOLONS_JOBS: 4

    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          # Ceinture : détruire tout op-run-* de + de 24h (mtime)
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          # Wipe HOME .op courant
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          # Isoler ce run avec timestamp
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - name: Download op binary
        uses: actions/download-artifact@v4
        with:
          name: op-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load runner-managed CI cache env (self-hosted only)
        if: runner.environment == 'self-hosted'
        uses: ./.github/actions/load-mac-runner-env

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: false

      - name: Patch local seed-toolchain.yaml with target SDK version
        if: inputs.sdk-version != ''
        shell: bash
        run: |
          set -euo pipefail
          go run .github/scripts/seed_release_bump.go set-file seed-toolchain.yaml "${{ inputs.sdk-version }}"
          echo "Patched seed-toolchain.yaml seed_release to ${{ inputs.sdk-version }} for build."

      - name: Resolve Go cache paths
        id: go-cache-paths
        shell: bash
        run: |
          {
            echo "gomod=$(go env GOMODCACHE)"
            echo "gobuild=$(go env GOCACHE)"
          } >> "$GITHUB_OUTPUT"

      # On self-hosted, load-mac-runner-env points GOMODCACHE/GOCACHE at the
      # runner-managed persistent cache (e.g. /Users/popok/.ader-ci-cache/...).
      # That directory survives between runs and Go marks module sources
      # read-only by design, so actions/cache restore (which uses `tar -xf`)
      # fails with "Can't unlink already-existing object: Permission denied".
      # The runner-managed cache already provides persistence — we only need
      # actions/cache on cloud runners, where the workspace is ephemeral.
      - name: Cache Go modules and build cache
        if: runner.environment != 'self-hosted'
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.go-cache-paths.outputs.gomod }}
            ${{ steps.go-cache-paths.outputs.gobuild }}
          key: go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ runner.arch }}-

      # zig, cpp and c SDKs all build the same vendored grpc + protobuf-c
      # native deps. Mirror the pattern already used in pipeline.yml for
      # ader-bouquet-full: init the two outer submodules non-recursively,
      # then mark every grpc nested submodule we do NOT link against as
      # update=none, and finally do a recursive init on grpc (the skipped
      # entries are bypassed). This avoids fetching opentelemetry-cpp,
      # bloaty, envoy-api, googleapis, opencensus-proto, opentelemetry,
      # protoc-gen-validate, xds — none of which we use.
      # On popok the workspace persists between runs, so a stale
      # `.git/modules/.../index.lock` from a previously interrupted run
      # can block the next checkout (observed for opentelemetry-cpp in
      # run 26167799318). Wipe `.git/modules/…/{grpc,protobuf-c}` too.
      - name: Checkout Zig/C++ vendored submodules
        if: inputs.sdk == 'zig' || inputs.sdk == 'cpp' || inputs.sdk == 'c'
        run: |
          set -euo pipefail
          rm -rf sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          rm -rf .git/modules/sdk/zig-holons/third_party/grpc \
                 .git/modules/sdk/zig-holons/third_party/protobuf-c
          git submodule sync sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule update --init --force --depth 1 --jobs 8 \
            sdk/zig-holons/third_party/grpc \
            sdk/zig-holons/third_party/protobuf-c
          grpc=sdk/zig-holons/third_party/grpc
          for skip in \
            third_party/benchmark \
            third_party/bloaty \
            third_party/cel-spec \
            third_party/envoy-api \
            third_party/googleapis \
            third_party/googletest \
            third_party/opencensus-proto \
            third_party/opentelemetry \
            third_party/opentelemetry-cpp \
            third_party/protoc-gen-validate \
            third_party/xds \
          ; do
            git -C "$grpc" config submodule."$skip".update none
          done
          git -C "$grpc" submodule sync --recursive
          git -C "$grpc" submodule update --init --force --recursive --depth 1 --jobs 8

      - name: Install Linux packages
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config file

      - name: Install macOS packages
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew install cmake ninja pkg-config

      - name: Install Zig
        if: inputs.sdk == 'zig' || inputs.sdk == 'cpp' || inputs.sdk == 'c'
        shell: bash
        run: |
          set -euo pipefail
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64) zig_arch="x86_64-linux" ;;
            Linux-ARM64) zig_arch="aarch64-linux" ;;
            macOS-X64) zig_arch="x86_64-macos" ;;
            macOS-ARM64) zig_arch="aarch64-macos" ;;
            *) echo "unsupported Zig runner: ${RUNNER_OS}-${RUNNER_ARCH}" >&2; exit 1 ;;
          esac
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          zig_dir="${RUNNER_TEMP}/zig-${zig_arch}-${ZIG_VERSION}"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-${zig_arch}-${ZIG_VERSION}.tar.xz" -o "$tmp/zig.tar.xz"
          tar -C "$tmp" -xf "$tmp/zig.tar.xz"
          rm -rf "$zig_dir"
          mv "$tmp/zig-${zig_arch}-${ZIG_VERSION}" "$zig_dir"
          echo "$zig_dir" >> "$GITHUB_PATH"
          "$zig_dir/zig" version

      - name: Setup Ruby
        if: inputs.sdk == 'ruby' && runner.environment != 'self-hosted'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Setup Dart
        if: inputs.sdk == 'dart'
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Restore SDK prebuilt output cache
        id: prebuilt-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            sdk/zig-holons/.zig-prebuilt/${{ inputs.sdk-target }}
            sdk/cpp-holons/.cpp-prebuilt/${{ inputs.sdk-target }}
            sdk/c-holons/.c-prebuilt/${{ inputs.sdk-target }}
            sdk/ruby-holons/.ruby-prebuilt/${{ inputs.sdk-target }}
            sdk/${{ inputs.sdk }}-holons/.codegen-prebuilt/${{ inputs.sdk-target }}
            dist/sdk-prebuilts/${{ inputs.sdk }}/${{ inputs.sdk-target }}
          key: sdk-prebuilt-${{ inputs.sdk }}-${{ inputs.sdk-target }}-v${{ inputs.sdk-version || 'default' }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('seed-toolchain.yaml', '.github/scripts/build-prebuilt-*.sh', '.github/scripts/lib-codegen-prebuilt.sh', '.github/scripts/go.mod', '.github/scripts/go.sum', '.github/scripts/seed_toolchain.go', '.github/scripts/seed_toolchain/**', 'holons/grace-op/cmd/protoc-gen-op-adapter/**', 'holons/grace-op/cmd/protoc-gen-op-noop/**', 'sdk/zig-holons/build.zig', 'sdk/zig-holons/tools/cross_smoke.sh', 'sdk/cpp-holons/CMakeLists.txt', 'sdk/c-holons/Makefile', 'sdk/ruby-holons/Gemfile', 'sdk/ruby-holons/Gemfile.lock', '.gitmodules') }}
          restore-keys: |
            sdk-prebuilt-${{ inputs.sdk }}-${{ inputs.sdk-target }}-v${{ inputs.sdk-version || 'default' }}-${{ runner.os }}-${{ runner.arch }}-

      - name: Download cpp prefix artifact
        if: inputs.needs-cpp-prefix
        uses: actions/download-artifact@v4
        with:
          name: cpp-prefix-${{ inputs.sdk-target }}
          path: sdk/cpp-holons/.cpp-prebuilt/${{ inputs.sdk-target }}

      - name: Restore exec bits on downloaded artifacts
        if: inputs.needs-cpp-prefix
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done
          target_dir="sdk/cpp-holons/.cpp-prebuilt/${SDK_TARGET}"
          for d in "$target_dir/prefix/bin" "$target_dir/toolchain"; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Build SDK prebuilt
        id: build_prebuilt
        shell: bash
        continue-on-error: ${{ inputs.continue-on-error }}
        run: .github/scripts/build-prebuilt-${SDK}.sh

      - name: Record allowed prebuilt failure
        if: inputs.continue-on-error && steps.build_prebuilt.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::${SDK}/${SDK_TARGET} prebuilt build failed on an allowed-failure matrix leg."

      - name: Upload SDK artifact
        if: steps.build_prebuilt.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: sdk-${{ inputs.sdk }}-${{ inputs.sdk-target }}
          path: dist/sdk-prebuilts/${{ inputs.sdk }}/${{ inputs.sdk-target }}/*
          if-no-files-found: error

      - name: Upload cpp prefix for downstream SDKs
        if: inputs.sdk == 'cpp' && steps.build_prebuilt.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cpp-prefix-${{ inputs.sdk-target }}
          path: |
            sdk/cpp-holons/.cpp-prebuilt/${{ inputs.sdk-target }}/prefix
            sdk/cpp-holons/.cpp-prebuilt/${{ inputs.sdk-target }}/toolchain
          if-no-files-found: error
          retention-days: 1

      - name: Save SDK prebuilt output cache
        if: steps.build_prebuilt.outcome == 'success' && steps.prebuilt-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            sdk/zig-holons/.zig-prebuilt/${{ inputs.sdk-target }}
            sdk/cpp-holons/.cpp-prebuilt/${{ inputs.sdk-target }}
            sdk/c-holons/.c-prebuilt/${{ inputs.sdk-target }}
            sdk/ruby-holons/.ruby-prebuilt/${{ inputs.sdk-target }}
            sdk/${{ inputs.sdk }}-holons/.codegen-prebuilt/${{ inputs.sdk-target }}
            dist/sdk-prebuilts/${{ inputs.sdk }}/${{ inputs.sdk-target }}
          key: sdk-prebuilt-${{ inputs.sdk }}-${{ inputs.sdk-target }}-v${{ inputs.sdk-version || 'default' }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('seed-toolchain.yaml', '.github/scripts/build-prebuilt-*.sh', '.github/scripts/lib-codegen-prebuilt.sh', '.github/scripts/go.mod', '.github/scripts/go.sum', '.github/scripts/seed_toolchain.go', '.github/scripts/seed_toolchain/**', 'holons/grace-op/cmd/protoc-gen-op-adapter/**', 'holons/grace-op/cmd/protoc-gen-op-noop/**', 'sdk/zig-holons/build.zig', 'sdk/zig-holons/tools/cross_smoke.sh', 'sdk/cpp-holons/CMakeLists.txt', 'sdk/c-holons/Makefile', 'sdk/ruby-holons/Gemfile', 'sdk/ruby-holons/Gemfile.lock', '.gitmodules') }}

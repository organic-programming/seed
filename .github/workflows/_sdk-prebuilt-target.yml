# Reusable workflow: builds one (sdk, target) prebuilt tarball.
# Triggers: workflow_call only — invoked by sdk-prebuilts.yml.
# Owns: per-target build script execution + artifact upload.
name: sdk-prebuilt-target

on:
  workflow_call:
    inputs:
      sdk:
        required: true
        type: string
      sdk-version:
        required: true
        type: string
      sdk-target:
        required: true
        type: string
      runs-on:
        required: true
        type: string
      continue-on-error:
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: ${{ inputs.sdk }} / ${{ inputs.sdk-target }}
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 240
    continue-on-error: ${{ inputs.continue-on-error }}

    env:
      SDK: ${{ inputs.sdk }}
      SDK_VERSION: ${{ inputs.sdk-version }}
      SDK_TARGET: ${{ inputs.sdk-target }}
      ZIG_VERSION: 0.16.0
      NINJA_VERSION: 1.13.1
      ZIG_HOLONS_JOBS: 8
      CPP_HOLONS_JOBS: 8
      C_HOLONS_JOBS: 8
      RUBY_HOLONS_JOBS: 4

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache-dependency-path: '**/go.sum'

      - name: Checkout Zig vendored submodules
        if: inputs.sdk == 'zig'
        run: |
          set -euo pipefail
          rm -rf sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule sync --recursive sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule update --init --force --recursive --depth 1 --jobs 8 \
            sdk/zig-holons/third_party/grpc \
            sdk/zig-holons/third_party/protobuf-c

      - name: Checkout C++ native dependency submodules
        if: inputs.sdk == 'cpp' || inputs.sdk == 'c'
        run: |
          set -euo pipefail
          rm -rf sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule sync --recursive sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule update --init --force --depth 1 --jobs 8 \
            sdk/zig-holons/third_party/grpc \
            sdk/zig-holons/third_party/protobuf-c
          git -C sdk/zig-holons/third_party/grpc submodule sync --recursive \
            third_party/abseil-cpp \
            third_party/boringssl-with-bazel \
            third_party/cares/cares \
            third_party/protobuf \
            third_party/re2 \
            third_party/zlib
          git -C sdk/zig-holons/third_party/grpc submodule update --init --force --depth 1 --jobs 8 \
            third_party/abseil-cpp \
            third_party/boringssl-with-bazel \
            third_party/cares/cares \
            third_party/protobuf \
            third_party/re2 \
            third_party/zlib

      - name: Install Linux packages
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config file

      - name: Install macOS packages
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew install cmake ninja pkg-config

      - name: Install Zig
        if: inputs.sdk == 'zig' || inputs.sdk == 'cpp' || inputs.sdk == 'c'
        shell: bash
        run: |
          set -euo pipefail
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64) zig_arch="x86_64-linux" ;;
            Linux-ARM64) zig_arch="aarch64-linux" ;;
            macOS-X64) zig_arch="x86_64-macos" ;;
            macOS-ARM64) zig_arch="aarch64-macos" ;;
            *) echo "unsupported Zig runner: ${RUNNER_OS}-${RUNNER_ARCH}" >&2; exit 1 ;;
          esac
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          zig_dir="${RUNNER_TEMP}/zig-${zig_arch}-${ZIG_VERSION}"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-${zig_arch}-${ZIG_VERSION}.tar.xz" -o "$tmp/zig.tar.xz"
          tar -C "$tmp" -xf "$tmp/zig.tar.xz"
          rm -rf "$zig_dir"
          mv "$tmp/zig-${zig_arch}-${ZIG_VERSION}" "$zig_dir"
          echo "$zig_dir" >> "$GITHUB_PATH"
          "$zig_dir/zig" version

      - name: Setup Ruby
        if: inputs.sdk == 'ruby'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Setup Dart
        if: inputs.sdk == 'dart'
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Restore SDK prebuilt output cache
        id: prebuilt-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            sdk/zig-holons/.zig-prebuilt/${{ inputs.sdk-target }}
            sdk/cpp-holons/.cpp-prebuilt/${{ inputs.sdk-target }}
            sdk/c-holons/.c-prebuilt/${{ inputs.sdk-target }}
            sdk/ruby-holons/.ruby-prebuilt/${{ inputs.sdk-target }}
            sdk/${{ inputs.sdk }}-holons/.codegen-prebuilt/${{ inputs.sdk-target }}
            dist/sdk-prebuilts/${{ inputs.sdk }}/${{ inputs.sdk-target }}
          key: sdk-prebuilt-${{ inputs.sdk }}-${{ inputs.sdk-target }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/scripts/build-prebuilt-*.sh', '.github/scripts/lib-codegen-prebuilt.sh', 'holons/grace-op/cmd/protoc-gen-op-adapter/**', 'holons/grace-op/cmd/protoc-gen-op-noop/**', 'sdk/zig-holons/build.zig', 'sdk/zig-holons/tools/cross_smoke.sh', 'sdk/cpp-holons/CMakeLists.txt', 'sdk/c-holons/Makefile', 'sdk/ruby-holons/Gemfile', 'sdk/ruby-holons/Gemfile.lock', '.gitmodules') }}
          restore-keys: |
            sdk-prebuilt-${{ inputs.sdk }}-${{ inputs.sdk-target }}-${{ runner.os }}-${{ runner.arch }}-

      - name: Build SDK prebuilt
        id: build_prebuilt
        shell: bash
        continue-on-error: ${{ inputs.continue-on-error }}
        run: .github/scripts/build-prebuilt-${SDK}.sh

      - name: Record allowed prebuilt failure
        if: inputs.continue-on-error && steps.build_prebuilt.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::${SDK}/${SDK_TARGET} prebuilt build failed on an allowed-failure matrix leg."

      - name: Upload artifacts
        if: steps.build_prebuilt.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.sdk }}-${{ inputs.sdk-version }}-${{ inputs.sdk-target }}
          path: dist/sdk-prebuilts/${{ inputs.sdk }}/${{ inputs.sdk-target }}/*
          if-no-files-found: error

      - name: Save SDK prebuilt output cache
        if: steps.build_prebuilt.outcome == 'success' && steps.prebuilt-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            sdk/zig-holons/.zig-prebuilt/${{ inputs.sdk-target }}
            sdk/cpp-holons/.cpp-prebuilt/${{ inputs.sdk-target }}
            sdk/c-holons/.c-prebuilt/${{ inputs.sdk-target }}
            sdk/ruby-holons/.ruby-prebuilt/${{ inputs.sdk-target }}
            sdk/${{ inputs.sdk }}-holons/.codegen-prebuilt/${{ inputs.sdk-target }}
            dist/sdk-prebuilts/${{ inputs.sdk }}/${{ inputs.sdk-target }}
          key: sdk-prebuilt-${{ inputs.sdk }}-${{ inputs.sdk-target }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/scripts/build-prebuilt-*.sh', '.github/scripts/lib-codegen-prebuilt.sh', 'holons/grace-op/cmd/protoc-gen-op-adapter/**', 'holons/grace-op/cmd/protoc-gen-op-noop/**', 'sdk/zig-holons/build.zig', 'sdk/zig-holons/tools/cross_smoke.sh', 'sdk/cpp-holons/CMakeLists.txt', 'sdk/c-holons/Makefile', 'sdk/ruby-holons/Gemfile', 'sdk/ruby-holons/Gemfile.lock', '.gitmodules') }}

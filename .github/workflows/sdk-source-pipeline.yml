          set -euo pipefail
          if ! command -v grpcurl >/dev/null 2>&1; then
            go install github.com/fullstorydev/grpcurl/cmd/grpcurl@v1.9.3
          fi
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run ader bouquet
        run: ader test-bouquet ader --name "$BOUQUET"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ader-reports-${{ github.run_id }}
          path: |
            ader/reports/bouquets/**
            ader/catalogues/*/reports/**
          retention-days: 14
          if-no-files-found: warn

  sdk-deep-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: sdk-deep-tests (${{ matrix.lang }}, host)
    runs-on: [self-hosted, macOS]
    needs: fresh-sdk-delivery
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        lang: [zig, go, python, dart, java, kotlin, csharp, js, ruby, rust, swift, c, cpp, js-web]
    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Setup Ruby
        if: matrix.lang == 'ruby'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Resolve host SDK target
        id: host
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "unsupported macOS runner architecture: $(uname -m)" >&2; exit 2 ;;
          esac
          echo "SDK_TARGET=$target" >> "$GITHUB_ENV"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Download op binary
        uses: actions/download-artifact@v4
        with:
          name: op-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download ader binary
        uses: actions/download-artifact@v4
        with:
          name: ader-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download SDK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sdk-*-${{ steps.host.outputs.target }}
          path: ${{ runner.temp }}/sdk-artifacts

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Checkout Zig vendored submodules
        run: |
          set -euo pipefail
          rm -rf sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule sync --recursive sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule update --init --force --recursive --depth 1 --jobs 8 \
            sdk/zig-holons/third_party/grpc \
            sdk/zig-holons/third_party/protobuf-c

      - name: Install SDK artifacts into isolated OPPATH
        shell: bash
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r archive; do
            found=1
            base="$(basename "$archive" .tar.gz)"
            lang="${base%%-holons-v*}"
            rest="${base#${lang}-holons-v}"
            version="${rest%-${SDK_TARGET}}"
            dest="$OPPATH/sdk/$lang/$version/$SDK_TARGET"
            rm -rf "$dest"
            mkdir -p "$dest"
            tar -C "$dest" -xzf "$archive"
            env_name="OP_SDK_$(printf '%s' "$lang" | tr '[:lower:]-' '[:upper:]_')_PATH"
            echo "$env_name=$dest" >> "$GITHUB_ENV"
          done < <(find "$RUNNER_TEMP/sdk-artifacts" -type f -name '*-holons-v*.tar.gz' ! -name '*-debug.tar.gz' | sort)
          if [ "$found" -ne 1 ]; then
            echo "no SDK archives found for $SDK_TARGET" >&2
            exit 1
          fi

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Run SDK host deep tests
        shell: bash
        run: |
          set -euo pipefail
          run_lifecycle() {
            local slug="$1"
            op build "$slug"
            op test "$slug"
            op clean "$slug"
            op build "$slug"
          }
          ensure_grpcurl() {
            if ! command -v grpcurl >/dev/null 2>&1; then
              go install github.com/fullstorydev/grpcurl/cmd/grpcurl@v1.9.3
            fi
            export PATH="$(go env GOPATH)/bin:$PATH"
          }

          case "${{ matrix.lang }}" in
            zig)
              find sdk/zig-holons examples/hello-world/gabriel-greeting-zig \
                -name '*.zig' \
                -not -path '*/.zig-cache/*' \
                -not -path '*/zig-out/*' \
                -print0 | xargs -0 zig fmt --check
              (cd sdk/zig-holons && zig build vendor && zig build test && zig build test-c-abi)
              run_lifecycle gabriel-greeting-zig
              ;;
            go)
              unformatted="$(gofmt -l sdk/go-holons examples/hello-world/gabriel-greeting-go)"
              if [ -n "$unformatted" ]; then
                echo "$unformatted"
                exit 1
              fi
              (cd sdk/go-holons && go vet ./... && go test ./...)
              run_lifecycle gabriel-greeting-go
              ;;
            python)
              python3 -m venv "$RUNNER_TEMP/python-holons-venv"
              . "$RUNNER_TEMP/python-holons-venv/bin/activate"
              (cd sdk/js-web-holons && npm install)
              (cd sdk/python-holons && python -m pip install --upgrade pip && python -m pip install -e '.[dev]' && python -m pytest)
              run_lifecycle gabriel-greeting-python
              ;;
            dart)
              (cd sdk/dart-holons && dart pub get && dart format --output=none --set-exit-if-changed . && dart test)
              run_lifecycle gabriel-greeting-dart
              ;;
            java)
              (cd sdk/java-holons && chmod +x ./gradlew && ./gradlew test)
              run_lifecycle gabriel-greeting-java
              ;;
            kotlin)
              (cd sdk/kotlin-holons && chmod +x ./gradlew && ./gradlew test)
              run_lifecycle gabriel-greeting-kotlin
              ;;
            csharp)
              (cd sdk/csharp-holons && dotnet format whitespace csharp-holons.sln --verify-no-changes && dotnet test csharp-holons.sln)
              run_lifecycle gabriel-greeting-csharp
              ;;
            js)
              (cd sdk/js-holons && npm install && if [ -d tests ]; then npm test; else echo "no js-holons tests configured"; fi)
              run_lifecycle gabriel-greeting-node
              ;;
            js-web)
              (cd sdk/js-web-holons && npm install && npm test)
              ;;
            ruby)
              (
                cd sdk/ruby-holons
                bundler_version="$(awk 'found { print $1; exit } $0 == "BUNDLED WITH" { found = 1 }' Gemfile.lock)"
                user_gem_bin="$(ruby -rrubygems -e 'puts File.join(Gem.user_dir, "bin")')"
                gem install --user-install --no-document bundler -v "$bundler_version"
                export PATH="$user_gem_bin:$PATH"
                export BUNDLE_PATH="${BUNDLE_PATH:-$PWD/.bundle}"
                bundle "_${bundler_version}_" install
                bundle "_${bundler_version}_" exec rake test
              )
              run_lifecycle gabriel-greeting-ruby
              ;;
            rust)
              (cd sdk/rust-holons && cargo fmt --check && cargo clippy --all-targets && cargo test)
              run_lifecycle gabriel-greeting-rust
              ;;
            swift)
              if command -v swift-format >/dev/null 2>&1; then
                (cd sdk/swift-holons && swift-format lint --recursive Sources Tests)
              else
                echo "swift-format not installed; skipping Swift format lint"
              fi
              (cd sdk/swift-holons && swift test)
              run_lifecycle gabriel-greeting-swift
              ;;
            c)
              ensure_grpcurl
              (cd sdk/c-holons && make test)
              run_lifecycle gabriel-greeting-c
              ;;
            cpp)
              cmake -S sdk/cpp-holons -B "$RUNNER_TEMP/cpp-holons-build" -G Ninja
              cmake --build "$RUNNER_TEMP/cpp-holons-build"
              (cd sdk/cpp-holons && "$RUNNER_TEMP/cpp-holons-build/test_runner")
              ctest --test-dir "$RUNNER_TEMP/cpp-holons-build" --output-on-failure
              run_lifecycle gabriel-greeting-cpp
              ;;
            *)
              echo "unknown SDK deep-test language: ${{ matrix.lang }}" >&2
              exit 2
              ;;
          esac

      - name: Upload SDK host deep-test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-deep-${{ matrix.lang }}-host-reports-${{ github.run_id }}
          path: |
            ader/catalogues/*/reports/**
            ader/reports/**
          retention-days: 14
          if-no-files-found: warn

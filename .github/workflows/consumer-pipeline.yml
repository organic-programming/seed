        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "unsupported macOS runner architecture: $(uname -m)" >&2; exit 2 ;;
          esac
          echo "SDK_TARGET=$target" >> "$GITHUB_ENV"
          echo "target=$target" >> "$GITHUB_OUTPUT"


          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Download op binary
        uses: actions/download-artifact@v4

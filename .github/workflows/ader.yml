name: ader

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:
    inputs:
      bouquet:
        description: bouquet name under ader/bouquets/
        required: false
        default: local-dev

# Ader takes a per-catalogue filesystem lock; queueing two runs on the same ref
# wastes runner time. Cancel any in-flight run on the same ref before starting.
concurrency:
  group: ader-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bouquet:
    # Self-hosted runners executing code from a forked PR are a classic RCE
    # vector. Block it unconditionally here; only same-repo PRs, pushes, and
    # manual dispatches are allowed to land on popok-noctambule.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    # Routes to the runner carrying the `popok` custom label. The runner is
    # *named* popok-noctambule but its label is `popok` — matching is by
    # label, not by runner name.
    runs-on: popok

    timeout-minutes: 240

    env:
      BOUQUET: ${{ github.event.inputs.bouquet || 'local-dev' }}
      # Persist slow SDK bootstraps (Ruby grpc gem, Swift packages, Go
      # modules, etc.) OUTSIDE the workspace. `actions/checkout@v4` wipes
      # the workspace on every run; caches placed here survive. ader's
      # `runEnvironment` honors these outer values.
      ADER_CI_CACHE_BASE: /Users/popok/.ader-ci-cache
      GRACE_OP_SHARED_CACHE_DIR: /Users/popok/.ader-ci-cache/grace-op-shared
      GOMODCACHE: /Users/popok/.ader-ci-cache/go-mod
      GOCACHE: /Users/popok/.ader-ci-cache/go-build
      BUNDLE_PATH: /Users/popok/.ader-ci-cache/bundle
      PUB_CACHE: /Users/popok/.ader-ci-cache/dart-pub
      npm_config_cache: /Users/popok/.ader-ci-cache/npm
      GRADLE_USER_HOME: /Users/popok/.ader-ci-cache/gradle
      NUGET_PACKAGES: /Users/popok/.ader-ci-cache/nuget
      DOTNET_CLI_HOME: /Users/popok/.ader-ci-cache/dotnet-home
      ZIG_VERSION: 0.16.0
      ZIG_TOOLCHAIN_CACHE: /Users/popok/.ader-ci-cache/zig
      NINJA_VERSION: 1.13.1
      NINJA_TOOLCHAIN_CACHE: /Users/popok/.ader-ci-cache/ninja

    steps:
      # Go module cache files are installed read-only. When checkout tries
      # to delete the previous run's workspace contents, `rmdir`/`unlink`
      # fails with EACCES on those files. Loosen permissions first so the
      # delete succeeds. No-op on the very first run (workspace missing).
      - name: Loosen permissions on previous workspace
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          mkdir -p "$ADER_CI_CACHE_BASE"

      - uses: actions/checkout@v4
        with:
          # ader reads commit/branch metadata via git; shallow clones can
          # misreport. Full history is cheap and accurate.
          fetch-depth: 0

      - name: Checkout Zig vendored submodules
        run: |
          set -euo pipefail
          rm -rf sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule sync --recursive sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule update --init --force --recursive --depth 1 --jobs 8 \
            sdk/zig-holons/third_party/grpc \
            sdk/zig-holons/third_party/protobuf-c
          test -f sdk/zig-holons/third_party/grpc/CMakeLists.txt
          test -d sdk/zig-holons/third_party/protobuf-c/build-cmake

      - name: Install Zig toolchain
        run: |
          set -euo pipefail
          mkdir -p "$ZIG_TOOLCHAIN_CACHE"
          case "$(uname -m)" in
            arm64|aarch64) zig_arch="aarch64-macos" ;;
            x86_64|amd64) zig_arch="x86_64-macos" ;;
            *) echo "unsupported Zig CI architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          zig_dir="$ZIG_TOOLCHAIN_CACHE/zig-$zig_arch-$ZIG_VERSION"
          if [ ! -x "$zig_dir/zig" ]; then
            tmp="$(mktemp -d)"
            trap 'rm -rf "$tmp"' EXIT
            url="https://ziglang.org/download/$ZIG_VERSION/zig-$zig_arch-$ZIG_VERSION.tar.xz"
            curl -fsSL "$url" -o "$tmp/zig.tar.xz"
            tar -C "$tmp" -xf "$tmp/zig.tar.xz"
            rm -rf "$zig_dir"
            mv "$tmp/zig-$zig_arch-$ZIG_VERSION" "$zig_dir"
          fi
          "$zig_dir/zig" version
          echo "$zig_dir" >> "$GITHUB_PATH"

      - name: Install Ninja build tool
        run: |
          set -euo pipefail
          mkdir -p "$NINJA_TOOLCHAIN_CACHE"
          ninja_dir="$NINJA_TOOLCHAIN_CACHE/ninja-$NINJA_VERSION"
          if [ ! -x "$ninja_dir/ninja" ]; then
            tmp="$(mktemp -d)"
            trap 'rm -rf "$tmp"' EXIT
            curl -fsSL "https://github.com/ninja-build/ninja/releases/download/v$NINJA_VERSION/ninja-mac.zip" -o "$tmp/ninja.zip"
            unzip -q "$tmp/ninja.zip" -d "$tmp"
            chmod +x "$tmp/ninja"
            rm -rf "$ninja_dir"
            mkdir -p "$ninja_dir"
            mv "$tmp/ninja" "$ninja_dir/ninja"
          fi
          "$ninja_dir/ninja" --version
          echo "$ninja_dir" >> "$GITHUB_PATH"

      - name: Verify toolchain presence
        run: |
          set -euo pipefail
          echo "::group::go"
          go version
          echo "::endgroup::"
          echo "::group::ruby"
          ruby --version
          bundle --version
          echo "::endgroup::"
          echo "::group::zig"
          zig version
          echo "::endgroup::"
          echo "::group::ninja"
          ninja --version
          echo "::endgroup::"

      # Self-hosted runners persist ADER_CI_CACHE_BASE naturally between
      # runs, so this is a defensive restore for the case where the runner
      # is recreated. The cache path is outside $GITHUB_WORKSPACE so it
      # survives checkout wiping the workspace.
      - name: Restore op-managed SDK cache
        uses: actions/cache/restore@v4
        with:
          path: /Users/popok/.ader-ci-cache/grace-op-shared
          key: ader-sdk-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('examples/hello-world/*/Gemfile.lock', 'sdk/*/Gemfile') }}
          restore-keys: |
            ader-sdk-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Go proto generators
        run: |
          set -euo pipefail
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Bootstrap op and ader
        # Fresh checkout has no installed op; use the canonical escape hatch
        # for the first compile, then every subsequent build goes through
        # `op build ... --install`.
        run: |
          set -euo pipefail
          go run ./holons/grace-op/cmd/op env --init
          go run ./holons/grace-op/cmd/op build op --install --symlink
          eval "$(go run ./holons/grace-op/cmd/op env --shell)"
          op build clem-ader --install --symlink
          echo "$OPBIN" >> "$GITHUB_PATH"
          {
            echo "OPPATH=$OPPATH"
            echo "OPBIN=$OPBIN"
          } >> "$GITHUB_ENV"

      - name: Install native SDK prebuilts
        id: sdk-prebuilts
        run: |
          set -euo pipefail
          for sdk in zig c cpp ruby; do
            op sdk install "$sdk"
            sdk_path="$(op sdk path "$sdk")"
            sdk_env="OP_SDK_$(printf '%s' "$sdk" | tr '[:lower:]' '[:upper:]')_PATH"
            echo "$sdk_env=$sdk_path" >> "$GITHUB_ENV"
            if [ "$sdk" = ruby ]; then
              ruby_version="$(awk -F= '$1 == "ruby_version" { print $2 }' "$sdk_path/share/prebuilt.env")"
              echo "ruby_version=$ruby_version" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Select Ruby runtime for SDK prebuilt
        if: steps.sdk-prebuilts.outputs.ruby_version != ''
        run: |
          set -euo pipefail
          ruby_version="${{ steps.sdk-prebuilts.outputs.ruby_version }}"
          ruby_minor="$(printf '%s\n' "$ruby_version" | awk -F. '{ print $1 "." $2 }')"
          formula="ruby@$ruby_minor"
          if ! command -v brew >/dev/null 2>&1; then
            echo "Homebrew is required to select $formula for the Ruby SDK prebuilt" >&2
            exit 1
          fi
          ruby_dir=""
          for prefix in "$(brew --prefix)" /opt/homebrew /usr/local; do
            if [ -x "$prefix/opt/$formula/bin/ruby" ] && [ -x "$prefix/opt/$formula/bin/bundle" ]; then
              ruby_dir="$prefix/opt/$formula/bin"
              break
            fi
          done
          if [ -z "$ruby_dir" ]; then
            brew install "$formula"
            for prefix in "$(brew --prefix)" /opt/homebrew /usr/local; do
              if [ -x "$prefix/opt/$formula/bin/ruby" ] && [ -x "$prefix/opt/$formula/bin/bundle" ]; then
                ruby_dir="$prefix/opt/$formula/bin"
                break
              fi
            done
          fi
          if [ -z "$ruby_dir" ]; then
            echo "Could not locate $formula after installation" >&2
            exit 1
          fi
          "$ruby_dir/ruby" -e 'minor = ARGV.fetch(0); abort("Ruby #{RUBY_VERSION} does not match #{minor}.x") unless RUBY_VERSION.start_with?("#{minor}.")' "$ruby_minor"
          "$ruby_dir/bundle" --version
          echo "$ruby_dir" >> "$GITHUB_PATH"

      - name: Run ader bouquet
        # Non-zero exit when any entry fails. GitHub then marks the run red,
        # which triggers the standard failure notifications (email + mobile).
        run: ader test-bouquet ader --name "$BOUQUET"

      - name: Publish bouquet summary
        if: always()
        run: |
          set -euo pipefail
          latest="$(ls -1dt ader/reports/bouquets/* 2>/dev/null | head -n1 || true)"
          if [ -n "$latest" ] && [ -f "$latest/summary.md" ]; then
            {
              echo "## ader bouquet: $BOUQUET"
              echo
              cat "$latest/summary.md"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ader-reports-${{ github.run_id }}
          path: |
            ader/reports/bouquets/**
            ader/catalogues/*/reports/**
          retention-days: 14
          if-no-files-found: warn

      - name: Cleanup per-run artifacts
        # Prunes tmp stores and orphan snapshots; preserves tool-cache/ so
        # grace-op-shared survives for the next run.
        if: always()
        run: |
          set -euo pipefail
          for cat in ader/catalogues/*/; do
            ader cleanup "$cat" || true
          done

name: ader

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:
    inputs:
      bouquet:
        description: bouquet name under ader/bouquets/
        required: false
        default: local-dev

# Ader takes a per-catalogue filesystem lock; queueing two runs on the same ref
# wastes runner time. Cancel any in-flight run on the same ref before starting.
concurrency:
  group: ader-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bouquet:
    # Self-hosted runners executing code from a forked PR are a classic RCE
    # vector. Block it unconditionally here; only same-repo PRs, pushes, and
    # manual dispatches are allowed to land on popok-noctambule.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    # Routes to the runner carrying the `popok` custom label. The runner is
    # *named* popok-noctambule but its label is `popok` — matching is by
    # label, not by runner name.
    runs-on: popok

    timeout-minutes: 240

    env:
      BOUQUET: ${{ github.event.inputs.bouquet || 'local-dev' }}
      # Persist slow SDK bootstraps (Ruby grpc gem, Swift packages, Go
      # modules, etc.) OUTSIDE the workspace. `actions/checkout@v4` wipes
      # the workspace on every run; caches placed here survive. ader's
      # `runEnvironment` honors these outer values.
      ADER_CI_CACHE_BASE: /Users/popok/.ader-ci-cache
      GRACE_OP_SHARED_CACHE_DIR: /Users/popok/.ader-ci-cache/grace-op-shared
      GOMODCACHE: /Users/popok/.ader-ci-cache/go-mod
      GOCACHE: /Users/popok/.ader-ci-cache/go-build
      BUNDLE_PATH: /Users/popok/.ader-ci-cache/bundle
      PUB_CACHE: /Users/popok/.ader-ci-cache/dart-pub
      npm_config_cache: /Users/popok/.ader-ci-cache/npm
      GRADLE_USER_HOME: /Users/popok/.ader-ci-cache/gradle
      NUGET_PACKAGES: /Users/popok/.ader-ci-cache/nuget
      DOTNET_CLI_HOME: /Users/popok/.ader-ci-cache/dotnet-home

    steps:
      # Go module cache files are installed read-only. When checkout tries
      # to delete the previous run's workspace contents, `rmdir`/`unlink`
      # fails with EACCES on those files. Loosen permissions first so the
      # delete succeeds. No-op on the very first run (workspace missing).
      - name: Loosen permissions on previous workspace
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          mkdir -p "$ADER_CI_CACHE_BASE"

      - uses: actions/checkout@v4
        with:
          # ader reads commit/branch metadata via git; shallow clones can
          # misreport. Full history is cheap and accurate.
          fetch-depth: 0

      - name: Verify toolchain presence
        run: |
          set -euo pipefail
          echo "::group::go"
          go version
          echo "::endgroup::"
          echo "::group::ruby"
          ruby --version
          bundle --version
          echo "::endgroup::"

      # Self-hosted runners persist ADER_CI_CACHE_BASE naturally between
      # runs, so this is a defensive restore for the case where the runner
      # is recreated. The cache path is outside $GITHUB_WORKSPACE so it
      # survives checkout wiping the workspace.
      - name: Restore op-managed SDK cache
        uses: actions/cache@v4
        with:
          path: /Users/popok/.ader-ci-cache/grace-op-shared
          key: ader-sdk-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('examples/hello-world/*/Gemfile.lock', 'sdk/**/Gemfile') }}
          restore-keys: |
            ader-sdk-${{ runner.os }}-${{ runner.arch }}-

      - name: Bootstrap op and ader
        # Fresh checkout has no installed op; use the canonical escape hatch
        # for the first compile, then every subsequent build goes through
        # `op build ... --install`.
        run: |
          set -euo pipefail
          go run ./holons/grace-op/cmd/op env --init
          go run ./holons/grace-op/cmd/op build op --install --symlink
          eval "$(go run ./holons/grace-op/cmd/op env --shell)"
          op build clem-ader --install --symlink
          echo "$OPBIN" >> "$GITHUB_PATH"
          {
            echo "OPPATH=$OPPATH"
            echo "OPBIN=$OPBIN"
          } >> "$GITHUB_ENV"

      - name: Run ader bouquet
        # Non-zero exit when any entry fails. GitHub then marks the run red,
        # which triggers the standard failure notifications (email + mobile).
        run: ader test-bouquet ader --name "$BOUQUET"

      - name: Publish bouquet summary
        if: always()
        run: |
          set -euo pipefail
          latest="$(ls -1dt ader/reports/bouquets/* 2>/dev/null | head -n1 || true)"
          if [ -n "$latest" ] && [ -f "$latest/summary.md" ]; then
            {
              echo "## ader bouquet: $BOUQUET"
              echo
              cat "$latest/summary.md"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ader-reports-${{ github.run_id }}
          path: |
            ader/reports/bouquets/**
            ader/catalogues/*/reports/**
          retention-days: 14
          if-no-files-found: warn

      - name: Cleanup per-run artifacts
        # Prunes tmp stores and orphan snapshots; preserves tool-cache/ so
        # grace-op-shared survives for the next run.
        if: always()
        run: |
          set -euo pipefail
          for cat in ader/catalogues/*/; do
            ader cleanup "$cat" || true
          done

name: observability-cascade-validation

on:
  pull_request:
    branches: [master]
    paths:
      - "sdk/**"
      - "examples/observability-cascade/**"
      - "examples/hello-world/**"
      - "scripts/pre-validate-cascade.sh"
      - ".github/workflows/observability-cascade-validation.yml"
      - ".github/workflows/pipeline.yml"
  push:
    branches: [master]
    paths:
      - "sdk/**"
      - "examples/observability-cascade/**"
      - "examples/hello-world/**"
      - "scripts/pre-validate-cascade.sh"
      - ".github/workflows/observability-cascade-validation.yml"
      - ".github/workflows/pipeline.yml"
  workflow_dispatch:

concurrency:
  group: observability-cascade-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOTOOLCHAIN: auto
  ZIG_VERSION: 0.16.0
  NINJA_VERSION: 1.13.1
  ZIG_HOLONS_JOBS: 8
  CPP_HOLONS_JOBS: 8
  C_HOLONS_JOBS: 8
  RUBY_HOLONS_JOBS: 4
  CASCADE_STRESS_RUNS: 10

jobs:
  cascade-pre-validation:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS]
    timeout-minutes: 360
    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Bootstrap op from workspace
        shell: bash
        run: |
          set -euo pipefail
          go build -o "$OPBIN/op" ./holons/grace-op/cmd/op
          chmod +x "$OPBIN/op"
          op env

      - name: Run cascade pre-validation
        shell: bash
        run: scripts/pre-validate-cascade.sh

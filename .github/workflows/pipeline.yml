# Pre-merge pipeline: isolated op/ader gates, run-local SDK artifacts, composites, and SDK deep tests.
name: pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      bouquet:
        description: bouquet name under ader/bouquets/
        required: false
        default: local-dev
      release_version:
        description: seed_release version to publish from this dispatched run
        required: false
        default: ''
      publish_set_json:
        description: JSON SDK list for release-intent.json, for example ["c","cpp"]
        required: false
        default: ''
      source_run_id:
        description: pipeline run ID that requested this release build
        required: false
        default: ''
      source_commit:
        description: commit SHA that requested this release build
        required: false
        default: ''

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  GOTOOLCHAIN: auto
  ZIG_VERSION: 0.16.0
  NINJA_VERSION: 1.13.1
  ZIG_HOLONS_JOBS: 8
  CPP_HOLONS_JOBS: 8
  C_HOLONS_JOBS: 8
  RUBY_HOLONS_JOBS: 4

jobs:
  gate-1-go-build-op:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS]
    timeout-minutes: 20
    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          # Ceinture : détruire tout op-run-* de + de 24h (mtime)
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          # Wipe HOME .op courant
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          # Isoler ce run avec timestamp
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Go build op bootstrap
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/op-bootstrap-binary"
          go build -o "$RUNNER_TEMP/op-bootstrap-binary/op" ./holons/grace-op/cmd/op
          chmod +x "$RUNNER_TEMP/op-bootstrap-binary/op"

      - name: Upload op bootstrap binary
        uses: actions/upload-artifact@v4
        with:
          name: op-bootstrap-binary
          path: ${{ runner.temp }}/op-bootstrap-binary/op
          if-no-files-found: error
          retention-days: 1

  gate-2-op-self-build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS]
    needs: gate-1-go-build-op
    timeout-minutes: 30
    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Download op bootstrap binary
        uses: actions/download-artifact@v4
        with:
          name: op-bootstrap-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Install Go proto generators
        shell: bash
        run: |
          set -euo pipefail
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Op self-build
        shell: bash
        run: |
          set -euo pipefail
          op build op --install
          chmod +x "$OPBIN/op"

      - name: Stage op binary artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/op-binary"
          cp "$OPBIN/op" "$RUNNER_TEMP/op-binary/op"
          chmod +x "$RUNNER_TEMP/op-binary/op"

      - name: Upload op binary
        uses: actions/upload-artifact@v4
        with:
          name: op-binary
          path: ${{ runner.temp }}/op-binary/op
          if-no-files-found: error
          retention-days: 1

  gate-3-op-core-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS]
    needs: gate-2-op-self-build
    timeout-minutes: 30
    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Download op binary
        uses: actions/download-artifact@v4
        with:
          name: op-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Go test op
        run: go test ./holons/grace-op/...

  gate-3a-go-codegen-sdk:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS]
    needs: gate-3-op-core-tests
    timeout-minutes: 20
    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Resolve host SDK target
        id: host
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "unsupported macOS runner architecture: $(uname -m)" >&2; exit 2 ;;
          esac
          echo "SDK_TARGET=$target" >> "$GITHUB_ENV"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Download op binary
        uses: actions/download-artifact@v4
        with:
          name: op-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Build Go codegen SDK bootstrap artifact
        shell: bash
        run: |
          set -euo pipefail
          SDK_TARGET="${{ steps.host.outputs.target }}" .github/scripts/build-prebuilt-go.sh

      - name: Upload Go codegen SDK bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-go-bootstrap-${{ steps.host.outputs.target }}
          path: dist/sdk-prebuilts/go/${{ steps.host.outputs.target }}/*
          if-no-files-found: error
          retention-days: 1

  gate-4-op-build-ader:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS]
    needs: gate-3a-go-codegen-sdk
    timeout-minutes: 30
    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Resolve host SDK target
        id: host
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "unsupported macOS runner architecture: $(uname -m)" >&2; exit 2 ;;
          esac
          echo "SDK_TARGET=$target" >> "$GITHUB_ENV"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Download op binary
        uses: actions/download-artifact@v4
        with:
          name: op-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download Go codegen SDK bootstrap artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-go-bootstrap-${{ steps.host.outputs.target }}
          path: ${{ runner.temp }}/go-codegen-sdk

      - name: Install Go codegen SDK artifact into isolated OPPATH
        shell: bash
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r archive; do
            found=1
            base="$(basename "$archive" .tar.gz)"
            lang="${base%%-holons-v*}"
            rest="${base#${lang}-holons-v}"
            version="${rest%-${SDK_TARGET}}"
            dest="$OPPATH/sdk/$lang/$version/$SDK_TARGET"
            rm -rf "$dest"
            mkdir -p "$dest"
            tar -C "$dest" -xzf "$archive"
            env_name="OP_SDK_$(printf '%s' "$lang" | tr '[:lower:]-' '[:upper:]_')_PATH"
            echo "$env_name=$dest" >> "$GITHUB_ENV"
          done < <(find "$RUNNER_TEMP/go-codegen-sdk" -type f -name 'go-holons-v*.tar.gz' ! -name '*-debug.tar.gz' | sort)
          if [ "$found" -ne 1 ]; then
            echo "no Go codegen SDK archive found for $SDK_TARGET" >&2
            exit 1
          fi

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Build ader
        run: op build clem-ader --install

      - name: Stage ader binary artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ader-binary"
          if [ -x "$OPBIN/ader" ]; then
            cp "$OPBIN/ader" "$RUNNER_TEMP/ader-binary/ader"
          else
            ader_bin="$(find "$OPBIN/clem-ader.holon/bin" -type f -name ader -print -quit)"
            if [ -z "$ader_bin" ]; then
              echo "ader binary not found under $OPBIN" >&2
              exit 1
            fi
            cp "$ader_bin" "$RUNNER_TEMP/ader-binary/ader"
          fi
          chmod +x "$RUNNER_TEMP/ader-binary/ader"

      - name: Upload ader binary
        uses: actions/upload-artifact@v4
        with:
          name: ader-binary
          path: ${{ runner.temp }}/ader-binary/ader
          if-no-files-found: error
          retention-days: 1

  gate-5-ader-core-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS]
    needs: gate-4-op-build-ader
    timeout-minutes: 30
    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Download op binary
        uses: actions/download-artifact@v4
        with:
          name: op-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download ader binary
        uses: actions/download-artifact@v4
        with:
          name: ader-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Go test ader
        run: go test ./holons/clem-ader/...

  gate-6-smoke-suite:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS]
    needs: gate-5-ader-core-tests
    timeout-minutes: 45
    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Download op binary
        uses: actions/download-artifact@v4
        with:
          name: op-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download ader binary
        uses: actions/download-artifact@v4
        with:
          name: ader-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Run smoke suites
        shell: bash
        run: |
          set -euo pipefail
          ader test ader/catalogues/grace-op --suite op_version --profile smoke --lane both --source workspace
          ader test ader/catalogues/clem-ader --suite ader-self --profile smoke --lane both --source workspace

  gate-7-classify-changes:
    runs-on: ubuntu-latest
    needs: gate-6-smoke-suite
    outputs:
      sdk_source: ${{ steps.classify.outputs.sdk_source }}
      publish_set: ${{ steps.publish-set.outputs.sdks }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changed-files
        shell: bash
        run: |
          set -euo pipefail
          files="$RUNNER_TEMP/changed-files.txt"
          case "${{ github.event_name }}" in
            pull_request)
              git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" >"$files"
              ;;
            push)
              git diff --name-only "${{ github.event.before }}...${{ github.sha }}" >"$files"
              ;;
            workflow_dispatch)
              printf 'seed-toolchain.yaml\n' >"$files"
              ;;
            *)
              : >"$files"
              ;;
          esac
          echo "files=$files" >>"$GITHUB_OUTPUT"
          sed 's/^/changed: /' "$files"

      - name: Classify pipeline path
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/sdk_ci_paths.py classify --files "${{ steps.changed-files.outputs.files }}" >>"$GITHUB_OUTPUT"

      - name: Resolve SDK publish set
        id: publish-set
        shell: bash
        run: |
          set -euo pipefail
          sdks="$(python3 .github/scripts/sdk_ci_paths.py publish-set --files "${{ steps.changed-files.outputs.files }}")"
          echo "sdks=${sdks}" >>"$GITHUB_OUTPUT"
          echo "SDK publish set: ${sdks}"

  release-intent:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != ''
    runs-on: ubuntu-latest
    needs: gate-7-classify-changes
    steps:
      - name: Write release-intent.json
        shell: bash
        run: |
          set -euo pipefail
          publish_set='${{ github.event.inputs.publish_set_json }}'
          if [[ -z "$publish_set" ]]; then
            publish_set='["c","cpp","csharp","dart","go","java","js","js-web","kotlin","python","ruby","rust","swift","zig"]'
          fi
          jq -e . <<<"$publish_set" >/dev/null
          # Schema consumed by sdk-prebuilts.yml workflow_run promotion:
          # { version, publish_set, source_run_id, source_commit }
          jq -n \
            --arg version "${{ github.event.inputs.release_version }}" \
            --arg source_run_id "${{ github.event.inputs.source_run_id }}" \
            --arg source_commit "${{ github.event.inputs.source_commit }}" \
            --argjson publish_set "$publish_set" \
            '{
              version: $version,
              publish_set: $publish_set,
              source_run_id: $source_run_id,
              source_commit: $source_commit
            }' > release-intent.json
          cat release-intent.json

      - name: Upload release intent
        uses: actions/upload-artifact@v4
        with:
          name: release-intent
          path: release-intent.json
          if-no-files-found: error
          retention-days: 7

  sdk-build-zig:
    needs: gate-7-classify-changes
    if: needs.gate-7-classify-changes.outputs.sdk_source == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    strategy:
      fail-fast: false

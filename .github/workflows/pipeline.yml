      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download ader binary
        uses: actions/download-artifact@v4
        with:
          name: ader-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download SDK artifacts
        if: needs.gate-7-classify-changes.outputs.sdk_source == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: sdk-*-${{ steps.host.outputs.target }}
          path: ${{ runner.temp }}/sdk-artifacts

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Checkout Zig vendored submodules
        run: |
          set -euo pipefail
          rm -rf sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule sync --recursive sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule update --init --force --recursive --depth 1 --jobs 8 \
            sdk/zig-holons/third_party/grpc \
            sdk/zig-holons/third_party/protobuf-c

      - name: Install SDK artifacts into isolated OPPATH
        if: needs.gate-7-classify-changes.outputs.sdk_source == 'true'
        shell: bash
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r archive; do
            found=1
            base="$(basename "$archive" .tar.gz)"
            lang="${base%%-holons-v*}"
            rest="${base#${lang}-holons-v}"
            version="${rest%-${SDK_TARGET}}"
            dest="$OPPATH/sdk/$lang/$version/$SDK_TARGET"
            rm -rf "$dest"
            mkdir -p "$dest"
            tar -C "$dest" -xzf "$archive"
            env_name="OP_SDK_$(printf '%s' "$lang" | tr '[:lower:]-' '[:upper:]_')_PATH"
            echo "$env_name=$dest" >> "$GITHUB_ENV"
          done < <(find "$RUNNER_TEMP/sdk-artifacts" -type f -name '*-holons-v*.tar.gz' ! -name '*-debug.tar.gz' | sort)
          if [ "$found" -ne 1 ]; then
            echo "no SDK archives found for $SDK_TARGET" >&2
            exit 1
          fi

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Install published SDK prebuilts
        if: needs.gate-7-classify-changes.outputs.sdk_source == 'false'
        shell: bash
        run: op sdk install all

      - name: Install grpcurl for C smoke tests
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v grpcurl >/dev/null 2>&1; then
            go install github.com/fullstorydev/grpcurl/cmd/grpcurl@v1.9.3
          fi
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run ader bouquet
        run: ader test-bouquet ader --name "$BOUQUET"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ader-reports-${{ github.run_id }}
          path: |
            ader/reports/bouquets/**
            ader/catalogues/*/reports/**
          retention-days: 14
          if-no-files-found: warn

  sdk-deep-tests:
    if: needs.gate-7-classify-changes.outputs.sdk_source == 'true' && needs.fresh-sdk-delivery.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, macOS]
    needs:
      - gate-7-classify-changes
      - fresh-sdk-delivery
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: zig
            mode: host
    steps:
      - name: Reset runner-managed state and isolate this run
        id: op-run
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chmod -R u+w "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          find /tmp -maxdepth 1 -name "op-run-*" -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$HOME/.op/sdk" "$HOME/.op/bin" "$HOME/.op/build" "$HOME/.op/cache" 2>/dev/null || true
          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          op_root="/tmp/op-run-${{ github.run_id }}-${{ github.run_attempt }}-${timestamp}/op"
          mkdir -p "$op_root/bin" "$op_root/sdk" "$op_root/build" "$op_root/cache"
          echo "OPPATH=$op_root" >> "$GITHUB_ENV"
          echo "OPBIN=$op_root/bin" >> "$GITHUB_ENV"
          echo "$op_root/bin" >> "$GITHUB_PATH"
          echo "oppath=$op_root" >> "$GITHUB_OUTPUT"
          echo "opbin=$op_root/bin" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/load-mac-runner-env

      - name: Resolve host SDK target
        id: host
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "unsupported macOS runner architecture: $(uname -m)" >&2; exit 2 ;;
          esac
          echo "SDK_TARGET=$target" >> "$GITHUB_ENV"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Download op binary
        uses: actions/download-artifact@v4
        with:
          name: op-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download ader binary
        uses: actions/download-artifact@v4
        with:
          name: ader-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download SDK artifacts
        if: needs.gate-7-classify-changes.outputs.sdk_source == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: sdk-*-${{ steps.host.outputs.target }}
          path: ${{ runner.temp }}/sdk-artifacts

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Checkout Zig vendored submodules
        run: |
          set -euo pipefail
          rm -rf sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule sync --recursive sdk/zig-holons/third_party/grpc sdk/zig-holons/third_party/protobuf-c
          git submodule update --init --force --recursive --depth 1 --jobs 8 \
            sdk/zig-holons/third_party/grpc \
            sdk/zig-holons/third_party/protobuf-c

      - name: Install SDK artifacts into isolated OPPATH
        if: needs.gate-7-classify-changes.outputs.sdk_source == 'true'
        shell: bash
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r archive; do
            found=1
            base="$(basename "$archive" .tar.gz)"
            lang="${base%%-holons-v*}"
            rest="${base#${lang}-holons-v}"
            version="${rest%-${SDK_TARGET}}"
            dest="$OPPATH/sdk/$lang/$version/$SDK_TARGET"
            rm -rf "$dest"
            mkdir -p "$dest"
            tar -C "$dest" -xzf "$archive"
            env_name="OP_SDK_$(printf '%s' "$lang" | tr '[:lower:]-' '[:upper:]_')_PATH"
            echo "$env_name=$dest" >> "$GITHUB_ENV"
          done < <(find "$RUNNER_TEMP/sdk-artifacts" -type f -name '*-holons-v*.tar.gz' ! -name '*-debug.tar.gz' | sort)
          if [ "$found" -ne 1 ]; then
            echo "no SDK archives found for $SDK_TARGET" >&2
            exit 1
          fi

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Install Go proto generators and grpcurl
        if: matrix.mode == 'host'
        run: |
          set -euo pipefail
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/fullstorydev/grpcurl/cmd/grpcurl@v1.9.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run Zig host deep tests
        if: matrix.mode == 'host'
        run: |
          set -euo pipefail
          find sdk/zig-holons examples/hello-world/gabriel-greeting-zig \
            -name '*.zig' \
            -not -path '*/.zig-cache/*' \
            -not -path '*/zig-out/*' \
            -print0 | xargs -0 zig fmt --check
          cd sdk/zig-holons
          zig build vendor
          zig build test
          zig build test-c-abi
          cd ../..
          op build gabriel-greeting-zig
          op test gabriel-greeting-zig
          op clean gabriel-greeting-zig
          op build gabriel-greeting-zig

      - name: Upload Zig host deep-test reports
        if: always() && matrix.mode == 'host'
        uses: actions/upload-artifact@v4
        with:
          name: sdk-deep-zig-host-reports-${{ github.run_id }}
          path: |
            ader/catalogues/*/reports/**
            ader/reports/**
          retention-days: 14
          if-no-files-found: warn

  auto-bump-seed-release:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.gate-7-classify-changes.outputs.sdk_source == 'true' && needs.fresh-sdk-delivery.result == 'success' && needs.composite-swiftui-full.result == 'success' && needs.composite-flutter-full.result == 'success' && needs.ader-bouquet-full.result == 'success' && needs.sdk-deep-tests.result == 'success'
    runs-on: ubuntu-latest
    needs:
      - gate-7-classify-changes
      - fresh-sdk-delivery
      - composite-swiftui-full
      - composite-flutter-full
      - ader-bouquet-full
      - sdk-deep-tests
    permissions:
      actions: write
      contents: write
    concurrency:
      group: auto-bump-seed-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEED_AUTOBUMP_TOKEN }}

      - name: Bump seed_release patch on master
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "seed-auto-bump"
          git config user.email "seed-auto-bump@users.noreply.github.com"

          manual_bump=false
          next=""
          commit_sha=""
          for attempt in 1 2 3 4 5; do
            git fetch origin master
            git checkout master
            git reset --hard origin/master

            current="$(python3 .github/scripts/seed_release_bump.py read seed-toolchain.yaml)"
            if [[ "$attempt" == "1" ]]; then
              previous="$(git show "${{ github.event.before }}:seed-toolchain.yaml" 2>/dev/null | grep -E '^seed_release:' | sed -E 's/^seed_release:[[:space:]]*"?([^"#[:space:]]+)"?.*/\1/' || true)"
              if [[ -n "$previous" && "$current" != "$previous" ]]; then
                manual_bump=true
                next="$current"
                commit_sha="$(git rev-parse HEAD)"
                echo "Manual seed_release bump detected (${previous} -> ${current}); skipping auto-bump."
                break
              fi
            fi

            bump_output="$(python3 .github/scripts/seed_release_bump.py bump-file seed-toolchain.yaml)"
            next="$(sed -n 's/^next=//p' <<<"$bump_output")"
            git add seed-toolchain.yaml
            git commit -m "ci: bump seed_release to ${next} [skip ci]"

            if git push origin HEAD:master; then
              commit_sha="$(git rev-parse HEAD)"
              echo "Pushed seed_release ${current} -> ${next} on attempt ${attempt}."
              break
            fi

            if [[ "$attempt" == "5" ]]; then
              echo "::error::Failed to push seed_release bump after 5 attempts." >&2
              exit 1
            fi
            echo "Push rejected on attempt ${attempt}; retrying after re-sync."
          done

          echo "manual_bump=${manual_bump}" >>"$GITHUB_OUTPUT"
          echo "version=${next}" >>"$GITHUB_OUTPUT"
          echo "commit=${commit_sha}" >>"$GITHUB_OUTPUT"

      - name: Dispatch release build for bumped seed_release
        if: steps.bump.outputs.manual_bump != 'true'
        env:
          GH_TOKEN: ${{ secrets.SEED_AUTOBUMP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          publish_set='["c","cpp","csharp","dart","go","java","js","js-web","kotlin","python","ruby","rust","swift","zig"]'
          gh workflow run pipeline.yml \
            --ref master \
            -f release_version="${{ steps.bump.outputs.version }}" \
            -f publish_set_json="$publish_set" \
            -f source_run_id="${{ github.run_id }}" \
            -f source_commit="${{ steps.bump.outputs.commit }}"

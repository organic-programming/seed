  publish-sdk-releases:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.gate-7-classify-changes.outputs.sdk_source == 'true' && needs.compute-target-version.result == 'success' && needs.fresh-sdk-delivery.result == 'success' && needs.composite-swiftui-full.result == 'success' && needs.composite-flutter-full.result == 'success' && needs.observability-cascade-ader-suite.result == 'success' && needs.ader-bouquet-full.result == 'success' && needs.sdk-deep-tests.result == 'success'
    runs-on: ubuntu-latest
    needs:
      - gate-7-classify-changes
      - compute-target-version
      - fresh-sdk-delivery
      - composite-swiftui-full
      - composite-flutter-full
      - observability-cascade-ader-suite
      - ader-bouquet-full
      - sdk-deep-tests
    permissions:
      actions: read
      contents: write
    concurrency:
      group: publish-sdk-releases
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEED_AUTOBUMP_TOKEN }}

      - name: Write target seed_release to master
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          target_version="${{ needs.compute-target-version.outputs.version }}"
          if [[ -z "$target_version" ]]; then
            echo "::error::compute-target-version produced an empty version" >&2
            exit 1
          fi
          git config user.name "seed-auto-bump"
          git config user.email "seed-auto-bump@users.noreply.github.com"

          git fetch origin master
          master_tip="$(git rev-parse origin/master)"
          master_yaml="$RUNNER_TEMP/origin-master-seed-toolchain.yaml"
          git show "origin/master:seed-toolchain.yaml" >"$master_yaml"
          master_seed_release="$(go run .github/scripts/seed_release_bump.go read "$master_yaml")"

          if [[ "$master_seed_release" == "$target_version" ]]; then
            # Master may already be at the target because this run was triggered by a
            # manual bump, or because a previous attempt pushed the exact bump commit.
            # Anything else means the artifacts were built from a commit that no longer
            # matches the release target.
            if [[ "$master_tip" != "${{ github.sha }}" ]]; then
              master_parent_count="$(git rev-list --parents -n 1 "$master_tip" | awk '{print NF - 1}')"
              master_parent="$(git rev-parse "${master_tip}^" 2>/dev/null || true)"
              master_subject="$(git log -1 --format=%s "$master_tip")"
              master_changed_files="$(git diff-tree --no-commit-id --name-only -r "$master_tip")"
              expected_subject="ci: bump seed_release to ${target_version} [skip ci]"
              if [[ "$master_parent_count" != "1" || "$master_parent" != "${{ github.sha }}" || "$master_subject" != "$expected_subject" || "$master_changed_files" != "seed-toolchain.yaml" ]]; then
                echo "::error::origin/master is already at seed_release=${target_version}, but tip ${master_tip} is not this run's commit or its seed_release bump." >&2
                echo "::error::SDK artifacts were built against ${{ github.sha }}; refusing to publish against an unrelated master tip." >&2
                exit 1
              fi
            fi
            release_sha="$master_tip"
            echo "origin/master already at seed_release=${target_version}; no commit needed."
          else
            # We need to push a bump. Freshness guard: origin/master must still be at
            # the commit that triggered this run, otherwise the SDK artifacts were built
            # against a stale master and we refuse to bump.
            if [[ "$master_tip" != "${{ github.sha }}" ]]; then
              echo "::error::origin/master tip is ${master_tip} but this run was triggered by ${{ github.sha }}." >&2
              echo "::error::SDK artifacts were built against ${{ github.sha }}; refusing to bump a master that has moved on." >&2
              exit 1
            fi

            git checkout master 2>/dev/null || git checkout -B master origin/master
            git reset --hard origin/master
            go run .github/scripts/seed_release_bump.go set-file seed-toolchain.yaml "$target_version"
            git add seed-toolchain.yaml
            git commit -m "ci: bump seed_release to ${target_version} [skip ci]"

            if ! git push origin HEAD:master; then
              echo "::error::Failed to push seed_release bump; another run likely raced us." >&2
              exit 1
            fi
            release_sha="$(git rev-parse HEAD)"
            echo "Pushed seed_release ${master_seed_release} -> ${target_version}."
          fi

          echo "release_sha=${release_sha}" >>"$GITHUB_OUTPUT"
          echo "Release target commit: ${release_sha}"

      - name: Download SDK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sdk-*
          path: ${{ runner.temp }}/sdk-prebuilt-artifacts

      - name: Publish SDK releases
        env:
          GH_TOKEN: ${{ secrets.SEED_AUTOBUMP_TOKEN }}
          GITHUB_SHA: ${{ steps.bump.outputs.release_sha }}
          SDK_PREBUILTS_PROMOTE_SDKS_JSON: ${{ needs.gate-7-classify-changes.outputs.publish_set }}
          SDK_PREBUILTS_EXPECT_VERSION: ${{ needs.compute-target-version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          .github/scripts/promote-sdk-prebuilts.sh "$RUNNER_TEMP/sdk-prebuilt-artifacts"

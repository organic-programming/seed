        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download ader binary
        uses: actions/download-artifact@v4
        with:
          name: ader-binary
          path: ${{ steps.op-run.outputs.opbin }}

      - name: Restore exec bits on downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          for d in "$OPPATH/bin" "$OPPATH/sdk"/*/*/*/bin; do
            if [ -d "$d" ]; then
              find "$d" -type f -exec chmod +x {} +
            fi
          done

      - name: Download SDK artifacts
        if: needs.gate-7-classify-changes.outputs.sdk_source == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: sdk-*-${{ steps.host.outputs.target }}
          path: ${{ runner.temp }}/sdk-artifacts


# SDK prebuilt publish: promotes artifacts produced by pipeline.yml tier 1 after a merged PR.
# Triggers: pull_request closed on master; runs on ubuntu-latest.
# Owns: post-merge GitHub Release publication. See .github/workflows/README.md for pipeline order.
name: sdk-prebuilts

on:
  pull_request:
    types: [closed]
    branches: [master]
    paths:
      - ".github/workflows/pipeline.yml"
      - ".github/workflows/sdk-prebuilts.yml"
      - ".github/workflows/_sdk-prebuilt-target.yml"
      - ".github/scripts/build-prebuilt-zig.sh"
      - ".github/scripts/build-prebuilt-cpp.sh"
      - ".github/scripts/build-prebuilt-c.sh"
      - ".github/scripts/build-prebuilt-ruby.sh"
      - ".github/scripts/promote-sdk-prebuilts.sh"
      - "sdk/zig-holons/**"
      - "sdk/cpp-holons/**"
      - "sdk/c-holons/**"
      - "sdk/ruby-holons/**"
      - "holons/grace-op/internal/sdkprebuilts/**"

concurrency:
  group: sdk-prebuilts-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  promote:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Locate successful pipeline run
        id: source-run
        shell: bash
        run: |
          set -euo pipefail
          run_id="$(
            gh run list \
              --workflow pipeline.yml \
              --json databaseId,headSha,conclusion,event,createdAt \
              --limit 100 \
              --jq ".[] | select(.event == \"pull_request\" and .conclusion == \"success\" and .headSha == \"${PR_HEAD_SHA}\") | .databaseId" |
            head -n 1
          )"
          if [[ -z "$run_id" ]]; then
            echo "No successful pipeline pull_request run found for ${PR_HEAD_SHA}" >&2
            exit 1
          fi
          echo "run-id=${run_id}" >>"$GITHUB_OUTPUT"

      - name: Download PR artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sdk-prebuilt-artifacts"
          gh run download "${{ steps.source-run.outputs.run-id }}" --dir "$RUNNER_TEMP/sdk-prebuilt-artifacts"

      - name: Publish GitHub Releases
        shell: bash
        run: |
          set -euo pipefail
          if ! find "$RUNNER_TEMP/sdk-prebuilt-artifacts" \
            -type f \
            -name '*-holons-v*.tar.gz' \
            ! -name '*-debug.tar.gz' \
            -print -quit | grep -q .; then
            echo "No SDK prebuilt archives found; nothing to promote."
            exit 0
          fi
          .github/scripts/promote-sdk-prebuilts.sh "$RUNNER_TEMP/sdk-prebuilt-artifacts"

name: sdk-prebuilts

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/sdk-prebuilts.yml"
      - ".github/workflows/_sdk-prebuilt-target.yml"
      - ".github/scripts/build-prebuilt-zig.sh"
      - "sdk/zig-holons/**"
      - "holons/grace-op/internal/sdkprebuilts/**"
  workflow_dispatch:
    inputs:
      sdk-version:
        description: Zig SDK prebuilt version
        required: false
        default: "0.1.0"

concurrency:
  group: sdk-prebuilts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zig:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runs_on: '["macos-14"]'
          - target: x86_64-apple-darwin
            runs_on: '["macos-14"]'
          - target: x86_64-unknown-linux-gnu
            runs_on: '["ubuntu-latest"]'
          - target: aarch64-unknown-linux-gnu
            runs_on: '["ubuntu-24.04-arm"]'
          - target: x86_64-unknown-linux-musl
            runs_on: '["ubuntu-latest"]'
          - target: aarch64-unknown-linux-musl
            runs_on: '["ubuntu-24.04-arm"]'
          - target: x86_64-windows-gnu
            runs_on: '["ubuntu-latest"]'
    uses: ./.github/workflows/_sdk-prebuilt-target.yml
    with:
      sdk: zig
      sdk-version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['sdk-version'] || '0.1.0' }}
      sdk-target: ${{ matrix.target }}
      runs-on: ${{ matrix.runs_on }}

// GreetingAppService is the COAX domain surface for this organism.
// These are the high-level actions a human performs through the UI,
// expressed as RPCs an agent can call equivalently.
//
// An agent calling SelectHolon + SelectLanguage + Greet achieves the
// same result as a human clicking the dropdown, picking a language,
// and typing a name — and the UI reflects every step in real time.
service GreetingAppService {
  // Select which greeting holon to use (by slug).
  rpc SelectHolon(SelectHolonRequest) returns (SelectHolonResponse);

  // Select a language for the greeting.
  rpc SelectLanguage(SelectLanguageRequest) returns (SelectLanguageResponse);

  // Greet using the current selection.
  rpc Greet(GreetRequest) returns (GreetResponse);
}

message SelectHolonRequest {
  string slug = 1;
}

message SelectHolonResponse {
  // Returns the identity of the now-selected holon.
  string slug = 1;
  string display_name = 2;
}

message SelectLanguageRequest {
  string code = 1;
}

message SelectLanguageResponse {
  string code = 1;
}

message GreetRequest {
  string name = 1;
  // Optional: override current language. If empty, uses current selection.
  string lang_code = 2;
}

message GreetResponse {
  string greeting = 1;
}

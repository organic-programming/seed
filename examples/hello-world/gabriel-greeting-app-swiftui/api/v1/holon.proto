syntax = "proto3";
package greeting.v1;

import "holons/v1/manifest.proto";
import "v1/greeting.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "aeeb7fb9-a8a7-4ea1-acb9-1cc4d9d553f1"
    given_name: "Gabriel"
    family_name: "Greeting-App-SwiftUI"
    motto: "SwiftUI HostUI for the Gabriel greeting service."
    composer: "Codex"
    status: "draft"
    born: "2026-03-15"
    version: "0.1.4"
  }
  description: "A standalone SwiftUI app that connects to all 12 Gabriel greeting daemon variants and presents a multilingual greeting UI."
  kind: "composite"
  build: {
    runner: "recipe"
    templates: ["api/version.txt"]
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "greeting-go"
      path: "../gabriel-greeting-go"
      type: "holon"
    }
    members: {
      id: "greeting-swift"
      path: "../gabriel-greeting-swift"
      type: "holon"
    }
    members: {
      id: "greeting-rust"
      path: "../gabriel-greeting-rust"
      type: "holon"
    }
    members: {
      id: "greeting-python"
      path: "../gabriel-greeting-python"
      type: "holon"
    }
    members: {
      id: "greeting-c"
      path: "../gabriel-greeting-c"
      type: "holon"
    }
    members: {
      id: "greeting-cpp"
      path: "../gabriel-greeting-cpp"
      type: "holon"
    }
    members: {
      id: "greeting-csharp"
      path: "../gabriel-greeting-csharp"
      type: "holon"
    }
    members: {
      id: "greeting-dart"
      path: "../gabriel-greeting-dart"
      type: "holon"
    }
    members: {
      id: "greeting-java"
      path: "../gabriel-greeting-java"
      type: "holon"
    }
    members: {
      id: "greeting-kotlin"
      path: "../gabriel-greeting-kotlin"
      type: "holon"
    }
    members: {
      id: "greeting-node"
      path: "../gabriel-greeting-node"
      type: "holon"
    }
    members: {
      id: "greeting-ruby"
      path: "../gabriel-greeting-ruby"
      type: "holon"
    }
    members: {
      id: "app"
      path: "."
      type: "component"
    }
    targets: {
      key: "macos"
      value: {
        steps: {
          build_member: "greeting-go"
        }
        steps: {
          build_member: "greeting-swift"
        }
        steps: {
          build_member: "greeting-rust"
        }
        steps: {
          build_member: "greeting-python"
        }
        steps: {
          build_member: "greeting-c"
        }
        steps: {
          build_member: "greeting-cpp"
        }
        steps: {
          build_member: "greeting-csharp"
        }
        steps: {
          build_member: "greeting-dart"
        }
        steps: {
          build_member: "greeting-java"
        }
        steps: {
          build_member: "greeting-kotlin"
        }
        steps: {
          build_member: "greeting-node"
        }
        steps: {
          build_member: "greeting-ruby"
        }
        steps: {
          exec: {
            cwd: "."
            argv: ["xcodebuild", "-scheme", "GabrielGreetingApp", "-configuration", "Debug", "-destination", "generic/platform=macOS", "-derivedDataPath", ".build/xcode/macos", "-clonedSourcePackagesDirPath", ".build/xcode/source-packages", "build"]
          }
        }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", 'set -euo pipefail\nproducts_dir=".build/xcode/macos/Build/Products/Debug"\napp_dir="build/GabrielGreetingApp.app"\nversion="$(tr -d \'\\n\\r\' < api/version.txt)"\nrm -rf "$app_dir"\nmkdir -p "$app_dir/Contents/MacOS" "$app_dir/Contents/Resources" "$app_dir/Contents/Resources/Holons" "$app_dir/Contents/lib"\ncp "$products_dir/GabrielGreetingApp" "$app_dir/Contents/MacOS/GabrielGreetingApp"\n\nshopt -s nullglob\nfor bundle in "$products_dir"/*.bundle; do\n  cp -R "$bundle" "$app_dir/Contents/Resources/"\ndone\nif [ -d "$products_dir/PackageFrameworks" ]; then\n  cp -R "$products_dir/PackageFrameworks/." "$app_dir/Contents/lib/"\nfi\ncat > "$app_dir/Contents/Info.plist" <<EOF\n<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n  <key>CFBundleDevelopmentRegion</key>\n  <string>en</string>\n  <key>CFBundleDisplayName</key>\n  <string>GabrielGreetingApp</string>\n  <key>CFBundleExecutable</key>\n  <string>GabrielGreetingApp</string>\n  <key>CFBundleIdentifier</key>\n  <string>org.organicprogramming.gabriel-greeting-app-swiftui</string>\n  <key>CFBundleInfoDictionaryVersion</key>\n  <string>6.0</string>\n  <key>CFBundleName</key>\n  <string>GabrielGreetingApp</string>\n  <key>CFBundlePackageType</key>\n  <string>APPL</string>\n  <key>CFBundleShortVersionString</key>\n  <string>${version}</string>\n  <key>CFBundleVersion</key>\n  <string>${version}</string>\n  <key>LSMinimumSystemVersion</key>\n  <string>15.0</string>\n  <key>NSHighResolutionCapable</key>\n  <true/>\n</dict>\n</plist>\nEOF']
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-go"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-go.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-swift"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-swift.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-rust"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-rust.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-python"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-python.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-c"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-c.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-cpp"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-cpp.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-csharp"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-csharp.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-dart"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-dart.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-java"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-java.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-kotlin"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-kotlin.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-node"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-node.holon"
          }
        }
        steps: {
          copy_artifact: {
            from: "greeting-ruby"
            to: "build/GabrielGreetingApp.app/Contents/Resources/Holons/gabriel-greeting-ruby.holon"
          }
        }
        steps: {
          assert_file: {
            path: "build/GabrielGreetingApp.app"
          }
        }
        steps: {
          assert_file: {
            path: "build/GabrielGreetingApp.app/Contents/_CodeSignature/CodeResources"
          }
        }
      }
    }
  }
  requires: {
    commands: ["xcodebuild", "cargo", "python3"]
    files: ["Package.swift"]
  }
  artifacts: {
    primary: "build/GabrielGreetingApp.app"
  }
};

syntax = "proto3";

package greeting.v1;

import "holons/v1/manifest.proto";
import "v1/greeting.proto";


// C++-specific holon descriptor for gabriel-greeting-cpp.
// Layers CMake runtime metadata and holon manifest on top of the shared
// greeting contract.

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "05af5ed2-79d3-438d-b8b1-6a252d09ab38"
    given_name: "Gabriel"
    family_name: "Greeting-Cpp"
    motto: "Greets users in 56 languages — a C++ daemon example."
    composer: "Codex"
    status: "draft"
    born: "2026-03-16"
    version: "0.1.9"
  }
  description: "A C++ gRPC daemon that greets users in 56 languages."
  lang: "cpp"
  kind: "native"
  build: {
    runner: "cmake"
    main: "./cmd/main.cpp"
    templates: ["api/cli.hpp"]
  }
  requires: {
    commands: ["cmake"]
    files: ["CMakeLists.txt", "cmd/main.cpp"]
  }
  artifacts: {
    binary: "gabriel-greeting-cpp"
  }
  skills: [{
    name: "multilingual-greeter"
    description: "Greet a person by name in any of the 56 supported languages."
    when: "The user wants to greet someone in a specific language."
    steps: [
      "Call ListLanguages to show available languages",
      "Ask the user for a name and language code",
      "Call SayHello with the chosen name and lang_code"
    ]
  }]
  sequences: [{
    name: "multilingual-greeting"
    description: "List available languages then greet the user in the chosen one."
    params: [
      {name: "name", description: "Person to greet", required: true},
      {name: "lang_code", description: "ISO 639-1 language code", required: true}
    ]
    steps: [
      "op gabriel-greeting-cpp ListLanguages",
      "op gabriel-greeting-cpp SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"{{ .lang_code }}\"}'"
    ]
  }, {
    name: "greeting-fr-ja-ru-en"
    description: "List available languages, then greet in French, Japanese, Russian, and English."
    params: [
      {name: "name", description: "Person to greet", required: true}
    ]
    steps: [
      "op gabriel-greeting-cpp ListLanguages",
      "op gabriel-greeting-cpp SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"fr\"}'",
      "op gabriel-greeting-cpp SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ja\"}'",
      "op gabriel-greeting-cpp SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ru\"}'",
      "op gabriel-greeting-cpp SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"en\"}'"
    ]
  }]
};

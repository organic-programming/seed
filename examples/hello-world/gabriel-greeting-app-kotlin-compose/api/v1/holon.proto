// GreetingAppService is the COAX-facing domain surface for the Kotlin Compose app.
service GreetingAppService {
  rpc SelectHolon(SelectHolonRequest) returns (SelectHolonResponse);
  rpc SelectLanguage(SelectLanguageRequest) returns (SelectLanguageResponse);
  rpc Greet(GreetRequest) returns (GreetResponse);
}

message SelectHolonRequest {
  string slug = 1;
}

message SelectHolonResponse {
  string slug = 1;
  string display_name = 2;
}

message SelectLanguageRequest {
  string code = 1;
}

message SelectLanguageResponse {
  string code = 1;
}

message GreetRequest {
  string name = 1;
  string lang_code = 2;
}

message GreetResponse {
  string greeting = 1;
}

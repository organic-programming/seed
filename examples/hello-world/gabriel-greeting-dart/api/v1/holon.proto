syntax = "proto3";

package greeting.v1;

import "holons/v1/manifest.proto";
import "v1/greeting.proto";


// Dart-specific holon descriptor for gabriel-greeting-dart.
// Layers Dart runtime metadata and holon manifest on top of the shared
// greeting contract.

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "0e98310c-c48f-4d3b-aa4c-25e133b4880f"
    given_name: "Gabriel"
    family_name: "Greeting-Dart"
    motto: "Greets users in 56 languages — a Dart daemon example."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-03-16"
    version: "0.1.28"
  }
  description: "A Dart gRPC daemon that greets users in 56 languages."
  lang: "dart"
  kind: "native"
  build: {
    runner: "dart"
    main: "./cmd/main.dart"
    templates: ["api/cli.dart"]
  }
  requires: {
    commands: ["dart"]
    files: ["cmd/main.dart", "pubspec.yaml"]
  }
  artifacts: {
    binary: "gabriel-greeting-dart"
  }
  skills: [{
    name: "multilingual-greeter"
    description: "Greet a person by name in any of the 56 supported languages."
    when: "The user wants to greet someone in a specific language."
    steps: [
      "Call ListLanguages to show available languages",
      "Ask the user for a name and language code",
      "Call SayHello with the chosen name and lang_code"
    ]
  }]
  sequences: [{
    name: "multilingual-greeting"
    description: "List available languages then greet the user in the chosen one."
    params: [
      {name: "name", description: "Person to greet", required: true},
      {name: "lang_code", description: "ISO 639-1 language code", required: true}
    ]
    steps: [
      "op gabriel-greeting-dart ListLanguages",
      "op gabriel-greeting-dart SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"{{ .lang_code }}\"}'"
    ]
  }, {
    name: "greeting-fr-ja-ru-en"
    description: "List available languages, then greet in French, Japanese, Russian, and English."
    params: [
      {name: "name", description: "Person to greet", required: true}
    ]
    steps: [
      "op gabriel-greeting-dart ListLanguages",
      "op gabriel-greeting-dart SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"fr\"}'",
      "op gabriel-greeting-dart SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ja\"}'",
      "op gabriel-greeting-dart SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ru\"}'",
      "op gabriel-greeting-dart SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"en\"}'"
    ]
  }]
};

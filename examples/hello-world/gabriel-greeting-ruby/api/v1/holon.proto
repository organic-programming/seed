syntax = "proto3";

package greeting.v1;

import "holons/v1/manifest.proto";
import "v1/greeting.proto";


// Ruby-specific holon descriptor for gabriel-greeting-ruby.
// Layers Ruby runtime metadata and holon manifest on top of the shared
// greeting contract.

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "0d371dd4-2948-4192-8638-cee294fb8320"
    given_name: "Gabriel"
    family_name: "Greeting-Ruby"
    motto: "Greets users in 56 languages — a Ruby daemon example."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-03-16"
    version: "0.1.49"
  }
  description: "A Ruby gRPC daemon that greets users in 56 languages."
  lang: "ruby"
  kind: "native"
  build: {
    runner: "ruby"
    main: "./cmd/main.rb"
    templates: ["api/cli.rb"]
  }
  requires: {
    commands: ["ruby", "bundle"]
    files: ["cmd/main.rb", "Gemfile"]
  }
  artifacts: {
    binary: "gabriel-greeting-ruby"
  }
  skills: [{
    name: "multilingual-greeter"
    description: "Greet a person by name in any of the 56 supported languages."
    when: "The user wants to greet someone in a specific language."
    steps: [
      "Call ListLanguages to show available languages",
      "Ask the user for a name and language code",
      "Call SayHello with the chosen name and lang_code"
    ]
  }]
  sequences: [{
    name: "multilingual-greeting"
    description: "List available languages then greet the user in the chosen one."
    params: [
      {name: "name", description: "Person to greet", required: true},
      {name: "lang_code", description: "ISO 639-1 language code", required: true}
    ]
    steps: [
      "op gabriel-greeting-ruby ListLanguages",
      "op gabriel-greeting-ruby SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"{{ .lang_code }}\"}'"
    ]
  }, {
    name: "greeting-fr-ja-ru-en"
    description: "List available languages, then greet in French, Japanese, Russian, and English."
    params: [
      {name: "name", description: "Person to greet", required: true}
    ]
    steps: [
      "op gabriel-greeting-ruby ListLanguages",
      "op gabriel-greeting-ruby SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"fr\"}'",
      "op gabriel-greeting-ruby SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ja\"}'",
      "op gabriel-greeting-ruby SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ru\"}'",
      "op gabriel-greeting-ruby SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"en\"}'"
    ]
  }]
};

syntax = "proto3";

package greeting.v1;

import "holons/v1/manifest.proto";
import "v1/greeting.proto";

option java_package = "org.organicprogramming.gabriel.greeting.javaholon.api.v1";
option java_outer_classname = "HolonProto";
option java_multiple_files = true;


// Java-specific holon descriptor for gabriel-greeting-java.
// Layers Java runtime metadata and holon manifest on top of the shared
// greeting contract.

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "43a1d6d9-952b-447c-8e47-4c9f0837d8bd"
    given_name: "Gabriel"
    family_name: "Greeting-Java"
    motto: "Greets users in 56 languages — a Java daemon example."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-03-16"
    version: "0.1.40"
  }
  description: "A Java gRPC daemon that greets users in 56 languages."
  lang: "java"
  kind: "native"
  build: {
    runner: "gradle"
    main: "./src/main/java/org/organicprogramming/gabriel/greeting/javaholon/cmd/Main.java"
    templates: ["src/main/java/org/organicprogramming/gabriel/greeting/javaholon/api/Cli.java"]
  }
  requires: {
    commands: ["java", "gradle"]
    files: ["build.gradle", "settings.gradle"]
  }
  artifacts: {
    binary: "gabriel-greeting-java"
  }
  skills: [{
    name: "multilingual-greeter"
    description: "Greet a person by name in any of the 56 supported languages."
    when: "The user wants to greet someone in a specific language."
    steps: [
      "Call ListLanguages to show available languages",
      "Ask the user for a name and language code",
      "Call SayHello with the chosen name and lang_code"
    ]
  }]
  sequences: [{
    name: "multilingual-greeting"
    description: "List available languages then greet the user in the chosen one."
    params: [
      {name: "name", description: "Person to greet", required: true},
      {name: "lang_code", description: "ISO 639-1 language code", required: true}
    ]
    steps: [
      "op gabriel-greeting-java ListLanguages",
      "op gabriel-greeting-java SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"{{ .lang_code }}\"}'"
    ]
  }, {
    name: "greeting-fr-ja-ru-en"
    description: "List available languages, then greet in French, Japanese, Russian, and English."
    params: [
      {name: "name", description: "Person to greet", required: true}
    ]
    steps: [
      "op gabriel-greeting-java ListLanguages",
      "op gabriel-greeting-java SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"fr\"}'",
      "op gabriel-greeting-java SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ja\"}'",
      "op gabriel-greeting-java SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ru\"}'",
      "op gabriel-greeting-java SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"en\"}'"
    ]
  }]
};

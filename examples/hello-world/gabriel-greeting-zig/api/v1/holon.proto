syntax = "proto3";

package greeting.v1;

import "holons/v1/manifest.proto";
import "v1/greeting.proto";

// Zig-specific holon descriptor for gabriel-greeting-zig.
// Layers Zig build metadata and holon manifest on top of the shared
// greeting contract.

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "31b1f966-f5bc-4279-8f3d-33ecff0cdffa"
    given_name: "Gabriel"
    family_name: "Greeting-Zig"
    motto: "Greets users in 56 languages — a Zig daemon example."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-04-25"
    version: "0.1.0"
  }
  description: "A Zig gRPC daemon that greets users in 56 languages."
  lang: "zig"
  kind: "native"
  build: {
    runner: "zig"
  }
  requires: {
    commands: ["zig"]
    sdk_prebuilts: ["zig"]
    files: ["build.zig"]
  }
  artifacts: {
    binary: "gabriel-greeting-zig"
  }
  skills: [{
    name: "multilingual-greeter"
    description: "Greet a person by name in any of the 56 supported languages."
    when: "The user wants to greet someone in a specific language."
    steps: [
      "Call ListLanguages to show available languages",
      "Ask the user for a name and language code",
      "Call SayHello with the chosen name and lang_code"
    ]
  }]
  sequences: [{
    name: "multilingual-greeting"
    description: "List available languages then greet the user in the chosen one."
    params: [
      {name: "name", description: "Person to greet", required: true},
      {name: "lang_code", description: "ISO 639-1 language code", required: true}
    ]
    steps: [
      "op gabriel-greeting-zig ListLanguages",
      "op gabriel-greeting-zig SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"{{ .lang_code }}\"}'"
    ]
  }, {
    name: "greeting-fr-ja-ru-en"
    description: "List available languages, then greet in French, Japanese, Russian, and English."
    params: [
      {name: "name", description: "Person to greet", required: true}
    ]
    steps: [
      "op gabriel-greeting-zig ListLanguages",
      "op gabriel-greeting-zig SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"fr\"}'",
      "op gabriel-greeting-zig SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ja\"}'",
      "op gabriel-greeting-zig SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ru\"}'",
      "op gabriel-greeting-zig SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"en\"}'"
    ]
  }]
};

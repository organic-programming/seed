syntax = "proto3";

package greeting.v1;

import "holons/v1/manifest.proto";
import "v1/greeting.proto";


// Rust-specific holon descriptor for gabriel-greeting-rust.
// Layers Cargo metadata and holon manifest on top of the shared
// greeting contract.

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "f6f82422-f0fa-4d7e-a417-67602e749d09"
    given_name: "Gabriel"
    family_name: "Greeting-Rust"
    motto: "Greets users in 56 languages — a Rust daemon example."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-03-16"
    version: "8.8.106"
  }
  description: "A Rust gRPC daemon that greets users in 56 languages."
  lang: "rust"
  kind: "native"
  build: {
    runner: "cargo"
    templates: ["api/cli.rs"]
  }
  requires: {
    commands: ["cargo"]
    files: ["Cargo.toml"]
  }
  artifacts: {
    binary: "gabriel-greeting-rust"
  }
  skills: [{
    name: "multilingual-greeter"
    description: "Greet a person by name in any of the 56 supported languages."
    when: "The user wants to greet someone in a specific language."
    steps: [
      "Call ListLanguages to show available languages",
      "Ask the user for a name and language code",
      "Call SayHello with the chosen name and lang_code"
    ]
  }]
  sequences: [{
    name: "multilingual-greeting"
    description: "List available languages then greet the user in the chosen one."
    params: [
      {name: "name", description: "Person to greet", required: true},
      {name: "lang_code", description: "ISO 639-1 language code", required: true}
    ]
    steps: [
      "op gabriel-greeting-rust ListLanguages",
      "op gabriel-greeting-rust SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"{{ .lang_code }}\"}'"
    ]
  }, {
    name: "greeting-fr-ja-ru-en"
    description: "List available languages, then greet in French, Japanese, Russian, and English."
    params: [
      {name: "name", description: "Person to greet", required: true}
    ]
    steps: [
      "op gabriel-greeting-rust ListLanguages",
      "op gabriel-greeting-rust SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"fr\"}'",
      "op gabriel-greeting-rust SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ja\"}'",
      "op gabriel-greeting-rust SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ru\"}'",
      "op gabriel-greeting-rust SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"en\"}'"
    ]
  }]
};


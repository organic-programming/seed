syntax = "proto3";

package greeting.v1;

import "holons/v1/manifest.proto";
import "v1/greeting.proto";


// Go-specific holon descriptor for gabriel-greeting-go.
// Layers Go codegen options and holon manifest on top of the shared
// greeting contract.

option go_package = "github.com/organic-programming/seed/recipes/daemons/gudule-daemon-greeting-go/gen/go/greeting/v1;greetingv1";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "3f08b5c3-8931-46d0-847a-a64d8b9ba57e"
    given_name: "Gabriel"
    family_name: "Greeting-Go"
    motto: "Greets users in 56 languages — a Go daemon recipe example."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-02-20"
    version: "0.4.86"
  }
  description: "A Go gRPC daemon that greets users in 56 languages. Designed to be embedded in a Flutter HostUI but also usable standalone."
  lang: "go"
  kind: "native"
  build: {
    runner: "go-module"
    main: "./cmd"
    templates: ["api/version.go"]
  }
  requires: {
    commands: ["go"]
    files: ["go.mod"]
  }
  artifacts: {
    binary: "gabriel-greeting-go"
  }
  skills: [{
    name: "multilingual-greeter"
    description: "Greet a person by name in any of the 56 supported languages."
    when: "The user wants to greet someone in a specific language."
    steps: [
      "Call ListLanguages to show available languages",
      "Ask the user for a name and language code",
      "Call SayHello with the chosen name and lang_code"
    ]
  }]
  sequences: [{
    name: "multilingual-greeting"
    description: "List available languages then greet the user in the chosen one."
    params: [
      {name: "name", description: "Person to greet", required: true},
      {name: "lang_code", description: "ISO 639-1 language code", required: true}
    ]
    steps: [
      "op gabriel-greeting-go ListLanguages",
      "op gabriel-greeting-go SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"{{ .lang_code }}\"}'"
    ]
  }, {
    name: "greeting-fr-ja-ru-en"
    description: "List available languages, then greet in French, Japanese, Russian, and English."
    params: [
      {name: "name", description: "Person to greet", required: true}
    ]
    steps: [
      "op gabriel-greeting-go ListLanguages",
      "op gabriel-greeting-go SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"fr\"}'",
      "op gabriel-greeting-go SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ja\"}'",
      "op gabriel-greeting-go SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"ru\"}'",
      "op gabriel-greeting-go SayHello '{\"name\":\"{{ .name }}\",\"lang_code\":\"en\"}'"
    ]
  }]
};


description: |
  A standalone .NET MAUI HostUI for the shared greeting contract. It keeps the
  staged-holon connect(slug) client flow on macOS.

kind: composite
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: app
      path: .
      type: component
  targets:
    macos:
      steps:
        - exec:
            cwd: .
            argv: ["dotnet", "build", "-f", "net8.0-maccatalyst", "-c", "Debug"]
        - assert_file:
            path: bin/Debug/net8.0-maccatalyst/maccatalyst-arm64/GreetingDotnet.app
requires:
  commands: [dotnet]
  files: [GreetingGodotnet.csproj]
artifacts:
  primary: bin/Debug/net8.0-maccatalyst/maccatalyst-arm64/GreetingDotnet.app

schema: holon/v0
given_name: gudule
family_name: Greeting-Qt-Dart
kind: composite
transport: stdio
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: daemon
      path: ../../daemons/gudule-daemon-greeting-dart
      type: holon
    - id: app
      path: ../../hostui/gudule-greeting-hostui-qt
      type: holon
  targets:
    macos:
      steps:
      - build_member: daemon
      - build_member: app
      - copy:
          from: ../../hostui/gudule-greeting-hostui-qt/.op/build/bin/gudule-greeting-goqt
          to: build/gudule-greeting-goqt
      - copy:
          from: ../../daemons/gudule-daemon-greeting-dart/.op/build/bin/gudule-daemon-greeting-dart
          to: build/daemon/gudule-daemon-greeting-dart
      - assert_file:
          path: build/gudule-greeting-goqt
      - assert_file:
          path: build/daemon/gudule-daemon-greeting-dart
requires:
  commands: [dart, cmake]
artifacts:
  primary: build/gudule-greeting-goqt

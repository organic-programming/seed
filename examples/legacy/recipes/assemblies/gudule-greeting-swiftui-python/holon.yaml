schema: holon/v0
given_name: gudule
family_name: Greeting-Swiftui-Python
kind: composite
transport: stdio
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: daemon
      path: ../../daemons/gudule-daemon-greeting-python
      type: holon
    - id: app
      path: ../../hostui/gudule-greeting-hostui-swiftui
      type: holon
  targets:
    macos:
      steps:
      - build_member: daemon
      - build_member: app
      - exec:
          cwd: .
          argv:
            - bash
            - -lc
            - |
                set -euo pipefail
                products_dir="../../hostui/gudule-greeting-hostui-swiftui/.build/xcode/macos/Build/Products/Debug"
                app_dir="build/GreetingSwiftUI.app"
                rm -rf "$app_dir"
                mkdir -p "$app_dir/Contents/MacOS" "$app_dir/Contents/Resources" "$app_dir/Contents/lib"
                cp "$products_dir/GreetingSwiftUI" "$app_dir/Contents/MacOS/GreetingSwiftUI"
                shopt -s nullglob
                for bundle in "$products_dir"/*.bundle; do
                  cp -R "$bundle" "$app_dir/Contents/Resources/"
                done
                if [ -d "$products_dir/PackageFrameworks" ]; then
                  cp -R "$products_dir/PackageFrameworks/." "$app_dir/Contents/lib/"
                fi
                cat > "$app_dir/Contents/Info.plist" <<'EOF'
                <?xml version="1.0" encoding="UTF-8"?>
                <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
                <plist version="1.0">
                <dict>
                  <key>CFBundleDevelopmentRegion</key>
                  <string>en</string>
                  <key>CFBundleDisplayName</key>
                  <string>GreetingSwiftUI</string>
                  <key>CFBundleExecutable</key>
                  <string>GreetingSwiftUI</string>
                  <key>CFBundleIdentifier</key>
                  <string>org.organicprogramming.gudule-greeting-swiftui-python</string>
                  <key>CFBundleInfoDictionaryVersion</key>
                  <string>6.0</string>
                  <key>CFBundleName</key>
                  <string>GreetingSwiftUI</string>
                  <key>CFBundlePackageType</key>
                  <string>APPL</string>
                  <key>CFBundleShortVersionString</key>
                  <string>1.0</string>
                  <key>CFBundleVersion</key>
                  <string>1</string>
                  <key>LSMinimumSystemVersion</key>
                  <string>15.0</string>
                  <key>NSHighResolutionCapable</key>
                <true/>
                </dict>
                </plist>
                EOF
      - copy:
          from: ../../daemons/gudule-daemon-greeting-python/.op/build/bin/gudule-daemon-greeting-python
          to: build/GreetingSwiftUI.app/Contents/Resources/daemon/gudule-daemon-greeting-python
      - assert_file:
          path: build/GreetingSwiftUI.app
      - assert_file:
          path: build/GreetingSwiftUI.app/Contents/Resources/daemon/gudule-daemon-greeting-python
      - assert_file:
          path: build/GreetingSwiftUI.app/Contents/_CodeSignature/CodeResources
requires:
  commands: [python3, xcodebuild]
artifacts:
  primary: build/GreetingSwiftUI.app

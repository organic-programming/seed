schema: holon/v0
uuid: "0d371dd4-2948-4192-8638-cee294fb8320"
given_name: gudule
family_name: Greeting-Daemon-Ruby
motto: Greets users in 56 languages with a Ruby daemon.
composer: Codex
clade: deterministic/pure
status: draft
born: "2026-03-14"

parents: []
reproduction: manual
generated_by: manual

description: |
  A standalone Ruby GreetingService daemon. It uses ruby-holons for
  the gRPC serve lifecycle, stdio bridging, and automatic HolonMeta
  registration from local protos. On Apple Silicon it launches through
  Rosetta because the grpc Ruby gem is only readily available here as
  an x86_64 prebuilt binary for the system Ruby.

kind: native
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: recipe
      path: .
      type: component
  targets:
    macos:
      steps:
        - exec:
            cwd: .
            argv: ["arch", "-x86_64", "bundle", "install"]
        - exec:
            cwd: .
            argv:
              - bash
              - -lc
              - |
                  mkdir -p .op/build/bin
                  cat > .op/build/bin/gudule-daemon-greeting-ruby <<'EOF'
                  #!/bin/sh
                  set -eu
                  SCRIPT_DIR=$(CDPATH= cd -- "$(dirname "$0")" && pwd)
                  RECIPE_DIR=$(CDPATH= cd -- "$SCRIPT_DIR/../../.." && pwd)
                  cd "$RECIPE_DIR"
                  exec arch -x86_64 bundle exec ruby "$RECIPE_DIR/bin/main.rb" "$@"
                  EOF
                  chmod +x .op/build/bin/gudule-daemon-greeting-ruby
        - assert_file:
            path: .op/build/bin/gudule-daemon-greeting-ruby
requires:
  commands: [ruby, bundle, arch]
  files:
    - Gemfile
    - bin/main.rb
    - protos/greeting/v1/greeting.proto
artifacts:
  binary: gudule-daemon-greeting-ruby

syntax = "proto3";

package hello.v1;

option java_package = "org.organicprogramming.hello";
option java_outer_classname = "HelloProto";

service HelloService {
  // Greet returns a friendly message for the requested name.
  // @example {"name":"Bob"}
  rpc Greet(GreetRequest) returns (GreetResponse);
}

message GreetRequest {
  // Name to greet. If empty, the service falls back to "World".
  // @example "Bob"
  string name = 1;
}

message GreetResponse {
  // Generated greeting text.
  // @required
  // @example "Hello, Bob!"
  string message = 1;
}

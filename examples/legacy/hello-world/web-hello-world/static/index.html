<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web-hello-world — Bidirectional Holon RPC</title>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --border: #2a2a3a;
            --accent: #7c5cfc;
            --accent-glow: rgba(124, 92, 252, 0.3);
            --text: #e8e8f0;
            --muted: #8888a0;
            --success: #4ade80;
            --error: #f87171;
            --info: #60a5fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.875rem;
            margin-bottom: 32px;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: var(--success);
        }

        .result.error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--error);
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-top: 28px;
            margin-bottom: 8px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .direction {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 6px;
        }

        .dir-out {
            background: rgba(124, 92, 252, 0.2);
            color: var(--accent);
        }

        .dir-in {
            background: rgba(96, 165, 250, 0.2);
            color: var(--info);
        }

        .log {
            margin-top: 8px;
            max-height: 180px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            line-height: 1.8;
            color: var(--muted);
        }

        .log-entry {
            padding: 2px 0;
        }

        .timing {
            font-size: 0.7rem;
            color: var(--muted);
            margin-left: 8px;
        }

        .status {
            margin-top: 16px;
            font-size: 0.75rem;
            color: var(--muted);
            text-align: center;
        }

        .status .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .status .dot.connected {
            background: var(--success);
        }

        .status .dot.disconnected {
            background: var(--error);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="card">
        <h1>web-hello-world</h1>
        <p class="subtitle">Bidirectional RPC: Browser ⇄ Go Holon</p>

        <div class="field">
            <label for="nameInput">Browser → Go</label>
            <input type="text" id="nameInput" value="Bob" autocomplete="off">
        </div>

        <button id="greetBtn" onclick="greet()">Invoke Greet</button>

        <div id="result" class="result"></div>

        <p class="section-label">RPC Event Log</p>
        <div id="log" class="log"></div>

        <div class="status">
            <span id="statusDot" class="dot disconnected"></span>
            <span id="statusText">Disconnected</span>
        </div>
    </div>

    <script type="module">
        import { HolonClient } from "./holons.mjs";

        const wsUrl = `ws://${location.host}/ws`;
        const client = new HolonClient(wsUrl);

        const resultEl = document.getElementById("result");
        const statusDot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        const logEl = document.getElementById("log");

        function addLog(direction, method, detail) {
            const entry = document.createElement("div");
            entry.className = "log-entry";
            const dirClass = direction === "out" ? "dir-out" : "dir-in";
            const dirLabel = direction === "out" ? "→ GO" : "← GO";
            entry.innerHTML = `<span class="direction ${dirClass}">${dirLabel}</span> ${method} <span class="timing">${detail}</span>`;
            logEl.prepend(entry);
        }

        // ─── Go → Browser handler: respond to server-initiated calls ───
        client.register("ui.v1.UIService/GetViewport", (payload) => {
            const result = {
                width: window.innerWidth,
                height: window.innerHeight,
                devicePixelRatio: window.devicePixelRatio,
            };
            addLog("in", "GetViewport", `responded ${result.width}×${result.height} @${result.devicePixelRatio}x`);
            return result;
        });

        // ─── Connect ───
        client.connect().then(() => {
            statusDot.className = "dot connected";
            statusText.textContent = `Connected to ${wsUrl}`;
            addLog("in", "connect", "established");
        }).catch(() => {
            statusDot.className = "dot disconnected";
            statusText.textContent = "Connection failed";
        });

        // ─── Browser → Go: Greet invocation ───
        window.greet = async function () {
            const name = document.getElementById("nameInput").value;
            const btn = document.getElementById("greetBtn");

            btn.disabled = true;
            resultEl.className = "result";
            resultEl.classList.remove("show");

            try {
                const t0 = performance.now();
                const resp = await client.invoke("hello.v1.HelloService/Greet", { name });
                const dt = (performance.now() - t0).toFixed(1);

                resultEl.textContent = resp.message;
                resultEl.className = "result success show";
                addLog("out", "Greet", `${resp.message} (${dt}ms)`);
            } catch (err) {
                resultEl.textContent = `Error (${err.code}): ${err.message}`;
                resultEl.className = "result error show";
                addLog("out", "Greet", `error: ${err.message}`);
            } finally {
                btn.disabled = false;
            }
        };

        document.getElementById("nameInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") window.greet();
        });
    </script>
</body>

</html>

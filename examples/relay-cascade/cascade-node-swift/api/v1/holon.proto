syntax = "proto3";

package relay.v1;

import "holons/v1/manifest.proto";
import "relay/v1/relay.proto";

// Swift-specific holon descriptor for cascade-node-swift.
// Layers Swift runtime metadata and holon identity on top of the shared
// relay-cascade contract.

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "4f3d5cad-0910-4d58-b430-2d2b6c423cc2"
    given_name: "Cascade"
    family_name: "Node-Swift"
    motto: "Minimal relay cascade node."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A minimal Swift holon used to validate cross-holon observability relay chains."
  lang: "swift"
  kind: "native"
  build: {
    runner: "swift-package"
    templates: ["Sources/CascadeNodeSwift/CLI.swift"]
    codegen: { languages: ["swift", "swift-grpc"] }
  }
  requires: {
    commands: ["swift"]
    files: ["Package.swift"]
    sdk_prebuilts: ["swift"]
  }
  artifacts: {
    binary: "cascade-node-swift"
  }
  sequences: [{
    name: "tick"
    description: "Emit one relay-cascade tick signal."
    params: [
      {name: "sender", description: "Tick sender label", required: true},
      {name: "note", description: "Free-form tick note", required: false}
    ]
    steps: [
      "op cascade-node-swift Tick '{\"sender\":\"{{ .sender }}\",\"note\":\"{{ .note }}\"}'"
    ]
  }]
};

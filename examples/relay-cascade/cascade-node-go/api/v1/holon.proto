syntax = "proto3";

package relay.v1;

import "holons/v1/manifest.proto";
import "relay/v1/relay.proto";

// Go-specific holon descriptor for cascade-node-go.
// Layers Go build metadata and holon identity on top of the shared
// relay-cascade contract.

option go_package = "cascade-node-go/gen/go/relay/v1;relayv1";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "2e5a5d47-5034-4b10-afd0-c7f51b3c277b"
    given_name: "Cascade"
    family_name: "Node-Go"
    motto: "Minimal relay cascade node."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A minimal Go holon used to validate cross-holon observability relay chains."
  lang: "go"
  kind: "native"
  build: {
    runner: "go-module"
    main: "./cmd"
    templates: ["api/version.go"]
    codegen: {
      languages: ["go", "go-grpc"]
    }
  }
  requires: {
    commands: ["go"]
    files: ["go.mod"]
    sdk_prebuilts: ["go"]
  }
  artifacts: {
    binary: "cascade-node-go"
  }
  sequences: [{
    name: "tick"
    description: "Emit one relay-cascade tick signal."
    params: [
      {name: "sender", description: "Tick sender label", required: true},
      {name: "note", description: "Free-form tick note", required: false}
    ]
    steps: [
      "op cascade-node-go Tick '{\"sender\":\"{{ .sender }}\",\"note\":\"{{ .note }}\"}'"
    ]
  }]
};

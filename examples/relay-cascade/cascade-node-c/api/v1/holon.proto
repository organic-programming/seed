syntax = "proto3";

package relay.v1;

import "holons/v1/manifest.proto";
import "relay/v1/relay.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "b6934a4d-b08f-4fb1-a35e-82185df31416"
    given_name: "Cascade"
    family_name: "Node-C"
    motto: "Minimal relay cascade node."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A minimal C holon used to validate cross-holon observability relay chains."
  lang: "c"
  kind: "native"
  build: {
    runner: "cmake"
    main: "./cmd/main.c"
    templates: ["api/cli.h"]
    codegen: { languages: ["c", "c-upbdefs", "c-upb-minitable"] }
  }
  requires: {
    commands: ["cmake"]
    files: ["CMakeLists.txt", "cmd/main.c"]
    sdk_prebuilts: ["c"]
  }
  artifacts: {
    binary: "cascade-node-c"
  }
  sequences: [{
    name: "tick"
    description: "Emit one relay-cascade tick signal."
    params: [
      {name: "sender", description: "Tick sender label", required: true},
      {name: "note", description: "Free-form tick note", required: false}
    ]
    steps: [
      "op cascade-node-c Tick '{\"sender\":\"{{ .sender }}\",\"note\":\"{{ .note }}\"}'"
    ]
  }]
};

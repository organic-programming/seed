syntax = "proto3";

package observability.cascade.c.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "e8a35438-fa97-4dd7-b53e-7b32bf0fc5fe"
    given_name: "Observability Cascade"
    family_name: "C Composite"
    motto: "Validates C observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A C composite program that validates observability-cascade observability across three modes and patterns."
  lang: "c"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "recipe"
    codegen: {
      languages: ["cpp"]
    }
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "node"
      path: "./holons/observability-cascade-node"
      type: "holon"
    }
    targets: {
      key: "macos"
      value: {
        steps: { build_member: "node" }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", "set -euo pipefail\npkg=\"${OP_PACKAGE_DIR:-.op/build/observability-cascade-c.holon}\"\narch=\"darwin_arm64\"\nbuild=\".op/build/cmake\"\nrm -rf \"$pkg\" \"$build\"\ncmake -S . -B \"$build\" -DCMAKE_BUILD_TYPE=Release -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=\"$PWD/$build/bin\" >/dev/null\ncmake --build \"$build\" --target observability-cascade-c >/dev/null\nmkdir -p \"$pkg/bin/$arch\"\ncp \"$build/bin/observability-cascade-c\" \"$pkg/bin/$arch/observability-cascade-c-real\"\nbash ../../../sdk/scripts/relocate-macos-dylibs.sh \"$pkg/bin/$arch\" observability-cascade-c-real >/dev/null\ncat > \"$pkg/bin/$arch/observability-cascade-c\" <<EOF\n#!/bin/sh\nOBSERVABILITY_CASCADE_C_SOURCE_ROOT=\"$PWD\" exec \"\\$(dirname \"\\$0\")/observability-cascade-c-real\" \"\\$@\"\nEOF\nchmod +x \"$pkg/bin/$arch/observability-cascade-c\""]
          }
        }
        steps: {
          assert_file: {
            path: ".op/build/observability-cascade-c.holon/bin/darwin_arm64/observability-cascade-c"
          }
        }
      }
    }
  }
  requires: {
    commands: ["cmake"]
    files: ["CMakeLists.txt", "src/main.cpp"]
    sdk_prebuilts: ["c"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-c.holon"
  }
};

syntax = "proto3";

package observability.cascade.java.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "51ecc4c4-fe02-48d6-bcc5-9b73f9740664"
    given_name: "observability-cascade"
    family_name: "java-composite"
    motto: "Validates Java observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A Java composite program that validates observability-cascade observability across three modes and patterns."
  lang: "java"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "recipe"
    codegen: { languages: ["java"] }
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "java-node"
      path: "../observability-cascade-java-node"
      type: "holon"
    }
    targets: {
      key: "macos"
      value: {
        steps: { build_member: "java-node" }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", "set -euo pipefail\npkg=\"${OP_PACKAGE_DIR:-.op/build/observability-cascade-java.holon}\"\narch=\"darwin_arm64\"\nrm -rf \"$pkg\"\ngradle --no-daemon installDist >/dev/null\nmkdir -p \"$pkg/bin/$arch\" \"$pkg/bin/lib\"\ncp build/install/observability-cascade-java/bin/observability-cascade-java \"$pkg/bin/$arch/observability-cascade-java\"\ncp -R build/install/observability-cascade-java/lib/. \"$pkg/bin/lib/\"\nchmod +x \"$pkg/bin/$arch/observability-cascade-java\""]
          }
        }
        steps: {
          assert_file: {
            path: ".op/build/observability-cascade-java.holon/bin/darwin_arm64/observability-cascade-java"
          }
        }
      }
    }
  }
  requires: {
    commands: ["java", "gradle"]
    files: ["build.gradle", "settings.gradle"]
    sdk_prebuilts: ["java"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-java.holon"
  }
};

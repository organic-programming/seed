syntax = "proto3";

package observability.cascade.dart.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "439ebe58-a8df-4ffd-8f28-5378cc00de29"
    given_name: "Observability Cascade"
    family_name: "Dart Composite"
    motto: "Validates Dart observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A Dart composite program that validates observability-cascade observability across three modes and patterns."
  lang: "dart"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "recipe"
    codegen: { languages: ["dart"] }
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "node"
      path: "./holons/observability-cascade-node"
      type: "holon"
    }
    targets: {
      key: "macos"
      value: {
        steps: { build_member: "node" }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", "set -euo pipefail\npkg=\"${OP_PACKAGE_DIR:-.op/build/observability-cascade-dart.holon}\"\narch=\"darwin_arm64\"\nrm -rf \"$pkg\"\nmkdir -p \"$pkg/bin/$arch\"\ndart pub get\ndart compile exe -DOBSERVABILITY_CASCADE_DART_SOURCE_ROOT=\"$PWD\" bin/main.dart -o \"$pkg/bin/$arch/observability-cascade-dart\""]
          }
        }
        steps: {
          assert_file: {
            path: ".op/build/observability-cascade-dart.holon/bin/darwin_arm64/observability-cascade-dart"
          }
        }
      }
    }
  }
  requires: {
    commands: ["dart"]
    files: ["bin/main.dart", "pubspec.yaml"]
    sdk_prebuilts: ["dart"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-dart.holon"
  }
};

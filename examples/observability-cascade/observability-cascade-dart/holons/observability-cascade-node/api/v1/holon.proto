syntax = "proto3";

package relay.v1;

import "holons/v1/manifest.proto";
import "relay/v1/relay.proto";

// Dart-specific holon descriptor for observability-cascade-node-dart.
// Layers Dart build metadata and holon identity on top of the shared
// observability-cascade contract.

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "6c907f2e-64d6-4d7c-89d4-e7283acfc20e"
    given_name: "Observability Cascade"
    family_name: "Node-Dart"
    motto: "Minimal observability cascade node."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"

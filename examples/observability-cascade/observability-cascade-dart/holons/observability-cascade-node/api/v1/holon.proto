  description: "A minimal Dart holon used to validate cross-holon observability relay chains."
  lang: "dart"
  kind: "native"
  build: {
    runner: "dart"
    main: "./cmd/main.dart"
    templates: ["api/cli.dart"]
    codegen: { languages: ["dart"] }
  }
  requires: {
    commands: ["dart"]
    files: ["cmd/main.dart", "pubspec.yaml"]
    sdk_prebuilts: ["dart"]
  }
  artifacts: {
    binary: "observability-cascade-node-dart"
  }
  sequences: [{

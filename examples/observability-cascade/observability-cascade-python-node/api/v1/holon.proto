syntax = "proto3";

package relay.v1;

import "holons/v1/manifest.proto";
import "relay/v1/relay.proto";

// Python-specific holon descriptor for observability-cascade-python-node.
// Layers Python runtime metadata and holon identity on top of the shared
// observability-cascade contract.

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "3c7fb5bf-af35-4bfd-b380-3bb2532c1a4b"
    given_name: "Observability"
    family_name: "Cascade-Python-Node"
    motto: "Minimal observability cascade node."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A minimal Python holon used to validate cross-holon observability relay chains."
  lang: "python"
  kind: "native"
  build: {
    runner: "python"
    main: "./cmd/main.py"
    templates: ["api/cli.py"]
    codegen: { languages: ["python"] }
  }
  requires: {
    commands: ["python3"]
    files: ["cmd/main.py", "pyproject.toml", "requirements.txt"]
    sdk_prebuilts: ["python"]
  }
  artifacts: {
    binary: "observability-cascade-python-node"
  }
  sequences: [{
    name: "tick"
    description: "Emit one observability-cascade tick signal."
    params: [
      {name: "sender", description: "Tick sender label", required: true},
      {name: "note", description: "Free-form tick note", required: false}
    ]
    steps: [
      "op observability-cascade-python-node Tick '{\"sender\":\"{{ .sender }}\",\"note\":\"{{ .note }}\"}'"
    ]
  }]
};

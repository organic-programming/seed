syntax = "proto3";

package observability.cascade.cpp.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "f638734a-0055-40f5-88e7-e4f85921fd43"
    given_name: "observability-cascade"
    family_name: "cpp-composite"
    motto: "Validates C++ observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A C++ composite program that validates observability-cascade observability across three modes and patterns."
  lang: "cpp"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "recipe"
    codegen: {
      languages: ["cpp"]
    }
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "cpp-node"
      path: "../observability-cascade-cpp-node"
      type: "holon"
    }
    targets: {
      key: "macos"
      value: {
        steps: { build_member: "cpp-node" }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", "set -euo pipefail\npkg=\"${OP_PACKAGE_DIR:-.op/build/observability-cascade-cpp.holon}\"\narch=\"darwin_arm64\"\nbuild=\".op/build/cmake\"\nrm -rf \"$pkg\" \"$build\"\ncmake -S . -B \"$build\" -DCMAKE_BUILD_TYPE=Release -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=\"$PWD/$build/bin\" >/dev/null\ncmake --build \"$build\" --target observability-cascade-cpp >/dev/null\nmkdir -p \"$pkg/bin/$arch\"\ncp \"$build/bin/observability-cascade-cpp\" \"$pkg/bin/$arch/observability-cascade-cpp-real\"\nbash ../../../sdk/scripts/relocate-macos-dylibs.sh \"$pkg/bin/$arch\" observability-cascade-cpp-real >/dev/null\ncat > \"$pkg/bin/$arch/observability-cascade-cpp\" <<EOF\n#!/bin/sh\nOBSERVABILITY_CASCADE_CPP_SOURCE_ROOT=\"$PWD\" exec \"\\$(dirname \"\\$0\")/observability-cascade-cpp-real\" \"\\$@\"\nEOF\nchmod +x \"$pkg/bin/$arch/observability-cascade-cpp\""]
          }
        }
        steps: {
          assert_file: {
            path: ".op/build/observability-cascade-cpp.holon/bin/darwin_arm64/observability-cascade-cpp"
          }
        }
      }
    }
  }
  requires: {
    commands: ["cmake"]
    files: ["CMakeLists.txt", "src/main.cpp"]
    sdk_prebuilts: ["cpp"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-cpp.holon"
  }
};

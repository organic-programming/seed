syntax = "proto3";

package observability.cascade.ruby.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "d220e0b2-48ee-473e-a86e-610ca528b69a"
    given_name: "Observability Cascade"
    family_name: "Ruby Composite"
    motto: "Validates Ruby observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A Ruby composite program that validates observability-cascade observability across three modes and patterns."
  lang: "ruby"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "recipe"
    codegen: { languages: ["ruby"] }
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "node"
      path: "./holons/observability-cascade-node"
      type: "holon"
    }
    targets: {
      key: "macos"
      value: {
        steps: { build_member: "node" }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", "set -euo pipefail\npkg=\"${OP_PACKAGE_DIR:-.op/build/observability-cascade-ruby.holon}\"\narch=\"darwin_arm64\"\nbuild=\".op/build/ruby\"\nruby_bin=\"${OP_RUBY_BIN:-/opt/homebrew/opt/ruby@3.1/bin/ruby}\"\nbundle_bin=\"${OP_BUNDLE_BIN:-/opt/homebrew/opt/ruby@3.1/bin/bundle}\"\nnode_build=\"$PWD/holons/observability-cascade-node/.op/build/ruby\"\nbundle_gemfile=\"$node_build/Gemfile\"\nbundle_path=\"$node_build/.op/bundle\"\nif [ ! -x \"$ruby_bin\" ]; then ruby_bin=\"$(command -v ruby)\"; fi\nif [ ! -x \"$bundle_bin\" ]; then bundle_bin=\"$(command -v bundle)\"; fi\nrm -rf \"$pkg\" \"$build/bin\" \"$build/gen\"\nmkdir -p \"$pkg/bin/$arch\" \"$build\"\ncp -R bin gen Gemfile Gemfile.lock \"$build/\"\nBUNDLE_GEMFILE=\"$bundle_gemfile\" BUNDLE_PATH=\"$bundle_path\" BUNDLE_DISABLE_SHARED_GEMS=true \"$bundle_bin\" check >/dev/null\ncat > \"$pkg/bin/$arch/observability-cascade-ruby\" <<EOF\n#!/bin/sh\nset -eu\nexport OBSERVABILITY_CASCADE_RUBY_SOURCE_ROOT=\"$PWD\"\nexport BUNDLE_GEMFILE=\"$bundle_gemfile\"\nexport BUNDLE_PATH=\"$bundle_path\"\nexport BUNDLE_DISABLE_SHARED_GEMS=true\nexec \"$bundle_bin\" exec \"$ruby_bin\" \"$PWD/$build/bin/main.rb\" \"\\$@\"\nEOF\nchmod +x \"$pkg/bin/$arch/observability-cascade-ruby\""]
          }
        }
        steps: {
          assert_file: {
            path: ".op/build/observability-cascade-ruby.holon/bin/darwin_arm64/observability-cascade-ruby"
          }
        }
      }
    }
  }
  requires: {
    commands: ["ruby", "bundle"]
    files: ["bin/main.rb", "Gemfile"]
    sdk_prebuilts: ["ruby"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-ruby.holon"
  }
};

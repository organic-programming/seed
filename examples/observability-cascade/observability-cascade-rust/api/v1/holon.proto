syntax = "proto3";

package observability.cascade.rust.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "1002f937-9710-4fb2-834e-064025bd3e0a"
    given_name: "observability-cascade"
    family_name: "rust-composite"
    motto: "Validates Rust observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A Rust composite program that validates observability-cascade observability across three modes and patterns."
  lang: "rust"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "recipe"
    codegen: {
      languages: ["rust"]
    }
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "rust-node"
      path: "../observability-cascade-rust-node"
      type: "holon"
    }
    targets: {
      key: "macos"
      value: {
        steps: { build_member: "rust-node" }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", "set -euo pipefail\npkg=\"${OP_PACKAGE_DIR:-.op/build/observability-cascade-rust.holon}\"\narch=\"darwin_arm64\"\nrm -rf \"$pkg\"\nmkdir -p \"$pkg/bin/$arch\"\ncargo build --target-dir .op/build/cargo\ncp .op/build/cargo/debug/observability-cascade-rust \"$pkg/bin/$arch/observability-cascade-rust\""]
          }
        }
        steps: {
          assert_file: {
            path: ".op/build/observability-cascade-rust.holon/bin/darwin_arm64/observability-cascade-rust"
          }
        }
      }
    }
  }
  requires: {
    commands: ["cargo"]
    files: ["Cargo.toml"]
    sdk_prebuilts: ["rust"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-rust.holon"
  }
};

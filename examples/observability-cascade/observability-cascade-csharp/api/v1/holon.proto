syntax = "proto3";

package observability.cascade.csharp.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "462bb284-290d-44f8-b86b-d066f7226b22"
    given_name: "observability-cascade"
    family_name: "csharp-composite"
    motto: "Validates C# observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A C# composite program that validates observability-cascade observability across three modes and patterns."
  lang: "csharp"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "recipe"
    codegen: { languages: ["csharp"] }
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "csharp-node"
      path: "../observability-cascade-csharp-node"
      type: "holon"
    }
    targets: {
      key: "macos"
      value: {
        steps: { build_member: "csharp-node" }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", "set -euo pipefail\npkg=\"${OP_PACKAGE_DIR:-.op/build/observability-cascade-csharp.holon}\"\narch=\"darwin_arm64\"\nrm -rf \"$pkg\"\ndotnet publish observability-cascade-csharp.csproj -c Release -o \"$pkg/bin/$arch\" >/dev/null\nchmod +x \"$pkg/bin/$arch/observability-cascade-csharp\""]
          }
        }
        steps: {
          assert_file: {
            path: ".op/build/observability-cascade-csharp.holon/bin/darwin_arm64/observability-cascade-csharp"
          }
        }
      }
    }
  }
  requires: {
    commands: ["dotnet"]
    files: ["observability-cascade-csharp.csproj", "Program.cs"]
    sdk_prebuilts: ["csharp"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-csharp.holon"
  }
};

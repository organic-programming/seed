syntax = "proto3";

package observability.cascade.go.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "6bcbb9a7-acf0-4953-b12d-600a53b6e6c4"
    given_name: "Observability Cascade"
    family_name: "Go Composite"
    motto: "Validates Go observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A Go composite program that validates observability-cascade observability across three modes and patterns."
  lang: "go"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "recipe"
    codegen: {
      languages: ["go", "go-grpc"]
    }
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "node"
      path: "./holons/observability-cascade-node"
      type: "holon"
    }
    targets: {
      key: "macos"
      value: {
        steps: { build_member: "node" }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", "set -euo pipefail\npkg=\"${OP_PACKAGE_DIR:-.op/build/observability-cascade-go.holon}\"\narch=\"$(go env GOOS)_$(go env GOARCH)\"\nrm -rf \"$pkg\"\nmkdir -p \"$pkg/bin/$arch\"\ngo build -o \"$pkg/bin/$arch/observability-cascade-go\" ./cmd"]
          }
        }
        steps: {
          assert_file: {
            path: ".op/build/observability-cascade-go.holon/bin/darwin_arm64/observability-cascade-go"
          }
        }
      }
    }
  }
  requires: {
    commands: ["go"]
    files: ["go.mod"]
    sdk_prebuilts: ["go"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-go.holon"
  }
};

syntax = "proto3";

package observability.cascade.go.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "6bcbb9a7-acf0-4953-b12d-600a53b6e6c4"
    given_name: "Observability"
    family_name: "Cascade-Go"
    motto: "Validates Go observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A Go composite program that validates observability-cascade observability across three modes and patterns."
  lang: "go"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "go-module"
    main: "./cmd"
    codegen: {
      languages: ["go", "go-grpc"]
    }
    members: {
      id: "go-node"
      path: "../observability-cascade-go-node"
      type: "holon"
    }
    members: {
      id: "dart-node"
      path: "../observability-cascade-dart-node"
      type: "holon"
    }
  }
  requires: {
    commands: ["go"]
    files: ["go.mod"]
    sdk_prebuilts: ["go"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-go.holon"
  }
};

syntax = "proto3";

package observability.cascade.node.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "db549442-f097-4691-9677-1708a03bd1e8"
    given_name: "Observability"
    family_name: "Cascade-Node"
    motto: "Validates Node observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A Node.js composite program that validates observability-cascade observability across three modes and patterns."
  lang: "js"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "recipe"
    codegen: { languages: ["js"] }
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "node-node"
      path: "../observability-cascade-node-node"
      type: "holon"
    }
    targets: {
      key: "macos"
      value: {
        steps: { build_member: "node-node" }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", "set -euo pipefail\npkg=\"${OP_PACKAGE_DIR:-.op/build/observability-cascade-node.holon}\"\narch=\"darwin_arm64\"\nbuild=\".op/build/npm\"\nnode_bin=\"${OP_NODE_BIN:-$(command -v node)}\"\nnode_build=\"$PWD/holons/observability-cascade-node/.op/build/npm\"\nif [ ! -d \"$node_build/node_modules\" ]; then echo \"internal node dependencies missing: $node_build/node_modules\" >&2; exit 1; fi\nrm -rf \"$pkg\" \"$build/bin\" \"$build/gen\"\nmkdir -p \"$pkg/bin/$arch\" \"$build\"\ncp -R cmd gen package.json \"$build/\"\ncat > \"$pkg/bin/$arch/observability-cascade-node\" <<EOF\n#!/bin/sh\nset -eu\nexport OBSERVABILITY_CASCADE_NODE_SOURCE_ROOT=\"$PWD\"\nexec \"$node_bin\" \"$PWD/$build/cmd/main.js\" \"\\$@\"\nEOF\nchmod +x \"$pkg/bin/$arch/observability-cascade-node\""]
          }
        }
        steps: {
          assert_file: {
            path: ".op/build/observability-cascade-node.holon/bin/darwin_arm64/observability-cascade-node"
          }
        }
      }
    }
  }
  requires: {
    commands: ["node", "npm"]
    files: ["cmd/main.js", "package.json"]
    sdk_prebuilts: ["js"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-node.holon"
  }
};

syntax = "proto3";

package observability.cascade.zig.v1;

import "holons/v1/manifest.proto";
import "observability_cascade/v1/service.proto";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "64156f12-3985-4d72-b5b7-1b9b6da80f13"
    given_name: "observability-cascade"
    family_name: "zig-composite"
    motto: "Validates Zig observability cascade observability."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-05-13"
    version: "0.1.0"
  }
  description: "A Zig composite program that validates observability-cascade observability across three modes and patterns."
  lang: "zig"
  kind: "composite"
  transport: "tcp"
  contract: {
    proto: "observability_cascade/v1/service.proto"
    service: "observability_cascade.v1.ObservabilityCascadeService"
    rpcs: ["RunDefault", "RunLiveStream", "RunMultiPattern"]
  }
  build: {
    runner: "recipe"
    codegen: {
      languages: ["zig"]
    }
    defaults: {
      target: "macos"
      mode: "debug"
    }
    members: {
      id: "zig-node"
      path: "../observability-cascade-zig-node"
      type: "holon"
    }
    targets: {
      key: "macos"
      value: {
        steps: { build_member: "zig-node" }
        steps: {
          exec: {
            cwd: "."
            argv: ["bash", "-lc", "set -euo pipefail\npkg=\"${OP_PACKAGE_DIR:-.op/build/observability-cascade-zig.holon}\"\narch=\"darwin_arm64\"\nrm -rf \"$pkg\" zig-out\nzig build -Doptimize=ReleaseSafe >/dev/null\nmkdir -p \"$pkg/bin/$arch\"\ncp zig-out/bin/observability-cascade-zig \"$pkg/bin/$arch/observability-cascade-zig-real\"\ncat > \"$pkg/bin/$arch/observability-cascade-zig\" <<EOF\n#!/bin/sh\nOBSERVABILITY_CASCADE_ZIG_SOURCE_ROOT=\"$PWD\" exec \"\\$(dirname \"\\$0\")/observability-cascade-zig-real\" \"\\$@\"\nEOF\nchmod +x \"$pkg/bin/$arch/observability-cascade-zig\""]
          }
        }
        steps: {
          assert_file: {
            path: ".op/build/observability-cascade-zig.holon/bin/darwin_arm64/observability-cascade-zig"
          }
        }
      }
    }
  }
  requires: {
    commands: ["zig"]
    files: ["build.zig", "src/main.zig"]
    sdk_prebuilts: ["zig"]
  }
  artifacts: {
    primary: ".op/build/observability-cascade-zig.holon"
  }
};

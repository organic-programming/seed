[package]
name = "gudule-daemon-greeting-rust"
version = "0.1.0"
edition = "2021"

[dependencies]
holons = { path = "../../../sdk/rust-holons" }
prost = "0.13"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }
tonic = { version = "0.12", features = ["transport"] }
tonic-reflection = "0.12"
tonic-web = "0.12"

[build-dependencies]
tonic-build = "0.12"

schema: holon/v0
given_name: gudule
family_name: Greeting-Qt-Csharp
kind: composite
transport: tcp
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: daemon
      path: ../../daemons/gudule-daemon-greeting-csharp
      type: holon
    - id: app
      path: ../../hostui/gudule-greeting-hostui-qt
      type: holon
  targets:
    macos:
      steps:
      - build_member: daemon
      - build_member: app
      - copy:
          from: ../../hostui/gudule-greeting-hostui-qt/.op/build/bin/gudule-greeting-goqt
          to: build/gudule-greeting-goqt
      - exec:
          cwd: .
          argv: ["ditto", "../../daemons/gudule-daemon-greeting-csharp/.op/build/bin", "build/daemon"]
      - assert_file:
          path: build/gudule-greeting-goqt
      - assert_file:
          path: build/daemon/gudule-daemon-greeting-csharp
      - assert_file:
          path: build/daemon/gudule-daemon-greeting-csharp.dll
requires:
  commands: [dotnet, cmake]
artifacts:
  primary: build/gudule-greeting-goqt

  SwiftUI HostUI. The daemon is built first so the HostUI can package the
  generic fallback binary during its native build.
kind: composite
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: daemon
      path: ../../daemons/greeting-daemon-go
      type: holon
    - id: hostui
      path: ../../hostui/greeting-hostui-swiftui
      type: holon
  targets:
    macos:
      steps:
        - build_member: daemon
        - build_member: hostui

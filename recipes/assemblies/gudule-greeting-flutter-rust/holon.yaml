schema: holon/v0
uuid: "d6e2f737-95fd-4d44-92dd-4fcfdd3fd7d5"
given_name: gudule
family_name: Greeting-Flutter-Rust
motto: Greets users in 56 languages with a Rust daemon and Flutter HostUI.
composer: Codex
clade: deterministic/pure
status: draft
born: "2026-03-11"

parents: []
reproduction: manual
generated_by: manual

description: |
  Thin macOS assembly for the extracted Rust daemon and Flutter HostUI.
  It builds both holons, bundles the daemon into the app Resources
  directory, and keeps runtime discovery inside dart-holons connect().

kind: composite
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: daemon
      path: ../../daemons/gudule-daemon-greeting-rust
      type: holon
    - id: app
      path: ../../hostui/gudule-greeting-hostui-flutter
      type: holon
  targets:
    macos:
      steps:
        - build_member: daemon
        - build_member: app
        - exec:
            cwd: .
            argv: ["/bin/sh", "-c", "rm -rf build/gudule-greeting-hostui-flutter.app"]
        - exec:
            cwd: .
            argv:
              [
                "ditto",
                "../../hostui/gudule-greeting-hostui-flutter/build/macos/Build/Products/Debug/gudule-greeting-hostui-flutter.app",
                "build/gudule-greeting-hostui-flutter.app",
              ]
        - copy:
            from: ../../daemons/gudule-daemon-greeting-rust/.op/build/bin/gudule-daemon-greeting-rust
            to: build/gudule-greeting-hostui-flutter.app/Contents/Resources/gudule-daemon-greeting-rust
        - assert_file:
            path: build/gudule-greeting-hostui-flutter.app
requires:
  commands: [cargo, flutter, dart]
  files:
    - ../../daemons/gudule-daemon-greeting-rust/Cargo.toml
    - ../../hostui/gudule-greeting-hostui-flutter/pubspec.yaml
artifacts:
  primary: build/gudule-greeting-hostui-flutter.app

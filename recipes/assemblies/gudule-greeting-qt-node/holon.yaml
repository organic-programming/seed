schema: holon/v0
given_name: gudule
family_name: Greeting-Qt-Node
kind: composite
transport: tcp
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: daemon
      path: ../../daemons/gudule-daemon-greeting-node
      type: holon
    - id: app
      path: ../../hostui/gudule-greeting-hostui-qt
      type: holon
  targets:
    macos:
      steps:
      - build_member: daemon
      - build_member: app
      - copy:
          from: ../../hostui/gudule-greeting-hostui-qt/.op/build/bin/gudule-greeting-goqt
          to: build/gudule-greeting-goqt
      - copy:
          from: ../../daemons/gudule-daemon-greeting-node/.op/build/bin/gudule-daemon-greeting-node
          to: build/daemon/gudule-daemon-greeting-node
      - assert_file:
          path: build/gudule-greeting-goqt
      - assert_file:
          path: build/daemon/gudule-daemon-greeting-node
requires:
  commands: [node, npm, cmake]
artifacts:
  primary: build/gudule-greeting-goqt

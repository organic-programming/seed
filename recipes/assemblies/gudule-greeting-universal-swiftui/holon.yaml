schema: holon/v0
uuid: "de2345bd-8ff1-4df2-8eb1-f8ed3d59e376"
given_name: gudule
family_name: Greeting-Universal-Swiftui
motto: Universal Gudule application combining all daemons.
composer: Codex
clade: deterministic/pure
status: draft
born: "2026-03-14"

parents: []
reproduction: manual
generated_by: manual

description: |
  A universal macOS application bundle combining the SwiftUI HostUI and all
  available greeting daemons, allowing seamless UI-driven daemon switching.

kind: composite
transport: stdio
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: daemon_c
      path: ../../daemons/gudule-daemon-greeting-c
      type: holon
    - id: daemon_cpp
      path: ../../daemons/gudule-daemon-greeting-cpp
      type: holon
    - id: daemon_csharp
      path: ../../daemons/gudule-daemon-greeting-csharp
      type: holon
    - id: daemon_dart
      path: ../../daemons/gudule-daemon-greeting-dart
      type: holon
    - id: daemon_go
      path: ../../daemons/gudule-daemon-greeting-go
      type: holon
    - id: daemon_java
      path: ../../daemons/gudule-daemon-greeting-java
      type: holon
    - id: daemon_kotlin
      path: ../../daemons/gudule-daemon-greeting-kotlin
      type: holon
    - id: daemon_node
      path: ../../daemons/gudule-daemon-greeting-node
      type: holon
    - id: daemon_python
      path: ../../daemons/gudule-daemon-greeting-python
      type: holon
    - id: daemon_ruby
      path: ../../daemons/gudule-daemon-greeting-ruby
      type: holon
    - id: daemon_rust
      path: ../../daemons/gudule-daemon-greeting-rust
      type: holon
    - id: daemon_swift
      path: ../../daemons/gudule-daemon-greeting-swift
      type: holon
    - id: app
      path: ../../hostui/gudule-greeting-hostui-universal-swiftui
      type: holon
  targets:
    macos:
      steps:
      - build_member: daemon_c
      - build_member: daemon_cpp
      - build_member: daemon_csharp
      - build_member: daemon_dart
      - build_member: daemon_go
      - build_member: daemon_java
      - build_member: daemon_kotlin
      - build_member: daemon_node
      - build_member: daemon_python
      - build_member: daemon_ruby
      - build_member: daemon_rust
      - build_member: daemon_swift
      - build_member: app
      - exec:
          cwd: .
          argv:
            - bash
            - -lc
            - |
                set -euo pipefail
                products_dir="../../hostui/gudule-greeting-hostui-universal-swiftui/.build/xcode/macos/Build/Products/Debug"
                app_dir="build/GreetingSwiftUI.app"
                rm -rf "$app_dir"
                mkdir -p "$app_dir/Contents/MacOS" "$app_dir/Contents/Resources/daemon" "$app_dir/Contents/lib"
                cp "$products_dir/GreetingSwiftUI" "$app_dir/Contents/MacOS/GreetingSwiftUI"
                
                shopt -s nullglob
                for bundle in "$products_dir"/*.bundle; do
                  cp -R "$bundle" "$app_dir/Contents/Resources/"
                done
                if [ -d "$products_dir/PackageFrameworks" ]; then
                  cp -R "$products_dir/PackageFrameworks/." "$app_dir/Contents/lib/"
                fi
                cat > "$app_dir/Contents/Info.plist" <<'EOF'
                <?xml version="1.0" encoding="UTF-8"?>
                <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
                <plist version="1.0">
                <dict>
                  <key>CFBundleDevelopmentRegion</key>
                  <string>en</string>
                  <key>CFBundleDisplayName</key>
                  <string>GreetingSwiftUI</string>
                  <key>CFBundleExecutable</key>
                  <string>GreetingSwiftUI</string>
                  <key>CFBundleIdentifier</key>
                  <string>org.organicprogramming.gudule-universal-swiftui</string>
                  <key>CFBundleInfoDictionaryVersion</key>
                  <string>6.0</string>
                  <key>CFBundleName</key>
                  <string>GreetingSwiftUI</string>
                  <key>CFBundlePackageType</key>
                  <string>APPL</string>
                  <key>CFBundleShortVersionString</key>
                  <string>1.0</string>
                  <key>CFBundleVersion</key>
                  <string>1</string>
                  <key>LSMinimumSystemVersion</key>
                  <string>15.0</string>
                  <key>NSHighResolutionCapable</key>
                <true/>
                </dict>
                </plist>
                EOF
      - assert_file:
          path: build/GreetingSwiftUI.app
      - assert_file:
          path: build/GreetingSwiftUI.app/Contents/_CodeSignature/CodeResources
requires:
  commands: [swift, xcodebuild, go, rustc, cargo, java, javac, python3, node, dotnet, dart, ruby, bundle, arch, cmake, gcc, g++]
artifacts:
  primary: build/GreetingSwiftUI.app

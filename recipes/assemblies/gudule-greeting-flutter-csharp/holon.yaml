schema: holon/v0
given_name: gudule
family_name: Greeting-Flutter-Csharp
kind: composite
transport: tcp
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: daemon
      path: ../../daemons/gudule-daemon-greeting-csharp
      type: holon
    - id: app
      path: ../../hostui/gudule-greeting-hostui-flutter
      type: holon
  targets:
    macos:
      steps:
      - build_member: daemon
      - build_member: app
      - exec:
          cwd: .
          argv: ["/bin/sh", "-c", "rm -rf build/gudule-greeting-hostui-flutter.app"]
      - exec:
          cwd: .
          argv: ["ditto", "../../hostui/gudule-greeting-hostui-flutter/build/macos/Build/Products/Debug/gudule-greeting-hostui-flutter.app", "build/gudule-greeting-hostui-flutter.app"]
      - copy:
          from: ../../daemons/gudule-daemon-greeting-csharp/.op/build/bin/gudule-daemon-greeting-csharp
          to: build/gudule-greeting-hostui-flutter.app/Contents/Resources/gudule-daemon-greeting-csharp
      - assert_file:
          path: build/gudule-greeting-hostui-flutter.app
      - assert_file:
          path: build/gudule-greeting-hostui-flutter.app/Contents/Resources/gudule-daemon-greeting-csharp
requires:
  commands: [dotnet, flutter, dart]
artifacts:
  primary: build/gudule-greeting-hostui-flutter.app

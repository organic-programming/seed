schema: holon/v0
uuid: "61aa59e8-e4fc-425f-a799-48ff7a6d02d2"
given_name: gudule
family_name: Greeting-Hostui-Swiftui
motto: Greets users in 56 languages through a SwiftUI HostUI.
composer: Codex
clade: deterministic/pure
status: draft
born: "2026-03-11"

parents: []
reproduction: manual
generated_by: manual

description: |
  A standalone SwiftUI HostUI for the shared greeting contract. On macOS it
  keeps the staged-holon connect(slug) flow and can talk to any GreetingService
  daemon that follows the shared contract.

kind: composite
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: app
      path: .
      type: component
  targets:
    macos:
      steps:
        - exec:
            cwd: .
            argv: ["xcodebuild", "-scheme", "GreetingSwiftUI", "-configuration", "Debug", "-destination", "generic/platform=macOS", "-derivedDataPath", ".build/xcode/macos", "-clonedSourcePackagesDirPath", ".build/xcode/source-packages", "build"]
        - assert_file:
            path: .build/xcode/macos/Build/Products/Debug/GreetingSwiftUI
requires:
  commands: [xcodebuild]
  files: [Package.swift]
artifacts:
  primary: .build/xcode/macos/Build/Products/Debug/GreetingSwiftUI

description: |
  A standalone Kotlin Desktop HostUI for the shared greeting contract. It
  preserves the staged-holon connect(slug) flow on macOS.

kind: composite
platforms: [macos]
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: app
      path: .
      type: component
  targets:
    macos:
      steps:
        - exec:
            cwd: .
            argv: ["./gradlew", "createDistributable"]
        - assert_file:
            path: build/compose/binaries/main/app/gudule-greeting-gokotlin.app
requires:
  commands: [java]
  files: [build.gradle.kts, settings.gradle.kts]
artifacts:
  primary: build/compose/binaries/main/app/gudule-greeting-gokotlin.app

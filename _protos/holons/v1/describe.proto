syntax = "proto3";

package holons.v1;

import "holons/v1/manifest.proto";

// HolonMeta is auto-registered by each SDK's serve runner.
// It provides self-documentation for any running holon.
// See HOLON_PROTO.md for the manifest schema.
service HolonMeta {
  // Describe returns the holon's full manifest and its API catalog.
  rpc Describe(DescribeRequest) returns (DescribeResponse);
}

message DescribeRequest {}

message DescribeResponse {
  // Full holon manifest (identity, skills, build, guide, etc.).
  HolonManifest manifest = 1;

  // One entry per gRPC service the holon exposes (excluding HolonMeta itself).
  repeated ServiceDoc services = 2;
}

// ── API Introspection Catalog ───────────────────────────
// Moved verbatim from holonmeta/v1 — battle-tested across 5 SDKs.

// ServiceDoc documents a single gRPC service.
message ServiceDoc {
  // Fully qualified service name, e.g. "greeting.v1.GreetingService".
  string name = 1;

  // Human-readable description from the proto comment.
  string description = 2;

  // One entry per RPC method in the service.
  repeated MethodDoc methods = 3;
}

// MethodDoc documents a single RPC method.
message MethodDoc {
  string name = 1;
  string description = 2;

  // Fully qualified input/output message types.
  string input_type = 3;
  string output_type = 4;

  // Field documentation for input and output messages.
  repeated FieldDoc input_fields = 5;
  repeated FieldDoc output_fields = 6;

  bool client_streaming = 7;
  bool server_streaming = 8;

  // Concrete example request as JSON, from @example tags in proto comments.
  string example_input = 9;
}

// FieldDoc documents a single message field.
message FieldDoc {
  string name = 1;
  string type = 2;          // proto type (e.g. "string", "greeting.v1.Language")
  int32 number = 3;
  string description = 4;
  FieldLabel label = 5;

  // Map-specific type information.
  string map_key_type = 6;
  string map_value_type = 7;

  // Recursive: nested message fields or enum values.
  repeated FieldDoc nested_fields = 8;
  repeated EnumValueDoc enum_values = 9;

  // Semantic metadata from @required and @example proto comment tags.
  bool required = 10;
  string example = 11;
}

// FieldLabel indicates field cardinality.
enum FieldLabel {
  FIELD_LABEL_UNSPECIFIED = 0;
  FIELD_LABEL_OPTIONAL    = 1;
  FIELD_LABEL_REPEATED    = 2;
  FIELD_LABEL_MAP         = 3;
  FIELD_LABEL_REQUIRED    = 4;
}

// EnumValueDoc documents a single enum value.
message EnumValueDoc {
  string name = 1;
  int32 number = 2;
  string description = 3;
}

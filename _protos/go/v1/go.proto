syntax = "proto3";
package go.v1;

service GoService {
  // ---- Exec mode: orchestration via subprocess ----

  // Build runs `go build` in the requested workspace.
  // @example {"args":["./cmd/rob-go"],"workdir":"."}
  rpc Build(GoCommandRequest) returns (GoCommandResponse);

  // Test runs `go test` and can optionally return structured JSON events.
  // @example {"args":["./...","-race"],"workdir":".","json_output":true,"cover":true,"cover_profile":"coverage.out"}
  rpc Test(TestRequest) returns (TestResponse);

  // Run executes `go run` with the provided package or files.
  // @example {"args":["./cmd/demo"],"workdir":"."}
  rpc Run(GoCommandRequest) returns (GoCommandResponse);

  // Mod dispatches to `go mod`.
  // @example {"args":["tidy"],"workdir":"."}
  rpc Mod(GoCommandRequest) returns (GoCommandResponse);

  // Get dispatches to `go get`.
  // @example {"args":["golang.org/x/tools/cmd/stringer"],"workdir":"."}
  rpc Get(GoCommandRequest) returns (GoCommandResponse);

  // Install dispatches to `go install`.
  // @example {"args":["./cmd/rob-go"],"workdir":"."}
  rpc Install(GoCommandRequest) returns (GoCommandResponse);

  // Generate dispatches to `go generate`.
  // @example {"args":["./..."],"workdir":"."}
  rpc Generate(GoCommandRequest) returns (GoCommandResponse);

  // Clean dispatches to `go clean`.
  // @example {"args":["-cache"],"workdir":"."}
  rpc Clean(GoCommandRequest) returns (GoCommandResponse);

  // Work dispatches to `go work`.
  // @example {"args":["sync"],"workdir":"."}
  rpc Work(GoCommandRequest) returns (GoCommandResponse);

  // Tool dispatches to `go tool`.
  // @example {"args":["pprof","cpu.out"],"workdir":"."}
  rpc Tool(GoCommandRequest) returns (GoCommandResponse);

  // Fix dispatches to `go fix`.
  // @example {"args":["./..."],"workdir":"."}
  rpc Fix(GoCommandRequest) returns (GoCommandResponse);

  // ---- Library mode: in-process analysis ----

  // Format Go source (go/format — no subprocess).
  // @example {"source":"package main\\n\\nfunc main(){println(\\\"hi\\\")}\\n","filename":"main.go"}
  rpc Format(FormatRequest) returns (FormatResponse);

  // Parse Go source into AST and return structural info.
  // @example {"source":"package main\\n\\nfunc main() {}\\n","filename":"main.go","with_comments":true}
  rpc Parse(ParseRequest) returns (ParseResponse);

  // Type-check a package and return diagnostics.
  // @example {"patterns":["./..."],"workdir":"."}
  rpc TypeCheck(TypeCheckRequest) returns (TypeCheckResponse);

  // Run static analysis (go vet + custom analyzers).
  // @example {"patterns":["./..."],"workdir":".","analyzers":["printf"]}
  rpc Analyze(AnalyzeRequest) returns (AnalyzeResponse);

  // Load package metadata and dependency graph.
  // @example {"patterns":["./..."],"workdir":".","with_deps":true}
  rpc LoadPackages(LoadPackagesRequest) returns (LoadPackagesResponse);

  // Extract documentation from Go packages.
  // @example {"pattern":"./internal/service","workdir":"."}
  rpc Doc(DocRequest) returns (DocResponse);

  // Print Go environment.
  // @example {"args":["GOMOD","GOWORK"],"workdir":"."}
  rpc Env(GoCommandRequest) returns (GoCommandResponse);

  // Print Go version + platform info.
  // @example {}
  rpc Version(VersionRequest) returns (VersionResponse);
}

// ---- Exec mode messages ----

message GoCommandRequest {
  // Arguments passed after the selected `go` subcommand.
  // @example ["./cmd/rob-go"]
  repeated string args = 1;

  // Working directory where the command runs.
  // @example "."
  string workdir = 2;

  // Environment variables in `KEY=VALUE` format.
  // @example ["GOFLAGS=-mod=readonly"]
  repeated string env = 3;

  // Timeout in seconds. Use 0 to disable the timeout.
  // @example 30
  int32 timeout_s = 4;
}

message GoCommandResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  float elapsed_s = 4;
}

message TestRequest {
  // Arguments passed after `go test`.
  // @example ["./...","-race"]
  repeated string args = 1;

  // Working directory where tests run.
  // @example "."
  string workdir = 2;

  // Environment variables in `KEY=VALUE` format.
  // @example ["CGO_ENABLED=1"]
  repeated string env = 3;

  // Timeout in seconds. Use 0 to disable the timeout.
  // @example 120
  int32 timeout_s = 4;

  // Force `go test -json` for structured event parsing.
  // @example true
  bool json_output = 5;

  // Enable coverage collection.
  // @example true
  bool cover = 6;

  // Coverage profile path written by `go test`.
  // @example "coverage.out"
  string cover_profile = 7;
}

message TestResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  float elapsed_s = 4;
  repeated TestEvent events = 5; // From `go test -json`
  int32 total = 6;
  int32 passed = 7;
  int32 failed = 8;
  int32 skipped = 9;
}

message TestEvent {
  string time = 1;
  string action = 2; // run, pass, fail, skip, output, pause, cont
  string package = 3;
  string test = 4;
  float elapsed = 5;
  string output = 6;
}

// ---- Library mode messages ----

message FormatRequest {
  // Go source code to format.
  // @required
  // @example "package main\\n\\nfunc main(){println(\\\"hi\\\")}\\n"
  string source = 1;

  // Logical filename used in diagnostics.
  // @example "main.go"
  string filename = 2;
}

message FormatResponse {
  string formatted = 1;
  bool changed = 2; // true if formatting changed the source
  string error = 3;
}

message ParseRequest {
  // Go source code to parse.
  // @required
  // @example "package main\\n\\nfunc main() {}\\n"
  string source = 1;

  // Logical filename used in diagnostics.
  // @example "main.go"
  string filename = 2;

  // Include comments in the parsed AST output.
  // @example true
  bool with_comments = 3;
}

message ParseResponse {
  string package_name = 1;
  repeated string imports = 2;
  repeated Declaration declarations = 3;
  repeated Diagnostic errors = 4;
}

message Declaration {
  string kind = 1; // "func", "type", "var", "const"
  string name = 2;
  string signature = 3; // For funcs: full signature
  string doc = 4; // Doc comment
  int32 line = 5;
  int32 end_line = 6;
  bool exported = 7;
  repeated Declaration children = 8; // Methods, struct fields, etc.
}

message TypeCheckRequest {
  // Package patterns to type-check.
  // @required
  // @example ["./..."]
  repeated string patterns = 1;

  // Working directory used to resolve the package patterns.
  // @example "."
  string workdir = 2;

  // Environment variables in `KEY=VALUE` format.
  // @example ["GOOS=linux"]
  repeated string env = 3;
}

message TypeCheckResponse {
  bool ok = 1;
  repeated Diagnostic diagnostics = 2;
  repeated PackageInfo packages = 3;
}

message Diagnostic {
  string file = 1;
  int32 line = 2;
  int32 column = 3;
  string severity = 4; // "error", "warning", "info"
  string message = 5;
  string category = 6; // Analyzer or compiler subsystem
}

message AnalyzeRequest {
  // Package patterns to analyze.
  // @required
  // @example ["./..."]
  repeated string patterns = 1;

  // Working directory used to resolve the package patterns.
  // @example "."
  string workdir = 2;

  // Environment variables in `KEY=VALUE` format.
  // @example ["GOFLAGS=-tags=integration"]
  repeated string env = 3;

  // Analyzer names. Leave empty to run the default vet analyzer set.
  // @example ["printf"]
  repeated string analyzers = 4;
}

message AnalyzeResponse {
  bool ok = 1;
  repeated Diagnostic diagnostics = 2;
}

message LoadPackagesRequest {
  // Package patterns to load.
  // @required
  // @example ["./..."]
  repeated string patterns = 1;

  // Working directory used to resolve the package patterns.
  // @example "."
  string workdir = 2;

  // Environment variables in `KEY=VALUE` format.
  // @example ["GOOS=darwin"]
  repeated string env = 3;

  // Load transitive dependencies in addition to direct packages.
  // @example true
  bool with_deps = 4;
}

message LoadPackagesResponse {
  repeated PackageInfo packages = 1;
}

message PackageInfo {
  string id = 1; // Package import path
  string name = 2; // Package name
  string dir = 3; // Directory on disk
  repeated string go_files = 4;
  repeated string imports = 5; // Direct import paths
  repeated Diagnostic errors = 6;
}

message DocRequest {
  // Package pattern or symbol to document.
  // @required
  // @example "./internal/service"
  string pattern = 1;

  // Working directory used to resolve the pattern.
  // @example "."
  string workdir = 2;
}

message DocResponse {
  string package_name = 1;
  string package_doc = 2;
  repeated Declaration symbols = 3;
}

message VersionRequest {}

message VersionResponse {
  string version = 1; // e.g. "go1.24.0"
  string goos = 2;
  string goarch = 3;
  string goroot = 4;
}

syntax = "proto3";

package jamesloops.v1;

import "holons/v1/manifest.proto";

option go_package = "github.com/organic-programming/james-loops/gen/go/v1;jamesloopsv1";

option (holons.v1.manifest) = {
  identity: {
    schema: "holon/v1"
    uuid: "b3b3b9f4-110c-45e7-922e-5e60a39ef64e"
    given_name: "James"
    family_name: "Loops"
    motto: "Queue the briefs, run the night, read the morning report."
    composer: "B. ALTER"
    status: "draft"
    born: "2026-04-03"
    version: "0.1.1"
    aliases: ["james-loops"]
  }
  description: "James Loops orchestrates sequential overnight AI CLI sessions governed by ader acceptance gates. It supports any AI CLI via YAML profiles and introduces a dialectic mode with a coder and an evaluator."
  lang: "go"
  kind: "native"
  build: {
    runner: "go-module"
    main: "./cmd"
    templates: ["api/version.go"]
  }
  requires: {
    commands: ["go", "ader", "git"]
  }
  artifacts: {
    binary: "james-loops"
  }
  contract: {
    proto: "api/v1/holon.proto"
    service: "jamesloops.v1.JamesLoopsService"
    rpcs: [
      "Run",
      "Enqueue",
      "List",
      "Status",
      "Drop",
      "Resume",
      "Skip",
      "Abort",
      "ReEnqueue",
      "Log"
    ]
  }
};

service JamesLoopsService {
  rpc Run (RunRequest) returns (RunResponse);
  rpc Enqueue (EnqueueRequest) returns (EnqueueResponse);
  rpc List (ListRequest) returns (ListResponse);
  rpc Status (StatusRequest) returns (StatusResponse);
  rpc Drop (DropRequest) returns (DropResponse);
  rpc Resume (ResumeRequest) returns (ResumeResponse);
  rpc Skip (SkipRequest) returns (SkipResponse);
  rpc Abort (AbortRequest) returns (AbortResponse);
  rpc ReEnqueue (ReEnqueueRequest) returns (ReEnqueueResponse);
  rpc Log (LogRequest) returns (LogResponse);
}

message RunRequest {
  string root = 1;
  bool dry_run = 2;
  uint32 max_retries = 3;
  string coder_profile = 4;
  string evaluator_profile = 5;
}

message RunResponse {
  string report_path = 1;
  string report_markdown = 2;
}

message EnqueueRequest {
  string root = 1;
  string program_dir = 2;
  string from_cookbook = 3;
}

message EnqueueResponse {
  string slot = 1;
  string path = 2;
  SlotSummary summary = 3;
}

message ListRequest {
  string root = 1;
}

message ListResponse {
  StatusSnapshot status = 1;
}

message StatusRequest {
  string root = 1;
}

message StatusResponse {
  string report_path = 1;
  string report_markdown = 2;
  StatusSnapshot status = 3;
}

message DropRequest {
  string root = 1;
  string slot = 2;
  bool deferred = 3;
}

message DropResponse {
  string slot = 1;
  string path = 2;
}

message ResumeRequest {
  string root = 1;
}

message ResumeResponse {
  string report_path = 1;
  string report_markdown = 2;
}

message SkipRequest {
  string root = 1;
}

message SkipResponse {
  string skipped_step = 1;
  string next_step = 2;
  string report_path = 3;
  string report_markdown = 4;
}

message AbortRequest {
  string root = 1;
}

message AbortResponse {
  string deferred_slot = 1;
  string path = 2;
}

message ReEnqueueRequest {
  string root = 1;
  string slot = 2;
}

message ReEnqueueResponse {
  string from_slot = 1;
  string to_slot = 2;
  string path = 3;
  SlotSummary summary = 4;
}

message LogRequest {
  string root = 1;
  string step_id = 2;
}

message LogResponse {
  string slot = 1;
  string step_id = 2;
  repeated AttemptRecord attempts = 3;
}

message StatusSnapshot {
  repeated SlotSummary queue_slots = 1;
  SlotSummary live_slot = 2;
  repeated SlotSummary deferred_slots = 3;
  repeated SlotSummary done_slots = 4;
}

message SlotSummary {
  string slot = 1;
  string description = 2;
  string state = 3;
  string branch = 4;
  uint32 steps_passed = 5;
  uint32 steps_total = 6;
  string current_step = 7;
  string coder_profile = 8;
  string evaluator_profile = 9;
}

message AttemptRecord {
  string started_at = 1;
  string finished_at = 2;
  int32 runner_exit_code = 3;
  string gate_result = 4;
  string gate_report = 5;
  string diff_patch = 6;
  double evaluator_score = 7;
  string evaluator_output = 8;
}

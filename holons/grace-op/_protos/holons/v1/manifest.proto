syntax = "proto3";

package holons.v1;

import "google/protobuf/descriptor.proto";

// HolonManifest is the single source of truth for a holon's identity,
// contract, skills, documentation, and operational metadata.
// Any .proto file can carry this manifest via:
//   option (holons.v1.manifest) = { ... };
//
// See HOLON_PROTO.md for the full authoring specification.
// See HOLON_PACKAGE.md for how the package is produced from this manifest.
message HolonManifest {

  // ── Identity ──────────────────────────────────────────
  // Who this holon is. Every identity field is set at birth
  // and rarely changes (only status progresses).

  message Identity {
    string schema = 1;       // always "holon/v1"
    string uuid = 2;         // UUID v4, generated once, never changes
    string given_name = 3;   // the character — what distinguishes this holon (e.g. "Gabriel")
    string family_name = 4;  // the function — what it does (e.g. "Greeting-Go")
    string motto = 5;        // the dessein in one sentence
    string composer = 6;     // who designed this holon (human or agent)
    reserved 7;              // was: clade (deprecated — computational nature taxonomy removed)
    string status = 8;       // draft | stable | deprecated | dead
    string born = 9;         // ISO 8601 date of creation (YYYY-MM-DD)
    string version = 10;     // semver, e.g. "0.4.1" — no "v" prefix
    repeated string aliases = 11;  // short names for slug resolution (e.g. "op", "rgo")
  }

  // ── Skill ─────────────────────────────────────────────
  // Agent-facing capability descriptions for MCP/LLM integration.
  // Skills describe when and why to use this holon.

  message Skill {
    string name = 1;             // kebab-case identifier
    string description = 2;      // what this skill achieves
    string when = 3;             // trigger condition (when to invoke)
    repeated string steps = 4;   // ordered human-readable steps
  }

  // ── Sequence ──────────────────────────────────────────
  // Deterministic, linear step sequences executable via `op do` or MCP.
  // No reasoning between steps — pure orchestration.

  message Sequence {
    string name = 1;              // kebab-case identifier
    string description = 2;       // what this sequence achieves
    repeated Param params = 3;    // input parameters
    repeated string steps = 4;    // ordered shell commands (Go text/template syntax)

    message Param {
      string name = 1;
      string description = 2;
      bool required = 3;
      string default = 4;        // default value if not provided
    }
  }

  // ── Contract ──────────────────────────────────────────
  // Pointer to the gRPC service this holon exposes.

  message Contract {
    string proto = 1;           // e.g. "api/v1/holon.proto"
    string service = 2;         // fully qualified service name
    repeated string rpcs = 3;   // exposed RPC method names
  }

  // ── Build ─────────────────────────────────────────────
  // How `op build` compiles this holon.

  message Build {
    // Compiled:    go-module | cargo | cmake | swift-package
    // Interpreted: python | node | ruby
    // Transpiled:  typescript (source is TS, dist is JS)
    // Mobile:      dart | flutter
    // Composite:   recipe (multi-step orchestration)
    // None:        none (no build step, pre-built or external)
    string runner = 1;
    string main = 2;       // entry point (go-module: "./cmd")

    // Recipe-mode fields (runner == "recipe")
    Defaults defaults = 3;
    repeated Member members = 4;
    map<string, Target> targets = 5;

    // Source files containing Go template expressions (e.g. {{ .Version }}).
    // Resolved with identity data before the language build, restored after.
    repeated string templates = 6;

    message Defaults {
      string target = 1;   // e.g. "macos", "linux"
      string mode = 2;     // e.g. "debug", "release"
    }

    message Member {
      string id = 1;       // e.g. "holon", "app"
      string path = 2;     // relative path to the member
      string type = 3;     // holon | component
    }

    message Target {
      repeated Step steps = 1;
    }
  }

  // ── Step ───────────────────────────────────────────────
  // A single recipe build step. Exactly one field must be set.

  message Step {
    oneof action {
      Exec exec = 1;
      Copy copy = 2;
      string build_member = 3;    // member id to build
      AssertFile assert_file = 4;
      CopyArtifact copy_artifact = 5;
    }

    message Exec {
      string cwd = 1;
      repeated string argv = 2;
    }

    message Copy {
      string from = 1;
      string to = 2;
    }

    message AssertFile {
      string path = 1;
    }

    message CopyArtifact {
      string from = 1;
      string to = 2;
    }
  }

  // ── Requires ──────────────────────────────────────────
  // Preconditions that must be met before build/run.

  message Requires {
    repeated string commands = 1;    // CLI tools required in PATH
    repeated string files = 2;       // source files that must exist
    repeated string platforms = 3;   // supported targets (macos, linux, windows…)
  }

  // ── Artifacts ─────────────────────────────────────────
  // Build outputs — what `op build` produces.

  message Artifacts {
    string binary = 1;                          // for native/wrapper holons
    string primary = 2;                         // for composites (e.g. ".app" path)
    map<string, TargetArtifacts> by_target = 3; // per-platform overrides

    message TargetArtifacts {
      string debug = 1;
      string release = 2;
      string profile = 3;
    }
  }

  // ── Top-level fields ──────────────────────────────────

  Identity identity = 1;
  reserved 2;                     // was: lineage (deprecated — origin/parentage tracking removed)
  string description = 3;        // what this holon does, plain language
  string lang = 4;               // primary implementation language (go, swift, dart, rust…)
  repeated Skill skills = 5;
  Contract contract = 6;
  string kind = 7;               // native | wrapper | composite
  repeated string platforms = 8; // supported platforms
  string transport = 9;          // default transport hint (stdio, tcp)
  Build build = 10;
  Requires requires = 11;
  reserved 12;                    // was: delegates (deprecated — use requires.commands instead)
  Artifacts artifacts = 13;
  repeated Sequence sequences = 14;
  string guide = 15;             // user-facing documentation in markdown (rendered by `op man`)
}

// Register the manifest as a file-level option.
// Field number 50000 is in the safe range for private extensions.
extend google.protobuf.FileOptions {
  HolonManifest manifest = 50000;
}

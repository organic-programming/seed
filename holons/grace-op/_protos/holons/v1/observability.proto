syntax = "proto3";

package holons.v1;

import "google/protobuf/duration.proto";

// HolonObservability emits OTLP-shaped records through the SDK-managed
// observability service. Events are LogRecord values with event_name set.
//
// Canonical event_name values for this wave:
//   instance.spawned
//   instance.ready
//   instance.exited
//   instance.crashed
//   session.started
//   session.ended
//   handler.panic
//   config.reloaded
service HolonObservability {
  rpc Logs(LogsRequest) returns (stream LogRecord);
  rpc Metrics(MetricsRequest) returns (stream Metric);
  rpc Events(EventsRequest) returns (stream LogRecord);
}

message LogsRequest {
  SeverityNumber min_severity_number = 1;
  repeated string session_ids = 2;
  repeated string rpc_methods = 3;
  google.protobuf.Duration since = 4;
  bool follow = 5;
}

message MetricsRequest {
  repeated string name_prefixes = 1;
}

message EventsRequest {
  repeated string event_names = 1;
  google.protobuf.Duration since = 2;
  bool follow = 3;
}

// Structurally mirrors opentelemetry.proto.common.v1.AnyValue.
message AnyValue {
  oneof value {
    string string_value = 1;
    bool bool_value = 2;
    int64 int_value = 3;
    double double_value = 4;
  }
}

// Structurally mirrors opentelemetry.proto.common.v1.KeyValue.
message KeyValue {
  string key = 1;
  AnyValue value = 2;
}

// Structurally mirrors opentelemetry.proto.resource.v1.Resource.
message Resource {
  repeated KeyValue attributes = 1;
  uint32 dropped_attributes_count = 2;
}

// Structurally mirrors opentelemetry.proto.logs.v1.SeverityNumber.
enum SeverityNumber {
  SEVERITY_NUMBER_UNSPECIFIED = 0;
  SEVERITY_NUMBER_TRACE = 1;
  SEVERITY_NUMBER_DEBUG = 5;
  SEVERITY_NUMBER_INFO = 9;
  SEVERITY_NUMBER_WARN = 13;
  SEVERITY_NUMBER_ERROR = 17;
  SEVERITY_NUMBER_FATAL = 21;
}

// Structurally mirrors opentelemetry.proto.logs.v1.LogRecord.
message LogRecord {
  fixed64 time_unix_nano = 1;
  SeverityNumber severity_number = 2;
  string severity_text = 3;
  AnyValue body = 5;
  repeated KeyValue attributes = 6;
  uint32 dropped_attributes_count = 7;
  uint32 flags = 8;
  bytes trace_id = 9;
  bytes span_id = 10;
  fixed64 observed_time_unix_nano = 11;

  string event_name = 20;
  repeated string chain = 21;
}

// Structurally mirrors opentelemetry.proto.metrics.v1.Metric.
message Metric {
  string name = 1;
  string description = 2;
  string unit = 3;
  oneof data {
    Gauge gauge = 5;
    Sum sum = 7;
    Histogram histogram = 9;
  }
}

message Gauge {
  repeated NumberDataPoint data_points = 1;
}

message Sum {
  repeated NumberDataPoint data_points = 1;
  AggregationTemporality aggregation_temporality = 2;
  bool is_monotonic = 3;
}

message Histogram {
  repeated HistogramDataPoint data_points = 1;
  AggregationTemporality aggregation_temporality = 2;
}

message NumberDataPoint {
  fixed64 start_time_unix_nano = 2;
  fixed64 time_unix_nano = 3;
  oneof value {
    double as_double = 4;
    int64 as_int = 6;
  }
  repeated KeyValue attributes = 7;
}

message HistogramDataPoint {
  fixed64 start_time_unix_nano = 2;
  fixed64 time_unix_nano = 3;
  uint64 count = 4;
  double sum = 5;
  repeated uint64 bucket_counts = 6;
  repeated double explicit_bounds = 7;
  repeated KeyValue attributes = 9;
  double min = 11;
  double max = 12;
}

enum AggregationTemporality {
  AGGREGATION_TEMPORALITY_UNSPECIFIED = 0;
  AGGREGATION_TEMPORALITY_DELTA = 1;
  AGGREGATION_TEMPORALITY_CUMULATIVE = 2;
}

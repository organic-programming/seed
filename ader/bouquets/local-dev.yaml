description: local development bouquet
defaults:
  source: workspace
  # Each suite's "smoke" profile is a curated selection by its author,
  # mixing progression and regression steps. `both` runs every step the
  # profile lists regardless of lane — the canonical semantic for a
  # smoke bouquet.
  lane: both
  archive: never
entries:
- catalogue: grace-op
  suite: op_version
  profile: smoke
- catalogue: clem-ader
  suite: ader-self
  profile: smoke
- catalogue: gabriel-greeting-app-swiftui
  suite: swiftui-smoke
  profile: smoke
- catalogue: gabriel-greeting-app-flutter
  suite: flutter-smoke
  profile: smoke

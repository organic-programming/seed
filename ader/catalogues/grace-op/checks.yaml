    workdir: ader/catalogues/grace-op/integration/build/composite_rebuild
    command: go test -tags e2e -v -count=1 -timeout 45m -run '^TestBuild_08_CompositeRebuildsTouchedMember$' .
    description: Verifies the CLI composite rebuild path when a member source changes.
  op-build-api:
    workdir: ader/catalogues/grace-op/integration/build
    command: go test -tags e2e -v -count=1 -timeout 15m -run '^TestBuildAPI_' .
    description: Verifies the public API alignment for build.
  op-build-rpc:
    workdir: ader/catalogues/grace-op/integration/build

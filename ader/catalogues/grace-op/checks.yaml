checks:
  op-build-unit:
    workdir: holons/grace-op/internal/build
    command: go test -tags e2e -v -count=1 -timeout 2m .
    description: Verifies the internal build configuration integrity structure.
  op-build-cli:
    workdir: ader/catalogues/grace-op/integration/build
    command: go test -tags e2e -v -count=1 -timeout 45m -run '^TestBuild_0[1-6]_' .
    description: Verifies the core CLI-first build surface, including logs and matrix coverage.
  op-build-cli-composite:
    workdir: ader/catalogues/grace-op/integration/build/composite
    command: go test -tags e2e -v -count=1 -timeout 45m -run '^TestBuild_07_Composite$' .
    description: Verifies the CLI composite build path for the SwiftUI app.

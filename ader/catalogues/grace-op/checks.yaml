checks:
  op-build-unit:
    workdir: holons/grace-op/internal/build
    command: go test -v -count=1 -timeout 2m .
    description: Verifies the internal build configuration integrity structure.
  op-build:
    workdir: ader/catalogues/grace-op/integration/build
    command: go test -v -count=1 -timeout 20m .
    description: Verifies that the 'op build' command with precision.
  op-check-base:
    workdir: ader/catalogues/grace-op/integration/check
    command: go test -v -count=1 -timeout 5m .
    description: Verifies complete execution path for op check.

description: Suite validating op list with CLI-first integration and API/RPC alignment.
defaults:
  profile: smoke
steps:
  list-cli:
    check: op-list-cli
    lane: progression
  list-api:
    check: op-list-api
    lane: progression
    needs: [list-cli]
  list-rpc:
    check: op-list-rpc
    lane: progression
    needs: [list-api]
profiles:
  smoke:
    description: CLI-first verification with API and RPC alignment.
    archive: never
    steps: [list-cli, list-api, list-rpc]

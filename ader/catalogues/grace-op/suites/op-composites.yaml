description: higher-level hello-world holon scenarios coordinated through grace-op
defaults:
  profile: smoke
steps:
  integration-discover-contains-available-hello-world-holons:
    check: integration-discover-contains-available-hello-world-holons
    lane: progression
  integration-lifecycle-hello-world-holons-c:
    check: integration-lifecycle-hello-world-holons-c
    lane: progression
  integration-lifecycle-hello-world-holons-cpp:
    check: integration-lifecycle-hello-world-holons-cpp
    lane: progression
  integration-lifecycle-hello-world-holons-csharp:
    check: integration-lifecycle-hello-world-holons-csharp
    lane: progression
  integration-lifecycle-hello-world-holons-go:
    check: integration-lifecycle-hello-world-holons-go
    lane: progression
  integration-lifecycle-hello-world-holons-java:
    check: integration-lifecycle-hello-world-holons-java
    lane: progression
  integration-lifecycle-hello-world-holons-kotlin:
    check: integration-lifecycle-hello-world-holons-kotlin
    lane: progression
  integration-lifecycle-hello-world-holons-node:
    check: integration-lifecycle-hello-world-holons-node
    lane: progression
  integration-lifecycle-hello-world-holons-python:
    check: integration-lifecycle-hello-world-holons-python
    lane: progression
  integration-lifecycle-hello-world-holons-ruby:
    check: integration-lifecycle-hello-world-holons-ruby
    lane: progression
  integration-lifecycle-hello-world-holons-rust:
    check: integration-lifecycle-hello-world-holons-rust
    lane: progression
profiles:
  smoke:
    description: canonical path
    archive: never
    steps:
    - integration-discover-contains-available-hello-world-holons
    - integration-lifecycle-hello-world-holons-go
    - integration-lifecycle-hello-world-holons-rust
  full:
    description: full scenario proof
    archive: auto
    steps:
    - integration-discover-contains-available-hello-world-holons
    - integration-lifecycle-hello-world-holons-c
    - integration-lifecycle-hello-world-holons-cpp
    - integration-lifecycle-hello-world-holons-csharp
    - integration-lifecycle-hello-world-holons-go
    - integration-lifecycle-hello-world-holons-java
    - integration-lifecycle-hello-world-holons-kotlin
    - integration-lifecycle-hello-world-holons-node
    - integration-lifecycle-hello-world-holons-python
    - integration-lifecycle-hello-world-holons-ruby
    - integration-lifecycle-hello-world-holons-rust

description: Suite validating op build with CLI-first integration and API/RPC alignment.
defaults:
  profile: smoke
steps:
  build-unit:
    check: op-build-unit
    lane: progression
  build-cli:
    check: op-build-cli
    lane: progression
    needs: [build-unit]
  build-api:
    check: op-build-api
    lane: progression
    needs: [build-cli]
  build-rpc:
    check: op-build-rpc
    lane: progression
    needs: [build-api]
profiles:
  smoke:
    description: CLI-first verification with API and RPC alignment
    archive: never
    steps:
    - build-unit
    - build-cli
    - build-api
    - build-rpc

description: Suite validating op build with CLI-first integration and API/RPC alignment.
defaults:
  profile: smoke
steps:
  build-unit:
    check: op-build-unit
    lane: regression
  build-cli:
    check: op-build-cli
    lane: regression
    needs: [build-unit]
  build-cli-composite:
    check: op-build-cli-composite
    lane: regression
    needs: [build-cli]
  build-cli-composite-rebuild:
    check: op-build-cli-composite-rebuild
    lane: regression
    needs: [build-cli-composite]
  build-api:
    check: op-build-api
    lane: regression
    needs: [build-cli-composite-rebuild]
  build-rpc:
    check: op-build-rpc
    lane: regression
    needs: [build-api]
profiles:
  smoke:
    description: CLI-first verification with API and RPC alignment.
    archive: never
    steps: [build-unit, build-cli, build-cli-composite, build-cli-composite-rebuild, build-api, build-rpc]
  full:
    description: Exhaustive CLI-first build verification, including matrix and composite coverage.
    archive: never
    steps: [build-unit, build-cli, build-cli-composite, build-cli-composite-rebuild, build-api, build-rpc]

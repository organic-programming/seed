description: Suite validating op new with CLI-first integration and API/RPC alignment.
defaults:
  profile: smoke
steps:
  new-cli:
    check: op-new-cli
    lane: progression
  new-api:
    check: op-new-api
    lane: progression
    needs: [new-cli]
  new-rpc:
    check: op-new-rpc
    lane: progression
    needs: [new-api]
profiles:
  smoke:
    description: CLI-first verification with API and RPC alignment.
    archive: never
    steps: [new-cli, new-api, new-rpc]

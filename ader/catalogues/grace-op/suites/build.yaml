description: Suite validant la commande op build (Unit et Integration 3 niveaux)
defaults:
  profile: smoke
steps:
  build-unit:
    check: op-build-unit
    lane: progression
  build-base:
    check: op-build
    lane: progression
    needs: [build-unit]
profiles:
  smoke:
    description: Verification de base
    archive: never
    steps:
    - build-unit
    - build-base

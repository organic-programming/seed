description: Suite validating op build command (Unit and 3-level Integration)
defaults:
  profile: smoke
steps:
  build-unit:
    check: op-build-unit
    lane: progression
  build-base:
    check: op-build
    lane: progression
    needs: [build-unit]
profiles:
  smoke:
    description: Basic verification
    archive: never
    steps:
    - build-unit
    - build-base

description: Suite validating op uninstall with CLI-first integration and API/RPC alignment.
defaults:
  profile: smoke
steps:
  uninstall-cli:
    check: op-uninstall-cli
    lane: progression
  uninstall-api:
    check: op-uninstall-api
    lane: progression
    needs: [uninstall-cli]
  uninstall-rpc:
    check: op-uninstall-rpc
    lane: progression
    needs: [uninstall-api]
profiles:
  smoke:
    description: CLI-first verification with API and RPC alignment.
    archive: never
    steps: [uninstall-cli, uninstall-api, uninstall-rpc]
